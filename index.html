  {id:"1778573792023-aic001",work:"An Inspector Calls",char:"Mr Birling",loc:"Act 1",themes:["Responsibility","Capitalism","Selfishness"],methods:["Dramatic irony","Hubris"],text:"a man has to mind his own business and look after himself and his own",analysis:"Birling's core philosophy — aggressive individualism that directly contradicts the Inspector's socialist message. Priestley uses dramatic irony: the audience knows Birling is morally wrong. 'Look after himself' is deeply ironic given the play's moral arc where selfishness destroys Eva Smith.",stars:5,acc:"exact",note:"Key quote for Responsibility theme; Priestley's didactic message; contrast with Inspector's speech.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic002",work:"An Inspector Calls",char:"Mr Birling",loc:"Act 1",themes:["Capitalism","Dramatic irony","Class"],methods:["Dramatic irony","Hubris","Foreshadowing"],text:"The Titanic... unsinkable, absolutely unsinkable.",analysis:"One of Priestley's most devastating uses of dramatic irony. A 1946 audience knew the Titanic sank. Birling's confident wrongness here undermines everything he says — if he's wrong about this, he's wrong about his social philosophy too. His certainty signals his dangerous arrogance.",stars:5,acc:"exact",note:"Dramatic irony; Birling's unreliability as a narrator; Priestley demolishing capitalist optimism.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic003",work:"An Inspector Calls",char:"Mr Birling",loc:"Act 1",themes:["Capitalism","Dramatic irony","Power"],methods:["Dramatic irony","Hubris"],text:"there isn't a chance of war",analysis:"Another catastrophic false prediction, since WWI followed shortly. Priestley makes Birling wrong about everything important to demolish his authority. His refusal to accept responsibility mirrors his refusal to accept reality — both are wilful blindness.",stars:5,acc:"exact",note:"Dramatic irony; Priestley's critique of the ruling class; Birling's arrogance.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic004",work:"An Inspector Calls",char:"Mr Birling",loc:"Act 1",themes:["Class","Power","Responsibility"],methods:["Status","Intimidation","Tone"],text:"I was an alderman for years — and Lord Mayor two years ago",analysis:"Birling immediately tries to establish social superiority over the Inspector, as if civic office confers immunity from moral interrogation. Listing his titles signals a man who believes status protects him from accountability. The Inspector is unmoved — Priestley exposes the hollowness of such credentials.",stars:4,acc:"approximate",note:"Class and power; Birling's arrogance; Inspector challenging authority.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic005",work:"An Inspector Calls",char:"Mr Birling",loc:"Act 1",themes:["Capitalism","Responsibility","Class"],methods:["Metaphor","Rhetoric"],text:"lower costs and higher prices",analysis:"Birling reduces workers to a cost on a ledger. His mercantile language strips Eva Smith and all workers of humanity — they are inputs to profit, not people. Priestley presents this as the root cause of Eva's suffering: a system that values money over lives.",stars:4,acc:"approximate",note:"Capitalism; workers' rights; Birling's dehumanisation of the working class.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic006",work:"An Inspector Calls",char:"Inspector Goole",loc:"Act 3",themes:["Responsibility","Social justice","Collective guilt"],methods:["Anaphora","Rhetoric","Biblical allusion"],text:"We are members of one body. We are responsible for each other.",analysis:"The Inspector's central thesis, delivered with the force of moral law. Anaphora ('We are') creates cumulative rhetorical power. 'One body' is almost biblical — Priestley frames social responsibility as a spiritual duty, not merely political policy. It is the direct antithesis of Birling's every-man-for-himself creed.",stars:5,acc:"exact",note:"Priestley's socialist message; responsibility; Inspector as moral voice; contrast with Birling.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic007",work:"An Inspector Calls",char:"Inspector Goole",loc:"Act 3",themes:["Responsibility","Consequences","Warning"],methods:["Tricolon","Rhetoric","Prophecy"],text:"fire and blood and anguish",analysis:"The Inspector's prophecy closes the play with an apocalyptic warning. The tricolon escalates in violence — 'fire' (destruction), 'blood' (death), 'anguish' (prolonged suffering). Written and performed after WWII, audiences knew the prophecy had come true. Priestley argues that ignoring social responsibility leads to collective catastrophe.",stars:5,acc:"exact",note:"Consequences of ignoring responsibility; Inspector as prophet; Priestley's political warning; WWII context.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic008",work:"An Inspector Calls",char:"Inspector Goole",loc:"Act 1",themes:["Responsibility","Social justice","Class"],methods:["Juxtaposition","Symbolism","Tone"],text:"a girl died today",analysis:"The Inspector's flat, factual statement lands with devastating weight against the Birlings' celebratory dinner. 'A girl' — deliberately generic — could be anyone crushed by the system. 'Died today' collapses the distance between their comfortable world and Eva's death, forcing them into the present moral moment.",stars:5,acc:"approximate",note:"Inspector's impact; juxtaposition of wealth and death; Priestley's technique of intrusion.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic009",work:"An Inspector Calls",char:"Inspector Goole",loc:"Act 3",themes:["Responsibility","Social justice","Collective guilt"],methods:["Repetition","Imagery","Scale"],text:"millions and millions and millions of Eva Smiths and John Smiths",analysis:"The Inspector explodes the play's scope from one girl to the entire working class. Triple repetition of 'millions' is hypnotic, drumming home the scale of inequality. 'Eva Smith' and 'John Smith' are deliberately generic names — they represent every person crushed by the system the Birlings defend and profit from.",stars:5,acc:"approximate",note:"Social class; collective responsibility; Priestley's socialist vision; widening the play's scope.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic010",work:"An Inspector Calls",char:"Inspector Goole",loc:"Act 3",themes:["Responsibility","Collective guilt","Justice"],methods:["Direct address","Blunt tone","Listing"],text:"Each of you helped to kill her.",analysis:"The Inspector distributes guilt collectively and without softening. The verb 'kill' is deliberately violent — he refuses the Birlings' euphemisms. 'Each of you' implicates every character individually while making clear that Eva's death was a chain of cruelties, not one person's fault alone. No one escapes.",stars:5,acc:"approximate",note:"Collective responsibility; Inspector's role as moral judge; chain of culpability.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic011",work:"An Inspector Calls",char:"Sheila",loc:"Act 1",themes:["Responsibility","Class","Gender"],methods:["Confession","Honest tone","Self-awareness"],text:"I was in a furious temper... I was being stupid.",analysis:"Sheila's self-condemnation is immediate and brutally honest, contrasting sharply with her parents' deflection. 'Furious' acknowledges her abuse of class power; 'stupid' shows self-awareness without self-pity. Her willingness to name her own failings is what makes her Priestley's vehicle for the possibility of change.",stars:4,acc:"approximate",note:"Responsibility; Sheila's character development; contrast with her parents; younger generation.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic012",work:"An Inspector Calls",char:"Sheila",loc:"Act 3",themes:["Responsibility","Change","Generational divide"],methods:["Rhetoric","Imperative","Contrast"],text:"You're beginning to pretend now that nothing's happened at all... and I won't let you.",analysis:"Sheila refuses to allow her parents' moral backsliding once doubt is cast on the Inspector. 'Pretend' accuses them of deliberate dishonesty, while 'I won't let you' shows her striking new authority. She becomes the play's moral guardian, insisting the lesson must be learned whether or not the Inspector was real.",stars:5,acc:"exact",note:"Generational divide; moral responsibility; Sheila as conscience of the play.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic013",work:"An Inspector Calls",char:"Sheila",loc:"Act 2",themes:["Responsibility","Change","Social justice"],methods:["Tone","Self-awareness","Irony"],text:"I'll never do it again to anybody",analysis:"Sheila's genuine moral awakening is complete and unconditional. 'Never' and 'anybody' are absolute terms — she is not just sorry for this incident but transformed as a person. Unlike her parents, she absorbs the Inspector's message fully. Priestley presents her as proof that change is possible.",stars:4,acc:"approximate",note:"Responsibility; generational hope; contrast with Mr and Mrs Birling.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic014",work:"An Inspector Calls",char:"Mrs Birling",loc:"Act 2",themes:["Class","Responsibility","Prejudice"],methods:["Dramatic irony","Contemptuous tone","Class diction"],text:"As if a girl of that sort would ever refuse money!",analysis:"Mrs Birling's contempt is so total she cannot conceive of working-class moral integrity. 'That sort' is a devastating class marker — Eva is reduced to a type. The dramatic irony is unbearable: Eva had refused stolen money on principle, showing far greater moral courage than Mrs Birling ever demonstrates.",stars:5,acc:"approximate",note:"Class prejudice; dramatic irony; Mrs Birling's culpability and blindness.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic015",work:"An Inspector Calls",char:"Mrs Birling",loc:"Act 2",themes:["Responsibility","Dramatic irony","Class"],methods:["Dramatic irony","Self-righteousness","Hubris"],text:"I blame the young man who was the father of the child... He ought to be dealt with very severely.",analysis:"Priestley's most excruciating dramatic irony: Mrs Birling unknowingly condemns her own son Eric. Her self-righteous certainty makes the coming revelation devastating. Her class prejudice and moral complacency blind her to the truth sitting at her dinner table — the play's cruelest ironic moment.",stars:5,acc:"approximate",note:"Dramatic irony; responsibility; Mrs Birling's blindness; Eric's guilt.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic016",work:"An Inspector Calls",char:"Eric",loc:"Act 3",themes:["Responsibility","Family","Guilt"],methods:["Direct address","Colloquial tone","Accusation"],text:"You're not the kind of father a chap could go to when he's in trouble.",analysis:"Eric indicts his father not just for crimes against Eva, but for fundamental failure as a parent. 'Chap' is oddly vulnerable — Eric sounds young and lost despite his guilt. The accusation exposes the emotional cost of the Birlings' values: their obsession with appearances left their own son with nowhere to turn.",stars:4,acc:"approximate",note:"Responsibility; failure of older generation; the cost of Birling's values; Eric's isolation.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic017",work:"An Inspector Calls",char:"Gerald",loc:"Act 2",themes:["Gender","Class","Power"],methods:["Objectification","Irony","Tone"],text:"She was young and pretty and warm-hearted — and intensely grateful.",analysis:"Gerald's description is superficially sympathetic but fundamentally objectifying. He values Eva for beauty and gratitude — both things that serve him. 'Intensely grateful' reveals the power imbalance: Eva depended entirely on his generosity, which he found satisfying. Priestley implicates even the seemingly kind Gerald in Eva's exploitation.",stars:4,acc:"approximate",note:"Gender and power; Gerald's responsibility; objectification of working-class women.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic018",work:"An Inspector Calls",char:"Inspector Goole",loc:"Act 1",themes:["Power","Authority","Social justice"],methods:["Stage directions","Symbolism","Tone"],text:"He speaks carefully, weightily, and has a disconcerting habit of looking hard at the person he addresses",analysis:"Priestley's stage direction defines the Inspector as an almost supernatural figure. 'Carefully, weightily' suggests deliberate moral authority. 'Disconcerting habit of looking hard' strips characters of their masks — he sees through pretence. The Inspector is less a policeman than a force of conscience made flesh.",stars:4,acc:"exact",note:"Inspector's character; symbolism; Priestley's theatrical craft; Inspector as moral force.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic019",work:"An Inspector Calls",char:"Mr Birling",loc:"Act 3",themes:["Responsibility","Capitalism","Selfishness"],methods:["Bathos","Dramatic irony","Values"],text:"Public scandal... that's what matters",analysis:"Even after learning of Eva's death and his family's roles in it, Birling's primary concern remains reputation. Priestley uses bathos — the deflation from moral crisis to social embarrassment — to expose the shallowness of the older generation's values. Appearance, not conscience, governs Birling entirely.",stars:5,acc:"approximate",note:"Birling's moral failure; appearance vs reality; contrast with Inspector's values.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-aic020",work:"An Inspector Calls",char:"Inspector Goole",loc:"Act 1",themes:["Social justice","Responsibility","Power"],methods:["Contrast","Juxtaposition","Imagery"],text:"Two hours ago a young woman died in the Infirmary",analysis:"The Inspector's intrusion into the celebratory dinner is timed to maximum moral effect. The specificity of 'two hours ago' makes Eva's death immediate and present. The contrast with champagne, engagement rings, and self-congratulation is savage — Priestley forces the comfortable to confront what their comfort costs.",stars:4,acc:"approximate",note:"Context of the Inspector's arrival; juxtaposition; Priestley's structural technique.",submittedAt:"2026-05-12T08:16:32.023Z"},

  // ============================================================
  // POWER AND CONFLICT — OZYMANDIAS (Shelley)
  // ============================================================

  {id:"1778573792023-pac001",work:"Power and Conflict",char:"Percy Bysshe Shelley",loc:"Ozymandias",themes:["Power","Hubris","Transience"],methods:["Dramatic irony","Irony","Direct speech"],text:"My name is Ozymandias, King of Kings; Look on my Works, ye Mighty, and despair!",analysis:"The tyrant's voice booms with arrogant power — 'King of Kings' claims supremacy over all rulers. The imperative 'Look on my Works' commands even the 'Mighty' to submit. Yet devastating irony means nothing remains. Shelley shows political power is an illusion; nature and time always win. The command to despair now applies to the ruin itself.",stars:5,acc:"exact",note:"Transience of power; hubris; irony; Shelley's Romantic critique of tyranny; link to Ozymandias = Ramesses II.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac002",work:"Power and Conflict",char:"Percy Bysshe Shelley",loc:"Ozymandias",themes:["Power","Nature","Transience"],methods:["Juxtaposition","Alliteration","Imagery"],text:"Nothing beside remains. Round the decay / Of that colossal Wreck, boundless and bare / The lone and level sands stretch far away.",analysis:"The final lines enact the poem's meaning. Alliterative 'lone and level' and 'boundless and bare' use slow open sounds to evoke vast emptiness. 'Colossal Wreck' pairs grandeur with ruin. The sands' indifference is the poem's last word — nature erases all human power claims without comment or ceremony.",stars:5,acc:"exact",note:"Nature's power; transience; Shelley's Romantic ideology; the sublime; effective closing image.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac003",work:"Power and Conflict",char:"Percy Bysshe Shelley",loc:"Ozymandias",themes:["Power","Art","Hubris"],methods:["Imagery","Oxymoron","Personification"],text:"whose frown, / And wrinkled lip, and sneer of cold command",analysis:"The sculptor has preserved Ozymandias's contempt in stone. 'Sneer of cold command' is almost oxymoronic — cold and command suggest detachment fused with dominance. Ironically the sculptor's art outlasts the ruler's empire, subtly suggesting artistic power may surpass political power.",stars:4,acc:"exact",note:"Art vs political power; hubris; the sculptor's subtle subversion of the tyrant.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac004",work:"Power and Conflict",char:"Percy Bysshe Shelley",loc:"Ozymandias",themes:["Power","Transience","Nature"],methods:["Imagery","Fragmentation","Irony"],text:"Two vast and trunkless legs of stone / Stand in the desert",analysis:"Legs without a body — the image is immediately absurd, physically enacting the collapse of power. 'Vast' suggests former greatness; 'trunkless' its destruction. The statue still 'stands' but is ridiculous rather than awe-inspiring. Shelley uses the broken body as a metaphor for the broken empire.",stars:4,acc:"exact",note:"Fragmentation of power; visual irony; nature's destruction of human legacy.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac005",work:"Power and Conflict",char:"Percy Bysshe Shelley",loc:"Ozymandias",themes:["Power","Art"],methods:["Irony","Structure","Narrative frame"],text:"I met a traveller from an antique land",analysis:"The framing device distances Shelley from the account — the poem is a story within a story within a story. This layering reinforces the theme of distance and decay: Ozymandias is so remote his story reaches us third-hand. Yet his arrogance still echoes across all that distance and time.",stars:3,acc:"exact",note:"Narrative structure; irony of distance; the antique world vs modernity.",submittedAt:"2026-05-12T08:16:32.023Z"},

  // ============================================================
  // POWER AND CONFLICT — THE PRELUDE (Wordsworth)
  // ============================================================

  {id:"1778573792023-pac010",work:"Power and Conflict",char:"William Wordsworth",loc:"The Prelude (Stealing the Boat)",themes:["Nature","Power","Guilt"],methods:["Personification","Repetition","Tone"],text:"a huge peak, black and huge, / As if with voluntary power instinct / Upreared its head",analysis:"Nature acts with terrifying agency — 'voluntary power instinct' makes the mountain an autonomous moral force. Repetition of 'huge' emphasises scale and dominance. 'Upreared its head' is violently biological, like a serpent or predator. Wordsworth presents nature as morally responsive, punishing transgression.",stars:5,acc:"exact",note:"Nature's power; the sublime; guilt; nature as moral teacher; Romantic ideology.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac011",work:"Power and Conflict",char:"William Wordsworth",loc:"The Prelude (Stealing the Boat)",themes:["Nature","Power","Identity"],methods:["Enjambment","Imagery","Tone shift"],text:"for many days, my brain / Worked with a dim and undetermined sense / Of unknown modes of being",analysis:"The experience leaves a permanent mark on Wordsworth's consciousness. 'Dim and undetermined' captures how the sublime resists rational processing. 'Unknown modes of being' suggests nature has revealed dimensions of existence beyond ordinary human understanding — the encounter cannot be explained away.",stars:5,acc:"exact",note:"Lasting power of nature; the sublime; how nature shapes identity; Romantic experience.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac012",work:"Power and Conflict",char:"William Wordsworth",loc:"The Prelude (Stealing the Boat)",themes:["Nature","Power","Freedom"],methods:["Imagery","Contrast","Tone"],text:"It was an act of stealth / And troubled pleasure",analysis:"The coupling of 'stealth' and 'pleasure' creates moral ambiguity — the boy knows he is doing wrong and enjoys it. This honest confession of transgression sets up the natural world's response. Wordsworth doesn't idealise the child; he is shown as guilty, making the subsequent punishment more morally resonant.",stars:4,acc:"exact",note:"Human transgression vs nature; guilt; honesty of the speaker; moral framework.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac013",work:"Power and Conflict",char:"William Wordsworth",loc:"The Prelude (Stealing the Boat)",themes:["Nature","Power","Childhood"],methods:["Imagery","Sibilance","Tone"],text:"small circles glittering idly in the moon, / Until they melted all into one track / Of sparkling light",analysis:"Before nature's punishment comes a moment of pure beauty. Sibilance in 'small circles', 'sparkling' creates a hushed, magical quality. The water's loveliness makes the mountain's sudden appearance more shocking by contrast. Wordsworth structures the extract as a fall from innocent pleasure into guilty terror.",stars:3,acc:"exact",note:"Contrast of beauty and terror; the sublime; Romantic celebration of nature; structural contrast.",submittedAt:"2026-05-12T08:16:32.023Z"},

  // ============================================================
  // POWER AND CONFLICT — MY LAST DUCHESS (Browning)
  // ============================================================

  {id:"1778573792023-pac020",work:"Power and Conflict",char:"Robert Browning",loc:"My Last Duchess",themes:["Power","Control","Gender"],methods:["Euphemism","Enjambment","Dramatic monologue"],text:"I gave commands; / Then all smiles stopped together.",analysis:"Browning's most chilling euphemism. 'I gave commands' suggests ordering rather than killing, maintaining aristocratic distance from the act of murder. The enjambment creates a pause that mirrors the cessation of life. The passive construction ('stopped') removes agency from the Duke while still damning him utterly.",stars:5,acc:"exact",note:"Power and control; gender; the Duke as villain; Browning's dramatic monologue technique; implied murder.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac021",work:"Power and Conflict",char:"Robert Browning",loc:"My Last Duchess",themes:["Power","Control","Art"],methods:["Possessive language","Imagery","Control"],text:"since none puts by / The curtain I have drawn for you, but I",analysis:"The Duke controls even access to the Duchess's portrait — only he decides who sees her. The curtain is a symbol of total ownership: in death as in life, she is his possession. Browning shows how the Duke's desire to control her smile extended beyond her life into her very image.",stars:5,acc:"exact",note:"Power and possession; objectification; the Duke's controlling nature; art as domination.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac022",work:"Power and Conflict",char:"Robert Browning",loc:"My Last Duchess",themes:["Power","Gender","Jealousy"],methods:["Listing","Jealous tone","Dramatic monologue"],text:"She had / A heart — how shall I say? — too soon made glad, / Too easily impressed",analysis:"The Duke complains that the Duchess was too kind, too human. His pause ('how shall I say?') performs false modesty — he knows exactly what he means. 'Too soon made glad' is the language of a man who wanted to be her only source of joy. His jealousy is revealed as a desire for absolute emotional monopoly.",stars:4,acc:"exact",note:"Jealousy; power and control; the Duke's unreliability; Browning's critique of patriarchal possession.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac023",work:"Power and Conflict",char:"Robert Browning",loc:"My Last Duchess",themes:["Power","Class","Control"],methods:["Hubris","Tone","Class diction"],text:"I choose / Never to stoop",analysis:"The Duke refuses to explain his displeasure to the Duchess — doing so would mean descending to her social level. 'Stoop' is the key word: his pride prevented the conversation that might have saved her life. Browning shows how aristocratic arrogance and toxic masculinity are fatally intertwined.",stars:5,acc:"exact",note:"Aristocratic pride; power; the Duke's fatal arrogance; Browning's critique of class.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac024",work:"Power and Conflict",char:"Robert Browning",loc:"My Last Duchess",themes:["Power","Art","Control"],methods:["Possessive language","Objectification","Opening"],text:"That's my last Duchess painted on the wall, / Looking as if she were alive.",analysis:"The opening immediately establishes the Duke as a man who possesses women — 'my last Duchess' treats her as one in a series of objects. 'Looking as if she were alive' is quietly devastating: the painting captures her vitality but she is dead. He prefers her this way — controllable, silent, permanently beautiful.",stars:5,acc:"exact",note:"Possessive language; power; objectification of women; dramatic opening; the Duke's character.",submittedAt:"2026-05-12T08:16:32.023Z"},

  // ============================================================
  // POWER AND CONFLICT — CHARGE OF THE LIGHT BRIGADE (Tennyson)
  // ============================================================

  {id:"1778573792023-pac030",work:"Power and Conflict",char:"Alfred Lord Tennyson",loc:"The Charge of the Light Brigade",themes:["Conflict","Power","Duty","Death"],methods:["Repetition","Rhythm","Anaphora"],text:"Cannon to right of them, / Cannon to left of them, / Cannon in front of them",analysis:"Relentless anaphora of 'Cannon' traps the soldiers in a triangle of fire — there is literally no escape. The repetition mirrors the mechanical relentlessness of artillery bombardment. Tennyson's dactylic rhythm throughout mimics galloping hooves, giving the poem kinetic energy even as it describes slaughter.",stars:5,acc:"exact",note:"Conflict; the reality of war; rhythm as meaning; soldiers trapped by duty and incompetent command.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac031",work:"Power and Conflict",char:"Alfred Lord Tennyson",loc:"The Charge of the Light Brigade",themes:["Conflict","Duty","Power"],methods:["Understatement","Tone","Ambiguity"],text:"Someone had blundered",analysis:"Three words that carry enormous weight. 'Someone' is deliberately vague — Tennyson implicates unnamed commanders without causing a political scandal. 'Blundered' is almost gentle for what was catastrophic incompetence that sent 600 men to their deaths. The understatement makes the line more cutting than outrage would.",stars:5,acc:"exact",note:"Critique of military command; power; responsibility; Tennyson's careful use of understatement.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac032",work:"Power and Conflict",char:"Alfred Lord Tennyson",loc:"The Charge of the Light Brigade",themes:["Conflict","Duty","Death"],methods:["Rhyme","Rhetoric","Tone"],text:"Theirs not to reason why, / Theirs but to do and die",analysis:"The rhyme of 'why' and 'die' is grimly purposeful — questioning and dying are the only options, and the soldiers choose dying over questioning. Tennyson neither condemns nor glorifies this; he presents it as the soldier's reality. The poem honours the men while quietly indicting the system that sacrificed them.",stars:5,acc:"exact",note:"Duty vs reason; power of command; soldiers' nobility; Tennyson's ambiguous tribute.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac033",work:"Power and Conflict",char:"Alfred Lord Tennyson",loc:"The Charge of the Light Brigade",themes:["Conflict","Death","Memory"],methods:["Imperative","Tone","Elegy"],text:"Honour the charge they made! / Honour the Light Brigade, / Noble six hundred!",analysis:"The poem closes with an imperative demand for remembrance. The exclamation marks are insistent and emotional. 'Noble six hundred' is an elegy compressed into three words. Tennyson insists that courage in the face of incompetent command deserves permanent memorial — even if the mission was futile.",stars:4,acc:"exact",note:"Memory and commemoration; the soldier's nobility; Tennyson's elegiac purpose; power of command.",submittedAt:"2026-05-12T08:16:32.023Z"},

  // ============================================================
  // POWER AND CONFLICT — EXPOSURE (Owen)
  // ============================================================

  {id:"1778573792023-pac040",work:"Power and Conflict",char:"Wilfred Owen",loc:"Exposure",themes:["Conflict","Nature","Suffering","Death"],methods:["Repetition","Refrain","Tone"],text:"But nothing happens.",analysis:"Owen's repeated refrain is devastating in its flat simplicity. The soldiers wait for battle — the traditional subject of war poetry — but it never comes. Instead they are killed slowly by cold and boredom. The full stop after each repetition is a door closing. 'Nothing happens' is the truest and most terrible statement of trench warfare.",stars:5,acc:"exact",note:"The reality of WWI; nature as enemy; anti-war; Owen's subversion of heroic war poetry expectations.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac041",work:"Power and Conflict",char:"Wilfred Owen",loc:"Exposure",themes:["Conflict","Nature","Death","Suffering"],methods:["Personification","Sibilance","Imagery"],text:"Our brains ache, in the merciless iced east winds that knive us",analysis:"Nature is a weapon — 'knive us' gives the wind a murderous agency equal to any enemy soldier. 'Merciless' denies nature the consolation of indifference; it actively refuses pity. The sibilance of 'iced east winds' creates a hissing, cutting sound that physically enacts the pain described.",stars:5,acc:"exact",note:"Nature as enemy; suffering; Owen's use of sound; the physical reality of trench warfare.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac042",work:"Power and Conflict",char:"Wilfred Owen",loc:"Exposure",themes:["Conflict","Death","Home","Faith"],methods:["Imagery","Contrast","Tone"],text:"Slowly our ghosts drag home: glimpsing the sunk fires, glozed / With crusted dark-red jewels",analysis:"The soldiers' imagined return home is spectral — they are already 'ghosts', half-dead. The 'sunk fires' suggest warmth dying; 'crusted dark-red jewels' makes embers sound like blood clots. Home is presented as already fading. Owen denies the soldiers even the consolation of imagined return.",stars:4,acc:"exact",note:"Home and alienation; soldiers as already dead; Owen's imagery; the futility of comfort.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac043",work:"Power and Conflict",char:"Wilfred Owen",loc:"Exposure",themes:["Death","Faith","Conflict"],methods:["Rhetorical question","Tone","Religion"],text:"Is it that we are dying?",analysis:"A quietly devastating question buried in the poem. The soldiers cannot tell if they are alive or dead — the experience of trench warfare has blurred that boundary entirely. Owen suggests that the men who survive physically may have already died in every meaningful sense. Faith and afterlife offer no comfort.",stars:4,acc:"exact",note:"Death and dying; faith; the psychological horror of war; Owen's questioning of religion and purpose.",submittedAt:"2026-05-12T08:16:32.023Z"},

  // ============================================================
  // POWER AND CONFLICT — STORM ON THE ISLAND (Heaney)
  // ============================================================

  {id:"1778573792023-pac050",work:"Power and Conflict",char:"Seamus Heaney",loc:"Storm on the Island",themes:["Nature","Power","Conflict","Fear"],methods:["Irony","Volta","Tone shift"],text:"Strange, it is a huge nothing that we fear.",analysis:"The poem's closing line is its most philosophically rich. The 'huge nothing' seems contradictory — nothingness cannot be huge — yet Heaney captures the terror of invisible power perfectly. The storm cannot be seen, only felt. 'Strange' marks the speaker's own surprised realisation: fear of absence is somehow more primal than fear of presence.",stars:5,acc:"exact",note:"Nature's power; the invisible vs visible; fear; Heaney's volta; ambiguity of 'nothing'; link to Northern Irish conflict.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac051",work:"Power and Conflict",char:"Seamus Heaney",loc:"Storm on the Island",themes:["Nature","Power","Conflict"],methods:["Military metaphor","Tone","Imagery"],text:"the wind dives / And strafes invisibly",analysis:"Military language applied to nature — 'strafes' is a WWII term for low-level aerial gunfire. Heaney collapses the distinction between natural and human violence, suggesting both are equally arbitrary and deadly. 'Invisibly' makes the attack more terrifying — you cannot prepare for what you cannot see.",stars:5,acc:"exact",note:"Nature as conflict; military metaphor; the invisible enemy; link to political conflict in Northern Ireland.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac052",work:"Power and Conflict",char:"Seamus Heaney",loc:"Storm on the Island",themes:["Nature","Power","Preparation"],methods:["Direct address","Tone","Understatement"],text:"We are prepared: we build our houses squat",analysis:"The poem opens with confident human preparation — 'We are prepared' is almost defiant. But as the poem develops, this confidence is revealed as inadequate against the storm's absolute power. The squat houses, the lack of trees, the stored crops: all fail. Heaney charts the collapse of human self-assurance.",stars:4,acc:"exact",note:"Human vs nature; preparation and failure; the poem's structural arc; Heaney's irony.",submittedAt:"2026-05-12T08:16:32.023Z"},

  // ============================================================
  // POWER AND CONFLICT — BAYONET CHARGE (Hughes)
  // ============================================================

  {id:"1778573792023-pac060",work:"Power and Conflict",char:"Ted Hughes",loc:"Bayonet Charge",themes:["Conflict","Fear","Identity","Duty"],methods:["Enjambment","Pace","Imagery"],text:"Suddenly he awoke and was running — raw / In raw-seamed hot khaki",analysis:"The poem begins mid-action, disorienting the reader as the soldier is disoriented. 'Suddenly' drops us into chaos without context. 'Raw' repeated twice — exposed, unprocessed, animal. The khaki uniform no longer represents honour; it is just hot, scratching fabric. Hughes strips war of all heroic abstraction.",stars:5,acc:"exact",note:"The reality of combat; stripping away ideology; pace and enjambment; anti-war.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac061",work:"Power and Conflict",char:"Ted Hughes",loc:"Bayonet Charge",themes:["Conflict","Identity","Ideology"],methods:["Bathos","Imagery","Tone"],text:"King, honour, human dignity, etcetera / Dropped like luxuries in a yelling alarm",analysis:"'Etcetera' is one of the most devastating words in war poetry — the abstract values men are told they fight for are dismissed with bureaucratic indifference. 'Dropped like luxuries' makes patriotism a non-essential in survival. Hughes argues that the realities of combat annihilate ideology instantly and completely.",stars:5,acc:"exact",note:"Ideology vs reality of war; 'etcetera' as key word; Hughes's anti-war argument; patriotism critiqued.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac062",work:"Power and Conflict",char:"Ted Hughes",loc:"Bayonet Charge",themes:["Conflict","Nature","Fear"],methods:["Simile","Imagery","Contrast"],text:"a yellow hare that rolled like a flame / And crawled in a threshing circle",analysis:"A hare caught in the crossfire becomes a symbol of all innocent life destroyed by war. 'Rolled like a flame' fuses animal and fire — the hare dying resembles burning. 'Threshing circle' suggests both the mechanised violence of battle and harvest imagery, hinting at wasted life and wasted potential.",stars:4,acc:"exact",note:"Innocent life destroyed by war; nature vs conflict; Hughes's imagery; the hare as symbol.",submittedAt:"2026-05-12T08:16:32.023Z"},

  // ============================================================
  // POWER AND CONFLICT — REMAINS (Armitage)
  // ============================================================

  {id:"1778573792023-pac070",work:"Power and Conflict",char:"Simon Armitage",loc:"Remains",themes:["Conflict","Guilt","PTSD","Memory"],methods:["Colloquial tone","Graphic imagery","Repetition"],text:"the drink and drugs won't flush him out — he's here in my head when I close my eyes",analysis:"The soldier cannot escape the man he killed through any means. 'Flush him out' is military language turned inward — the enemy is now inside his own mind. The casualness of 'drink and drugs' makes the coping mechanisms heartbreaking rather than shocking. Armitage captures PTSD with forensic honesty.",stars:5,acc:"exact",note:"PTSD; the psychological cost of war; guilt; Armitage's colloquial voice; modern conflict.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac071",work:"Power and Conflict",char:"Simon Armitage",loc:"Remains",themes:["Conflict","Guilt","Responsibility"],methods:["Compound imagery","Metaphor","Blunt tone"],text:"his blood-shadow stays on the street",analysis:"'Blood-shadow' is Armitage's most powerful compound image — a shadow is something cast by presence, permanent and inescapable, yet blood suggests violence. The stain on the street is a metaphor for the stain on the soldier's conscience. It cannot be washed away; it is now part of both the landscape and the speaker's psyche.",stars:5,acc:"exact",note:"Guilt and memory; the permanence of violence; imagery; the psychological cost of modern warfare.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac072",work:"Power and Conflict",char:"Simon Armitage",loc:"Remains",themes:["Conflict","Guilt","Responsibility"],methods:["Ambiguity","Tone","Slow motion imagery"],text:"I see every round as it rips through his life — / I see his face, the empty sleeve",analysis:"'Rips through his life' uses 'life' ambiguously — the bullet tears through his body and destroys his entire existence simultaneously. The soldier replays the killing in slow motion, unable to stop. 'Empty sleeve' is a specific haunting detail — particular enough to be real, disturbing enough to be unforgettable.",stars:4,acc:"exact",note:"PTSD; the haunting detail of guilt; ambiguity; Armitage's realism.",submittedAt:"2026-05-12T08:16:32.023Z"},

  // ============================================================

  {id:"1778573792023-pac080",work:"Power and Conflict",char:"Jane Weir",loc:"Poppies",themes:["Conflict","Loss","Memory","Family"],methods:["Domestic imagery","Contrast","Sensory detail"],text:"Before you left, I pinned one onto your lapel, crimped and pressed, like a corsage",analysis:"The poppy — symbol of war remembrance — is here pinned by a mother onto her son as if for a formal celebration. 'Corsage' suggests a wedding or prom. Weir creates devastating contrast through domestic tenderness and the conventions of celebration, masking the reality of departure for war.",stars:5,acc:"exact",note:"Domestic vs conflict; the mother's perspective; poppy symbolism; contrast and irony.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac081",work:"Power and Conflict",char:"Jane Weir",loc:"Poppies",themes:["Loss","Memory","Family","Conflict"],methods:["Imagery","Sensory detail","Metaphor"],text:"I listened, hoping to hear / your playground voice catching on the wind",analysis:"The mother listens for a child's voice — not a soldier's. 'Playground voice' regresses her son to childhood innocence. The wind that might carry his voice is the same wind that carries away the dead. Weir powerfully suggests that for a mother, the child never stops being a child regardless of what war makes him.",stars:5,acc:"exact",note:"A mother's grief; memory; loss; the child vs the soldier; sensory detail.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac082",work:"Power and Conflict",char:"Jane Weir",loc:"Poppies",themes:["Loss","Memory","Freedom"],methods:["Extended metaphor","Imagery","Release"],text:"released a song bird from its cage",analysis:"The mother's act of letting her son go is figured as releasing a bird — beautiful, free, but also irreversible. The cage is her home and her love; the song bird is the son she raised. The metaphor captures the paradox of good parenting: to love fully is eventually to release. But the bird may not return.",stars:4,acc:"exact",note:"Loss and letting go; freedom vs protection; extended metaphor; the mother's sacrifice.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac090",work:"Power and Conflict",char:"Carol Ann Duffy",loc:"War Photographer",themes:["Conflict","Memory","Guilt","Distance"],methods:["Contrast","Imagery","Tone"],text:"Rural England. Home again / to ordinary pain which simple weather can dispel",analysis:"The contrast between rural England and war zones is Duffy's central device. England's 'ordinary pain' — grief, heartbreak, bad weather — is trivial against the suffering the photographer has witnessed. 'Simple weather can dispel' implies that English suffering is merely inconvenient, not existential. The gap between worlds is Duffy's critique.",stars:5,acc:"exact",note:"The gulf between home and conflict; complicity; Duffy's critique of Western indifference; contrast.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac091",work:"Power and Conflict",char:"Carol Ann Duffy",loc:"War Photographer",themes:["Conflict","Memory","Responsibility"],methods:["Imagery","Tone","Irony"],text:"A hundred agonies in black-and-white / from which his editor will pick out five or six",analysis:"The reduction of human suffering to editorial selection is devastating. 'A hundred agonies' are real deaths, real pain; 'five or six' are what the public will see. The poet implicates the media in packaging suffering for consumption. 'Agonies' is deliberately strong against the mechanical language of 'pick out'.",stars:5,acc:"exact",note:"Media and conflict; complicity; the commercialisation of suffering; Duffy's critique.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac100",work:"Power and Conflict",char:"Imtiaz Dharker",loc:"Tissue",themes:["Power","Transience","Identity","Nature"],methods:["Extended metaphor","Imagery","Tone"],text:"Paper that lets the light / shine through",analysis:"Dharker's central metaphor: tissue paper that is translucent, fragile, and beautiful. The light shining through represents truth or humanity — something that cannot be fully contained by the paper (maps, money, records) humans use to construct power. The very things we use to assert control are revealed as permeable and temporary.",stars:5,acc:"exact",note:"Transience of power; tissue as extended metaphor; light as truth; fragility of human systems.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac102",work:"Power and Conflict",char:"Imtiaz Dharker",loc:"Tissue",themes:["Power","Identity","Humanity"],methods:["Imagery","Closing","Tone"],text:"turned into your skin",analysis:"The poem's closing image fuses tissue paper with human skin — both fragile, both temporary, both beautiful when light passes through them. Dharker suggests that true human identity cannot be captured in maps, money, or legal documents. The skin we are born in is the only real document; all others are mere tissue.",stars:5,acc:"exact",note:"Identity; the limits of power; skin as the true document; Dharker's poetic resolution.",submittedAt:"2026-05-12T08:16:32.023Z"},

  {id:"1778573792023-pac111",work:"Power and Conflict",char:"Beatrice Garland",loc:"Kamikaze",themes:["Conflict","Nature","Identity","Choice"],methods:["Imagery","Contrast","Sensory detail"],text:"shoals of silver fish / flashing silver as their bellies",analysis:"The poem's central turning point: the pilot sees fish and remembers his father's stories of the sea. The natural beauty of the fish — their silver flashing, their freedom — awakens something the military ideology tried to extinguish. Nature becomes the force that overrides the death instinct. The fish live; why shouldn't he?",stars:5,acc:"exact",note:"Nature vs ideology; the moment of choice; beauty as a reason to live; contrast with military duty.",submittedAt:"2026-05-12T08:16:32.023Z"},

// SM-2 SPACED REPETITION
// ════════════════════════════════════════════════
function sm2(card, grade) {
  // grade: 0=again, 1=hard, 2=good, 3=easy
  let {ef=2.5, interval=0, reps=0, due} = card.srs||{};
  if(grade<1){reps=0;interval=1;}
  else{
    reps++;
    if(reps===1)interval=1;
    else if(reps===2)interval=6;
    else interval=Math.round(interval*ef);
    ef=Math.max(1.3,ef+(0.1-(3-grade)*(0.08+(3-grade)*0.02)));
  }
  const d=new Date();d.setDate(d.getDate()+interval);
  return{ef,interval,reps,due:d.toISOString().slice(0,10)};
}
function isDue(srs){if(!srs||!srs.due)return true;return srs.due<=new Date().toISOString().slice(0,10);}
function dueCount(){return allQ().filter(q=>isDue(q.srs||{})).length;}

// USERNAME & LEADERBOARD
// ════════════════════════════════════════════════
function getUsername(){
  // Try own key first, then DateVault's key for cross-site detection
  return localStorage.getItem('qv_username') || localStorage.getItem('dv_username') || null;
}
function setUsername(u){
  localStorage.setItem('qv_username',u);
}

function lbUpdate(){
  const u=getUsername();
  if(!u)return;
  fetch(WORKER_URL+'/lb/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:u,site:'qv',mastered:S.mastered.size,xp:S.xp})
  }).catch(()=>{});
}

function onMastery(){
  const u=getUsername();
  if(!u){showUsernameModal(()=>lbUpdate());}
  else{lbUpdate();}
}

function showUsernameModal(onConfirm){
  const crossSite=localStorage.getItem('dv_username');
  const suggestion=crossSite?` value="${crossSite}"`:'';
  openModal(`<div>
    <div style="font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);margin-bottom:6px">🏆 Join the Leaderboard!</div>
    <div style="font-size:.75rem;color:var(--text2);margin-bottom:12px;line-height:1.6">
      You just mastered a quote! Choose a username to appear on the leaderboard.<br>
      <span style="color:var(--text3)">3–20 chars · letters, numbers, _ or - · saved locally · no password needed</span>
      ${crossSite?`<br><span style="color:var(--teal2)">✓ Found your DateVault username pre-filled</span>`:''}
    </div>
    <div class="fg">
      <label>Username</label>
      <input type="text" id="lb-uname" placeholder="e.g. LitLegend99" maxlength="20"${suggestion} oninput="lbCheckName(this.value)">
    </div>
    <div id="lb-name-err" style="font-size:.72rem;margin-bottom:8px"></div>
    <div style="display:flex;gap:8px">
      <button class="btn bg" onclick="lbConfirmUsername()">✓ Set Username</button>
      <button class="btn" onclick="closeModal()">Skip for now</button>
    </div>
  </div>`);
  window._lbCb=onConfirm||null;
  setTimeout(()=>{const el=document.getElementById('lb-uname');if(el){el.focus();el.select();}},80);
}

function lbCheckName(v){
  const el=document.getElementById('lb-name-err');if(!el)return;
  if(v.length<3){el.innerHTML=`<span style="color:var(--coral)">Too short (min 3)</span>`;return;}
  if(v.length>20){el.innerHTML=`<span style="color:var(--coral)">Too long (max 20)</span>`;return;}
  if(!/^[a-zA-Z0-9_-]+$/.test(v)){el.innerHTML=`<span style="color:var(--coral)">Only letters, numbers, _ or -</span>`;return;}
  el.innerHTML=`<span style="color:var(--teal2)">✓ Looks good</span>`;
}

async function lbConfirmUsername(){
  const inp=document.getElementById('lb-uname');
  if(!inp)return;
  const v=inp.value.trim();
  if(v.length<3||v.length>20||!/^[a-zA-Z0-9_-]+$/.test(v)){toast('⚠ Invalid username');return;}
  try{
    const r=await fetch(WORKER_URL+'/lb/get?username='+encodeURIComponent(v));
    const d=await r.json();
    if(d.found&&d.user.username.toLowerCase()!==v.toLowerCase()){
      document.getElementById('lb-name-err').innerHTML=`<span style="color:var(--coral)">Username taken — try another</span>`;
      return;
    }
  }catch(e){/* non-fatal */}
  setUsername(v);
  closeModal();
  toast('👤 Username set: '+v);
  if(window._lbCb){window._lbCb();window._lbCb=null;}
  lbUpdate();
}

// ════════════════════════════════════════════════
function shuf(a){return[...a].sort(()=>Math.random()-.5);}
function pct(n,d){return d?Math.round(n/d*100):0;}
function addXP(n){S.xp+=n;save();}

function normQ(s){
  return s.toLowerCase()
    .replace(/['']/g,"'").replace(/[""]/g,'"')
    .replace(/\s+/g,' ').replace(/[^a-z0-9 ',.-]/g,'').trim();
}

function sim(a,b){
  const na=normQ(a),nb=normQ(b);
  if(na===nb)return 1;
  const wa=na.split(' ').filter(w=>w.length>2);
  const wb=new Set(nb.split(' ').filter(w=>w.length>2));
  if(!wa.length||!wb.size)return 0;
  let c=0;wa.forEach(w=>{if(wb.has(w))c++;});
  return(2*c)/(wa.length+wb.size);
}

function bestMatch(inp,pool){
  let best=0,q=null;
  pool.forEach(p=>{const s=sim(inp,p.text);if(s>best){best=s;q=p;}});
  return{score:best,quote:q};
}

function works(){return['All',...new Set(allQ().map(q=>q.work))];}

function backBtn(){return S.hist.length?`<button class="bback" onclick="goBack()">← Back</button>`:''}

        <div class="fc-sub">${(q.analysis||'').slice(0,180)}…</div>
      </div>
    </div>
  </div>
  ${S.fc.flipped?`
  <div style="display:flex;gap:7px;justify-content:center;margin-top:11px;flex-wrap:wrap">
    <button class="btn" style="color:var(--coral);border-color:var(--coral)" onclick="rateFC(${q.id},0)">😰 Again (+2)</button>
    <button class="btn" style="color:var(--amber);border-color:var(--amber)" onclick="rateFC(${q.id},1)">🤔 Hard (+5)</button>
    <button class="btn" style="color:var(--teal);border-color:var(--teal)" onclick="rateFC(${q.id},2)">😊 Easy (+10)</button>
    <button class="btn bg" onclick="rateFC(${q.id},3)">✓ Mastered! (+20)</button>
  </div>
  <div style="font-size:.7rem;color:var(--text3);text-align:center;margin-top:7px">
    ${srs.interval?`SRS: next in ${srs.interval}d · Ease: ${(srs.ef||2.5).toFixed(1)}`:'New card — not yet scheduled'}
  </div>`:`
  <div style="display:flex;gap:7px;justify-content:center;margin-top:11px">
    <button class="btn" onclick="S.fc.idx=Math.max(0,S.fc.idx-1);S.fc.flipped=false;render()">← Prev</button>
    <button class="btn bp" onclick="S.fc.idx++;S.fc.flipped=false;render()">Next →</button>
  </div>`}
  <div style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-top:9px">
    ${(q.themes||[]).map(t=>`<span class="tag tb">${t}</span>`).join('')}
    ${(q.methods||[]).map(m=>`<span class="tag tc">${m}</span>`).join('')}
  </div>
  </div>`;
}
function rateFC(id,grade){
  const xpMap=[2,5,10,20];addXP(xpMap[grade]);
  const srs=sm2({...qSRS(id)},grade);
  setQSRS(id,srs);
  if(grade>=2)S.learning.add(id);
  if(grade===3){S.mastered.add(id);S.learning.delete(id);onMastery();}
  S.fc.idx++;S.fc.flipped=false;
  save();toast(`+${xpMap[grade]} XP · Next review: ${srs.interval}d`);render();
}

// FILL THE BLANKS
// ════════════════════════════════════════════════
function rFill(){
  const ws=works();
  if(!S.fill.active){return`<div>
    ${backBtn()}
    <div class="pt">Fill the Blanks</div>
    <div class="ps">Key words are hidden — type to complete the quote exactly</div>
    <div class="card" style="max-width:400px">
      <div class="fg"><label>Text</label><select id="fi-w">${ws.map(w=>`<option>${w}</option>`).join('')}</select></div>
      <button class="btn bp bblk" onclick="startFill()">Start →</button>
    </div></div>`;}
  const {q,blanks,vals,checked}=S.fill;
  const words=q.text.split(' ');
  let display='';
  words.forEach((w,i)=>{
    const clean=w.replace(/[^a-zA-Z']/g,'');
    if(blanks.includes(i)){
      const v=vals[i]||'';
      let cls='blinp';
      if(checked){cls+=(clean.toLowerCase()===v.trim().toLowerCase()?' bok':' berr');}
      display+=`<input class="${cls}" id="b${i}" value="${v}" ${checked?'disabled':''} oninput="S.fill.vals[${i}]=this.value" onkeydown="if(event.key==='Enter')checkFill()"> `;
    } else {
      display+=`<span style="font-family:'Playfair Display',serif;font-style:italic">${w} </span>`;
    }
  });
  const allOk=checked&&blanks.every(i=>{
    const w=q.text.split(' ')[i].replace(/[^a-zA-Z']/g,'');
    return w.toLowerCase()===(S.fill.vals[i]||'').trim().toLowerCase();
  });
  return`<div>
  ${backBtn()}
  <div class="pt">Fill the Blanks</div>
  <div class="ps" style="margin-bottom:7px">${q.char} · ${q.work} · ${q.loc}</div>
  <div style="font-size:.7rem;color:var(--text2);margin-bottom:8px">Themes: ${(q.themes||[]).join(', ')}</div>
  <div class="card" style="line-height:2.3;font-size:.92rem;margin-bottom:9px;word-spacing:2px">${display}</div>
  ${!checked?`<div style="display:flex;gap:7px">
    <button class="btn bp" onclick="checkFill()">Check</button>
    <button class="btn" onclick="startFill()">New Quote</button>
  </div>`:`
  <div class="qfb ${allOk?'qok':'qwr'}" style="margin-bottom:9px">
    ${allOk?'✅ Perfect!':'❌ Correction:'} <em>"${q.text}"</em>
    <div style="font-size:.72rem;color:var(--text2);margin-top:4px">${q.analysis||''}</div>
  </div>
  <button class="btn bp" onclick="startFill()">Next →</button>`}
  </div>`;
}
function startFill(){
  const work=document.getElementById('fi-w')?.value||S.fill.work||'All';
  S.fill.work=work;
  const pool=work==='All'?allQ():allQ().filter(q=>q.work===work);
  const q=shuf(pool)[0];
  const words=q.text.split(' ');
  const blanks=[];
  words.forEach((w,i)=>{if(w.length>4&&Math.random()<0.4)blanks.push(i);});
  if(!blanks.length)blanks.push(Math.floor(words.length/2));
  S.fill={active:true,q,blanks,vals:{},checked:false,work};render();
}
function checkFill(){S.fill.checked=true;render();}

function rQuiz(){
  if(!S.quiz.active)return rQuizSetup();
  if(S.quiz.idx>=S.quiz.qs.length)return rQuizEnd();
  return rQuizQ();
}
function rQuizSetup(){
  return`<div>
  ${backBtn()}
  <div class="pt">Quiz</div>
  <div class="ps">Typed answers — no hints, no multiple choice</div>
  <div class="card" style="max-width:400px">
    <div class="fg"><label>Text</label><select id="qw">${works().map(w=>`<option>${w}</option>`).join('')}</select></div>
    <div class="fg"><label>Quiz type</label><select id="qt">
      <option value="who_said">Who said this? (type character name)</option>
      <option value="complete">Complete the quote (type the rest)</option>
      <option value="first_word">First word given — type full quote</option>
      <option value="theme_recall">Given theme → type a quote</option>
      <option value="method">Identify literary method used</option>
      <option value="loc">Which act/stave/scene?</option>
      <option value="analysis">What does this quote show? (key point)</option>
    </select></div>
    <div class="fg"><label>Questions</label><select id="qn"><option value="5">5</option><option value="10" selected>10</option><option value="15">15</option><option value="20">20</option></select></div>
    <button class="btn bp bblk" onclick="startQuiz()">Start Quiz →</button>
  </div></div>`;
}
function startQuiz(){
  const w=document.getElementById('qw').value;
  const t=document.getElementById('qt').value;
  const n=+document.getElementById('qn').value;
  const qs=allQ();
  let pool=w==='All'?qs:qs.filter(q=>q.work===w);
  if(pool.length<4)pool=qs;
  S.quiz={active:true,work:w,type:t,num:n,qs:shuf(pool).slice(0,n),idx:0,score:0,ans:'',checked:false};
  render();
}
function rQuizQ(){
  const {qs,idx,score,type,checked,ans}=S.quiz;
  const q=qs[idx];
  let prompt='',instr='',correct='',ph='',isLong=false;

  if(type==='who_said'){
    // Show quote WITHOUT character name, ask for character
    prompt=`"${q.text}"<div style="font-size:.7rem;color:var(--text3);margin-top:5px">${q.work} · ${q.loc}</div>`;
    instr='Who said this? Type the character name.';
    correct=q.char;ph='Type character name…';
  } else if(type==='complete'){
    const ws=q.text.split(' ');const half=Math.ceil(ws.length/2);
    prompt=`"${ws.slice(0,half).join(' ')} ___"<div style="font-size:.7rem;color:var(--text3);margin-top:5px">${q.work} · ${q.char} · ${q.loc}</div>`;
    instr='Complete the rest of this quote exactly.';
    correct=ws.slice(half).join(' ');ph='Type the continuation…';isLong=true;
  } else if(type==='first_word'){
    const fw=q.text.split(' ')[0];
    prompt=`"${fw}…"<div style="font-size:.7rem;color:var(--text3);margin-top:5px">${q.work} · ${q.char}</div>`;
    instr='This quote begins with that word. Type the full quote.';
    correct=q.text;ph='Type the full quote…';isLong=true;
  } else if(type==='theme_recall'){
    const th=(q.themes||['Power'])[0];
    prompt=`Theme: <strong style="color:var(--purple3)">${th}</strong><div style="font-size:.7rem;color:var(--text3);margin-top:5px">Work: ${q.work} · Character: ${q.char}</div>`;
    instr='Type a quote from this character relating to this theme.';
    correct=q.text;ph='Type a quote…';isLong=true;
  } else if(type==='method'){
    prompt=`"${q.text}"<div style="font-size:.7rem;color:var(--text3);margin-top:5px">${q.char} · ${q.work}</div>`;
    instr='Name ONE literary method / technique used in this quote.';
    correct=(q.methods||['Metaphor'])[0];ph='e.g. Metaphor, Soliloquy…';
  } else if(type==='loc'){
    prompt=`"${q.text}"<div style="font-size:.7rem;color:var(--text3);margin-top:5px">${q.char} · ${q.work}</div>`;
    instr='Which act/stave/scene is this from?';
    correct=q.loc;ph=`e.g. Act 2, Scene 2`;
  } else if(type==='analysis'){
    prompt=`"${q.text}"<div style="font-size:.7rem;color:var(--text3);margin-top:5px">${q.char} · ${q.work} · ${q.loc}</div>`;
    instr='What does this quote show? Write a key point of analysis.';
    correct=q.analysis||'';ph='Write your analysis…';isLong=true;
  }

  let feedback='';
  if(checked){
    const userN=normQ(ans||'');
    const corrN=normQ(correct);
    let ok=false;
    if(type==='who_said')ok=userN.includes(corrN)||corrN.includes(userN);
    else if(type==='method')ok=(q.methods||[]).some(m=>userN.includes(normQ(m)));
    else if(type==='loc')ok=userN.replace(/[^a-z0-9]/g,'').includes(corrN.replace(/[^a-z0-9]/g,'').slice(0,5));
    else if(type==='analysis')ok=sim(ans||'',correct)>0.15; // lenient for analysis
    else ok=sim(ans||'',correct)>0.45;

    if(ok)S.quiz.score++;
    addXP(ok?15:2);
    // log to history
    S.quizHistory.push({date:new Date().toISOString().slice(0,10),correct:ok?1:0,total:1,work:q.work});
    save();

    feedback=`<div class="qfb ${ok?'qok':'qwr'}">
      ${ok?'✅ Correct! +15 XP':'❌ Not quite — +2 XP for trying'}
      <div style="margin-top:6px;font-size:.78rem"><strong style="color:var(--gold)">Model answer:</strong><br><em>"${correct}"</em></div>
      ${type!=='analysis'?`<div style="margin-top:5px;font-size:.73rem;color:var(--text2)">${q.analysis||''}</div>`:''}
      <div style="margin-top:4px;font-size:.7rem;color:var(--text3)">${q.char} · ${q.work} · ${q.loc}</div>
    </div>
    <button class="btn bp" style="margin-top:9px" onclick="nextQQ()">Next →</button>`;
  }

  return`<div>
  ${backBtn()}
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
    <span style="font-size:.7rem;color:var(--text3)">Q${idx+1}/${S.quiz.qs.length}</span>
    <span style="font-size:.7rem;color:var(--gold)">Score: ${score}</span>
  </div>
  <div class="pb"><div class="pbf" style="width:${pct(idx,S.quiz.qs.length)}%"></div></div>
  <div class="qq">${prompt}</div>
  <div style="font-size:.72rem;color:var(--text2);margin-bottom:8px">${instr}</div>
  ${!checked?`
  ${isLong?`<textarea id="qans" rows="3" placeholder="${ph}" onkeydown="if(event.ctrlKey&&event.key==='Enter')submitQ()">${ans}</textarea><div class="hint">Ctrl+Enter to submit</div>`:
  `<input type="text" id="qans" placeholder="${ph}" value="${ans||''}" onkeydown="if(event.key==='Enter')submitQ()">`}
  <div style="display:flex;gap:7px;margin-top:8px">
    <button class="btn bp" onclick="submitQ()">Submit</button>
    <button class="btn" onclick="nextQQ()">Skip →</button>
  </div>`:''}
  ${feedback}
  </div>`;
}
function submitQ(){
  const el=document.getElementById('qans');
  S.quiz.ans=el?el.value:'';
  S.quiz.checked=true;render();
}
function nextQQ(){S.quiz.idx++;S.quiz.ans='';S.quiz.checked=false;render();}
function rQuizEnd(){
  const {score,qs}=S.quiz;
  const p=pct(score,qs.length);
  return`<div>
  ${backBtn()}
  <div class="pt">Quiz Complete!</div>
  <div class="card" style="text-align:center;max-width:340px;margin:12px auto">
    <div style="font-size:2rem;margin-bottom:6px">${p>=80?'🏆':p>=60?'⭐':'📚'}</div>
    <div style="font-size:1.8rem;font-family:'Playfair Display',serif;color:var(--gold)">${score} / ${qs.length}</div>
    <div style="color:var(--text2);margin-top:4px">${p>=80?'Excellent!':p>=60?'Good work!':p>=40?'Keep going!':'More revision needed'}</div>
    <div class="pb" style="margin:9px 0"><div class="pbf pg" style="width:${p}%"></div></div>
    <div style="font-size:.7rem;color:var(--text3)">${p}% · +${score*15} XP</div>

    <button class="btn bp" onclick="S.quiz.active=false;render()">New Quiz</button>
    <button class="btn" onclick="go('stats')">Stats →</button>
  </div></div>`;
}

function rTimed(){
  if(!S.tc.active){
    return`<div>
    ${backBtn()}
    <div class="pt">Timed Challenge</div>
    <div class="ps">Who said it? — answer as many as possible before time runs out</div>
    <div class="card" style="max-width:400px">

    <div id="tc-ring">
      <svg width="70" height="70"><circle cx="35" cy="35" r="28" fill="none" stroke="var(--bg4)" stroke-width="5"/><circle id="tc-arc" cx="35" cy="35" r="28" fill="none" stroke="${S.tc.tLeft<15?'var(--coral)':'var(--teal)'}" stroke-width="5" stroke-linecap="round" stroke-dasharray="${2*Math.PI*28}" stroke-dashoffset="${2*Math.PI*28*(1-S.tc.tLeft/S.tc.total)}"/></svg>
      <div class="tc-num" style="color:${S.tc.tLeft<15?'var(--coral)':'var(--gold)'}" id="tc-num">${S.tc.tLeft}</div>

  </div>
  ${S.tc.result?`<div class="qfb ${S.tc.result.ok?'qok':'qwr'}" style="margin-top:8px">${S.tc.result.ok?'✅ Correct!':'❌ Answer: '+S.tc.result.correct}</div>`:''}

function startTC(){
  if(S.tc.timer)clearInterval(S.tc.timer);
  const w=document.getElementById('tcw').value;
  const t=+document.getElementById('tct').value;
  const tp=document.getElementById('tctype').value;
  const pool=w==='All'?allQ():allQ().filter(q=>q.work===w);
  S.tc={active:true,work:w,qs:shuf(pool),idx:0,score:0,tLeft:t,total:t,timer:null,ans:'',result:null,type:tp};
  render();
  startTCTimer();
}
function startTCTimer(){
  if(S.tc.timer)clearInterval(S.tc.timer);
  S.tc.timer=setInterval(()=>{
    S.tc.tLeft=Math.max(0,S.tc.tLeft-1);
    S.tc.result=null;
    // Update DOM directly without full re-render (prevents input focus loss)
    const numEl=document.getElementById('tc-num');
    const pbEl=document.getElementById('tc-pb');
    const arcEl=document.getElementById('tc-arc');
    if(numEl){
      numEl.textContent=S.tc.tLeft;
      numEl.style.color=S.tc.tLeft<15?'var(--coral)':'var(--gold)';
    }
    if(pbEl){
      pbEl.style.width=pct(S.tc.tLeft,S.tc.total)+'%';
      pbEl.className='pbf'+(S.tc.tLeft<15?' pr':'');
    }
    if(arcEl){
      arcEl.setAttribute('stroke',S.tc.tLeft<15?'var(--coral)':'var(--teal)');
      arcEl.setAttribute('stroke-dashoffset',2*Math.PI*28*(1-S.tc.tLeft/S.tc.total));
    }
    if(S.tc.tLeft<=0){clearInterval(S.tc.timer);S.tc.timer=null;render();}
  },1000);
}
function checkTC(){
  const el=document.getElementById('tc-ans');
  const ans=(el?el.value:'').trim();
  const q=S.tc.qs[S.tc.idx%S.tc.qs.length];
  const tp=S.tc.type||'who_said';
  let correct='',ok=false;
  if(tp==='who_said'){correct=q.char;ok=normQ(ans).includes(normQ(q.char.split(' ')[0].toLowerCase()))&&ans.length>1;}
  else if(tp==='first_word'){correct=q.text;ok=sim(ans,q.text)>0.4;}
  else{correct=(q.methods||[''])[0];ok=(q.methods||[]).some(m=>normQ(ans).includes(normQ(m)));}
  if(ok){S.tc.score++;addXP(5);S.tc.result={ok:true};}
  else{S.tc.result={ok:false,correct};}
  S.tc.idx++;
  if(el){el.value='';el.focus();}
  // Just update the result area without full re-render, keeping timer alive
  const res=document.querySelector('.qfb');
  if(res){res.className='qfb '+(ok?'qok':'qwr');res.innerHTML=(ok?'✅ Correct! +5 XP':'❌ Answer: '+correct);}
  else{
    const qEl=document.querySelector('.qq');
    if(qEl){
      const newRes=document.createElement('div');
      newRes.className='qfb '+(ok?'qok':'qwr');
      newRes.style.marginTop='8px';
      newRes.textContent=(ok?'✅ Correct! +5 XP':'❌ Answer: '+correct);
      qEl.parentNode.insertBefore(newRes,qEl.nextSibling.nextSibling||null);
    }
  }
  // Update score
  const scoreEl=document.querySelector('[style*="var(--gold)"]');
  if(scoreEl&&scoreEl.tagName==='STRONG')scoreEl.textContent=S.tc.score;
  // After brief pause, clear feedback and advance question
  setTimeout(()=>{
    const nextQ=S.tc.qs[S.tc.idx%S.tc.qs.length];
    const qqEl=document.querySelector('.qq');
    if(qqEl&&S.tc.tLeft>0){
      const tp2=S.tc.type||'who_said';
      let np='';
      if(tp2==='who_said')np=`"${nextQ.text.split(' ').slice(0,8).join(' ')}…"`;
      else if(tp2==='first_word')np=`"${nextQ.text.split(' ')[0]}…" (${nextQ.work} · ${nextQ.char})`;
      else np=`"${nextQ.text}"`;
      qqEl.innerHTML=np+`<div style="font-size:.7rem;color:var(--text3);margin-top:4px">${tp2==='who_said'?nextQ.work+' · '+nextQ.loc:nextQ.char+' · '+nextQ.work}</div>`;
      const rfb=document.querySelector('.qfb');if(rfb)rfb.remove();
    }
    save();
  },800);
}
function skipTC(){S.tc.idx++;const el=document.getElementById('tc-ans');if(el){el.value='';el.focus();}}
function endTC(){if(S.tc.timer){clearInterval(S.tc.timer);S.tc.timer=null;}S.tc.tLeft=0;render();}
function rTCEnd(){
  if(S.tc.timer){clearInterval(S.tc.timer);S.tc.timer=null;}
  return`<div>
  ${backBtn()}
  <div class="pt">Time's Up!</div>
  <div class="card" style="text-align:center;max-width:320px;margin:12px auto">
    <div style="font-size:2rem;margin-bottom:6px">${S.tc.score>=15?'🏆':S.tc.score>=8?'⭐':S.tc.score>=3?'👍':'📚'}</div>
    <div style="font-size:1.8rem;font-family:'Playfair Display',serif;color:var(--gold)">${S.tc.score} correct</div>
    <div style="color:var(--text2);margin-top:4px">in ${S.tc.total} seconds · +${S.tc.score*5} XP</div>
  </div>
  <div style="display:flex;gap:8px;justify-content:center">
    <button class="btn bg" onclick="S.tc.active=false;render()">Play Again</button>
    <button class="btn" onclick="go('dashboard')">Dashboard</button>
  </div></div>`;
}

// ════════════════════════════════════════════════
function rDump(){
  return`<div>
  ${backBtn()}
  <div class="pt">Brain Dump</div>
  <div class="ps">Write every quote you can remember — one per line — and we'll check them all</div>
  ${!S.dump.done?`
  <div class="card" style="max-width:540px">
    <div class="fg"><label>Focus (optional)</label><select id="dw">${works().map(w=>`<option>${w}</option>`).join('')}</select></div>
    <div class="fg"><label>Type all quotes you can remember (one per line)</label>
    <textarea id="dt" style="min-height:150px" placeholder="Fair is foul, and foul is fair&#10;Solitary as an oyster&#10;Mankind was my business&#10;…keep going!"></textarea></div>
    <button class="btn bg bblk" onclick="runDump()">Check My Quotes →</button>
  </div>`:`
  <button class="bback" onclick="S.dump.done=false;render()">← Try again</button>
  <div class="g3" style="margin-bottom:10px">
    <div class="scard"><div class="snum" style="color:var(--teal)">${S.dump.results.filter(r=>r.s==='ok').length}</div><div class="slbl">✅ Correct</div></div>
    <div class="scard"><div class="snum" style="color:var(--amber)">${S.dump.results.filter(r=>r.s==='near').length}</div><div class="slbl">⚠ Nearly</div></div>
    <div class="scard"><div class="snum" style="color:var(--coral)">${S.dump.results.filter(r=>r.s==='miss').length}</div><div class="slbl">❌ Not found</div></div>
  </div>
  <div style="font-size:.72rem;color:var(--text3);margin-bottom:8px">${pct(S.dump.results.filter(r=>r.s==='ok').length,S.dump.results.length)}% accuracy · ${S.dump.results.length} attempted</div>
  ${S.dump.results.map(r=>`<div class="dr ${r.s==='ok'?'dr-ok':r.s==='near'?'dr-near':'dr-miss'}">
    <span>${r.s==='ok'?'✅':r.s==='near'?'⚠️':'❌'}</span> <em>"${r.input}"</em>
    ${r.s!=='ok'&&r.match?`<div class="dr-sub">Closest: <em>"${r.match.text}"</em> — ${r.match.char}, ${r.match.work}</div>`:''}
    ${r.s==='ok'&&r.match?`<div class="dr-sub">${r.match.char} · ${r.match.work} · ${r.match.loc}</div>`:''}
  </div>`).join('')}
  `}
  </div>`;
}
function runDump(){
  const w=document.getElementById('dw').value;
  const t=document.getElementById('dt').value;
  const lines=t.split('\n').map(l=>l.trim()).filter(l=>l.length>4);
  const pool=w==='All'?allQ():allQ().filter(q=>q.work===w);
  S.dump.results=lines.map(line=>{
    const {score,quote}=bestMatch(line,pool);
    return{input:line,s:score>.78?'ok':score>.42?'near':'miss',match:quote};
  });
  addXP(S.dump.results.filter(r=>r.s==='ok').length*8);
  S.dump.done=true;render();
}

function normForComp(s){
  return s.replace(/['']/g,"'").replace(/[""]/g,'"').replace(/\s+/g,' ').trim();
}

let _liveTimer;
function liveCheck(){
  clearTimeout(_liveTimer);
  _liveTimer=setTimeout(()=>{
    const t=(document.getElementById('a-t')?.value||'').trim();
    if(t.length<8){document.getElementById('live-dup').innerHTML='';return;}
    const {score,quote}=bestMatch(t,allQ());
    const el=document.getElementById('live-dup');
    if(score>.85)el.innerHTML=`<div class="qfb qwr" style="font-size:.72rem">⚠ Possible duplicate: <em>"${quote.text}"</em> — ${quote.char}</div>`;
    else if(score>.5)el.innerHTML=`<div class="qfb" style="background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);font-size:.72rem">Similar quote exists (${Math.round(score*100)}%): <em>"${quote.text}"</em></div>`;
    else el.innerHTML=`<div style="font-size:.68rem;color:var(--teal2)">✓ No close duplicate found</div>`;
  },400);
}

function checkDup(){
  const t=(document.getElementById('a-t')?.value||'').trim();
  if(!t){document.getElementById('add-fb').innerHTML=`<div class="qfb qwr">Enter a quote first.</div>`;return;}
  const {score,quote}=bestMatch(t,allQ());
  const el=document.getElementById('add-fb');
  if(score>.85)el.innerHTML=`<div class="qfb qwr">⚠ Likely duplicate:<br><em>"${quote.text}"</em> — ${quote.char}, ${quote.work}</div>`;
  else if(score>.5)el.innerHTML=`<div class="qfb" style="background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2)">Most similar (${Math.round(score*100)}%):<br><em>"${quote.text}"</em> — ${quote.char}</div>`;
  else el.innerHTML=`<div class="qfb qok">✓ No duplicate found — looks new!</div>`;
}

async function saveQuote(){
  const t=(document.getElementById('a-t')?.value||'').trim();
  const c=(document.getElementById('a-c')?.value||'').trim();
  if(!t||!c){toast('Fill in quote text and character');return;}
  const act=(document.getElementById('a-act')?.value||'').trim();
  const sc=(document.getElementById('a-sc')?.value||'').trim();
  const q={
    id:Date.now(),
    work:document.getElementById('a-w').value,
    char:c,loc:`${act}${sc?', '+sc:''}`.trim()||'Unknown',
    themes:(document.getElementById('a-th').value||'').split(',').map(t=>t.trim()).filter(Boolean),
    methods:(document.getElementById('a-me').value||'').split(',').map(m=>m.trim()).filter(Boolean),
    text:t,analysis:document.getElementById('a-an').value,
    stars:+document.getElementById('a-st').value,
    acc:document.getElementById('a-ac').value,
    note:document.getElementById('a-no').value,
    submittedAt:new Date().toISOString(),
  };
  const fbEl=document.getElementById('add-fb');
  fbEl.innerHTML=`<div class="qfb" style="background:rgba(74,158,255,.08);border:1px solid rgba(74,158,255,.25);color:var(--blue)">⏳ Submitting…</div>`;
  try{
    const resp=await fetch(WORKER_URL+'/submit',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(q)
    });
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    toast('📬 Quote submitted for review');
    fbEl.innerHTML=`<div class="qfb" style="background:rgba(124,92,191,.1);border:1px solid rgba(124,92,191,.3);color:var(--purple3)">📬 Submitted for admin review!<br><em style="font-size:.72rem">"${t.slice(0,60)}"</em><br><span style="font-size:.65rem;color:var(--text3)">An admin must approve it before it appears in the vault.</span></div>`;
    ['a-t','a-c','a-act','a-sc','a-th','a-me','a-an','a-no'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
    document.getElementById('live-dup').innerHTML='';
  }catch(e){
    fbEl.innerHTML=`<div class="qfb qwr">❌ Submission failed — check your internet connection and that the Worker URL is set correctly.<br><span style="font-size:.68rem;color:var(--text3)">${e.message}</span></div>`;
  }
}
