// STATISTICS — heatmap, accuracy over time, etc.
// ════════════════════════════════════════════════
function rStats(){
  const qs=allQ();
  const ws=[...new Set(qs.map(q=>q.work))];

  // Accuracy by work
  const byWork={};
  ws.forEach(w=>{
    const wq=qs.filter(q=>q.work===w);
    const qh=S.quizHistory.filter(h=>h.work===w);
    const total=qh.reduce((s,h)=>s+h.total,0);
    const correct=qh.reduce((s,h)=>s+h.correct,0);
    byWork[w]={total:wq.length,mastered:[...S.mastered].filter(id=>wq.find(q=>q.id===id)).length,quizAcc:total?pct(correct,total):null};
  });

  // Accuracy by theme
  const themeMap={};
  qs.forEach(q=>(q.themes||[]).forEach(t=>{
    if(!themeMap[t])themeMap[t]={total:0,mastered:0};
    themeMap[t].total++;
    if(S.mastered.has(q.id))themeMap[t].mastered++;
  }));
  const topThemes=Object.entries(themeMap).sort((a,b)=>b[1].total-a[1].total).slice(0,8);

  // Accuracy over time (last 14 days)
  const today=new Date();
  const last14=Array.from({length:14},(_,i)=>{const d=new Date(today);d.setDate(d.getDate()-13+i);return d.toISOString().slice(0,10);});
  const dayData=last14.map(date=>{
    const dayH=S.quizHistory.filter(h=>h.date===date);
    const total=dayH.reduce((s,h)=>s+h.total,0);
    const correct=dayH.reduce((s,h)=>s+h.correct,0);
    return{date,total,correct,pct:total?pct(correct,total):null};
  });

  // Most/least mastered quotes for heatmap approximation
  const qsWithSRS=qs.map(q=>({...q,srs:qSRS(q.id)})).sort((a,b)=>(b.srs.reps||0)-(a.srs.reps||0));
  const bestRemembered=qsWithSRS.slice(0,3);
  const mostForgotten=qsWithSRS.filter(q=>!S.mastered.has(q.id)&&q.stars===5).slice(-3);

  // Heatmap — last 60 days of quiz activity
  const hmDays=60;
  const hmData=Array.from({length:hmDays},(_,i)=>{const d=new Date(today);d.setDate(d.getDate()-hmDays+1+i);const dt=d.toISOString().slice(0,10);const h=S.quizHistory.filter(q=>q.date===dt);return{dt,count:h.reduce((s,q)=>s+q.total,0)};});
  const maxCount=Math.max(1,...hmData.map(d=>d.count));

  return`<div>
  ${backBtn()}
  <div class="pt">Statistics</div>
  <div class="ps">Your detailed revision overview</div>

  <div class="g4" style="margin-bottom:11px">
    <div class="scard"><div class="snum" style="color:var(--gold)">${qs.length}</div><div class="slbl">Total Quotes</div></div>
    <div class="scard"><div class="snum" style="color:var(--teal)">${S.mastered.size}</div><div class="slbl">Mastered</div></div>
    <div class="scard"><div class="snum" style="color:var(--purple3)">${S.xp}</div><div class="slbl">Total XP</div></div>
    <div class="scard"><div class="snum" style="color:var(--amber)">${S.streak}</div><div class="slbl">Streak 🔥</div></div>
  </div>

  <div class="card" style="margin-bottom:10px">
    <div class="sec" style="margin-top:0">Activity Heatmap — last 60 days</div>
    <div class="hm-grid">
      ${hmData.map(d=>{
        const intensity=d.count===0?0:Math.min(1,d.count/maxCount);
        const color=d.count===0?'var(--bg4)':`rgba(44,182,125,${0.15+intensity*0.85})`;
        return`<div class="hm-cell" style="background:${color}" title="${d.dt}: ${d.count} answers"></div>`;
      }).join('')}
    </div>
    <div style="font-size:.62rem;color:var(--text3);margin-top:5px">Each cell = one day. Greener = more answers.</div>
  </div>

  <div class="card" style="margin-bottom:10px">
    <div class="sec" style="margin-top:0">Accuracy over last 14 days</div>
    <div style="display:flex;align-items:flex-end;gap:3px;height:60px">
      ${dayData.map(d=>{
        const h=d.pct!==null?d.pct:0;
        const color=d.pct===null?'var(--bg4)':d.pct>=70?'var(--teal)':d.pct>=50?'var(--amber)':'var(--coral)';
        return`<div style="flex:1;height:${Math.max(3,h*0.6)}%;background:${color};border-radius:2px 2px 0 0;min-height:3px" title="${d.date}: ${d.pct!==null?d.pct+'%':'No data'}"></div>`;
      }).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:.6rem;color:var(--text3);margin-top:3px">
      <span>${last14[0].slice(5)}</span><span>Today</span>
    </div>
  </div>

  <div class="g2" style="margin-bottom:10px">
    <div class="card">
      <div class="sec" style="margin-top:0">Progress by Text</div>
      ${ws.map(w=>{
        const d=byWork[w];
        const p=pct(d.mastered,d.total);
        return`<div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;font-size:.7rem;margin-bottom:2px"><span>${w}</span><span style="color:var(--text3)">${d.mastered}/${d.total} · ${p}%${d.quizAcc!==null?' · Quiz:'+d.quizAcc+'%':''}</span></div>
          <div class="pb"><div class="pbf" style="width:${p}%"></div></div>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div class="sec" style="margin-top:0">Mastery by Theme</div>
      ${topThemes.map(([t,d])=>{
        const p=pct(d.mastered,d.total);
        return`<div style="margin-bottom:7px">
          <div style="display:flex;justify-content:space-between;font-size:.7rem;margin-bottom:2px">
            <span class="tag tb">${t}</span><span style="color:var(--text3)">${d.mastered}/${d.total} · ${p}%</span>
          </div>
          <div class="pb"><div class="pbf pu" style="width:${p}%"></div></div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <div class="g2" style="margin-bottom:10px">
    <div class="card">
      <div class="sec" style="margin-top:0">🌟 Best Remembered</div>
      ${bestRemembered.map(q=>`<div style="padding:5px 0;border-bottom:1px solid var(--border)">
        <div style="font-style:italic;font-size:.78rem">"${q.text.slice(0,55)}…"</div>
        <div style="font-size:.65rem;color:var(--text3);margin-top:2px">${q.char} · ${q.work} · ${q.srs.reps||0} reps</div>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="sec" style="margin-top:0">⚠ Most Forgotten (5★ unmastered)</div>
      ${mostForgotten.length?mostForgotten.map(q=>`<div style="padding:5px 0;border-bottom:1px solid var(--border)">
        <div style="font-style:italic;font-size:.78rem">"${q.text.slice(0,55)}…"</div>
        <div style="font-size:.65rem;color:var(--text3);margin-top:2px">${q.char} · ${q.work}</div>
      </div>`).join(''):'<div style="font-size:.75rem;color:var(--teal2)">All 5-star quotes mastered! 🎉</div>'}
    </div>
  </div>

  <div class="card">
    <div class="sec" style="margin-top:0">⚠ Accuracy Notes — verify these quotes</div>
    ${qs.filter(q=>q.acc==='minor'||q.note).slice(0,6).map(q=>`<div style="padding:6px 0;border-bottom:1px solid var(--border)">
      <div style="font-style:italic;font-size:.8rem">"${q.text.slice(0,60)}…"</div>
      <div style="font-size:.68rem;color:var(--text3)">${q.char} · ${q.work}</div>
      ${q.note?`<div class="qc-note">⚠ ${q.note}</div>`:''}
    </div>`).join('')}
  </div>
  </div>`;
}

function exportJSON() {
  const d = {
    canonical: DB,
    custom: S.custom,
    mastered: [...S.mastered],
    learning: [...S.learning],
    xp: S.xp,
    streak: S.streak,
    srsData: S.srsData,
    quizHistory: S.quizHistory
  };

  const b = new Blob(
    [JSON.stringify(d, null, 2)],
    { type: 'application/json' }
  );

  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'QuoteVault-backup.json';
  a.click();
}

function exportCSV() {
  const qs = allQ();
  const h = 'Work,Character,Location,Quote,Themes,Methods,Stars,Accuracy,Analysis\n';

  const rows = qs.map(q => [
    q.work,
    q.char,
    q.loc,
    `"${q.text.replace(/"/g, '""')}"`,
    (q.themes || []).join(';'),
    (q.methods || []).join(';'),
    q.stars,
    q.acc,
    `"${(q.analysis || '').replace(/"/g, '""')}"`
  ].join(',')).join('\n');

  const b = new Blob([h + rows], { type: 'text/csv' });

  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'QuoteVault-quotes.csv';
  a.click();
}

function importJSON(evt) {
  const f = evt.target.files[0];
  if (!f) return;

  const r = new FileReader();

  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);

      if (d.custom) {
        S.custom = [...S.custom, ...d.custom];
      }

      if (d.mastered) {
        d.mastered.forEach(id => S.mastered.add(id));
      }

      if (d.learning) {
        d.learning.forEach(id => S.learning.add(id));
      }

      if (d.xp) {
        S.xp += d.xp;
      }

      if (d.srsData) {
        Object.assign(S.srsData, d.srsData);
      }

      if (d.quizHistory) {
        S.quizHistory.push(...d.quizHistory);
      }

      save();
      updateSB();
      toast('Import successful!');
      render();
    } catch (err) {
      console.error(err);
      toast('Import failed — invalid JSON');
    }
  };

  r.readAsText(f);
}

// ════════════════════════════════════════════════
// WORKER URL — paste your Cloudflare Worker URL here
// ════════════════════════════════════════════════
async function loadCloudQuotes(){
  try{
    const resp=await fetch(WORKER_URL+'/quotes');
    if(!resp.ok)return;
    const data=await resp.json();
    if(Array.isArray(data.items)){
      const existingIds=new Set([...DB,...S.custom].map(q=>q.id));
      const newQuotes=data.items.filter(q=>q.text&&!existingIds.has(q.id));
      if(newQuotes.length>0){S.custom=[...S.custom,...newQuotes];save();render();}
    }
  }catch(e){console.log(e);}
}
// ════════════════════════════════════════════════
// ADMIN PANEL — password protected, Cloudflare Worker backed
// Submissions from ANY device go to the Worker's KV store.
// Admin fetches them here, then approves/rejects/edits.
// ════════════════════════════════════════════════
let _adminToken = null;  // session token returned by Worker on login — never stored to disk
let _adminAuth = false; // session-only, cleared on reload
let _adminPending = []; // cache loaded from Worker

function rAdmin(){
  if(!_adminAuth){
    return`<div>
    ${backBtn()}
    <div class="pt">Admin Panel</div>
    <div class="ps">Password-protected · manage quote submissions from all devices</div>
    <div class="card" style="max-width:360px">
      <div class="fg"><label>Password</label>
        <input type="password" id="adm-pw" placeholder="Enter admin password"
          onkeydown="if(event.key==='Enter')adminLogin()">
      </div>
      <button class="btn bg" onclick="adminLogin()" style="margin-top:2px">🔐 Login</button>
      <div id="adm-err" style="margin-top:8px"></div>
    </div>
    </div>`;
  }
  return rAdminPanel();
}

async function adminLogin(){
  const pw=(document.getElementById('adm-pw')?.value||'').trim();
  if(!pw)return;
  const errEl=document.getElementById('adm-err');
  errEl.innerHTML=`<div class="qfb" style="background:rgba(74,158,255,.08);border:1px solid rgba(74,158,255,.25);color:var(--blue)">⏳ Checking…</div>`;
  try{
    const resp=await fetch(WORKER_URL+'/auth',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pw})
    });
    if(resp.status===401){errEl.innerHTML=`<div class="qfb qwr">❌ Incorrect password</div>`;return;}
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    _adminToken=data.token;
    _adminAuth=true;
    adminLoadPending();
  }catch(e){
    errEl.innerHTML=`<div class="qfb qwr">❌ Login failed: ${e.message}</div>`;
  }
}

function adminLogout(){_adminAuth=false;_adminToken=null;_adminPending=[];render();}

async function adminLoadPending(){
  render(); // show panel with loading state
  try{
    const resp=await fetch(WORKER_URL+'/pending?token='+encodeURIComponent(_adminToken));
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    _adminPending=data.items||[];
  }catch(e){
    _adminPending=[];
    toast('⚠ Could not load pending quotes: '+e.message,3500);
  }
  render();
}

function rAdminPanel(){
  const pending=_adminPending;
  const approved=S.custom;

  const pendingHTML=pending===null
    ?`<div style="font-size:.78rem;color:var(--blue);padding:10px 0">⏳ Loading submissions…</div>`
    :pending.length===0
    ?`<div style="font-size:.78rem;color:var(--teal2);padding:10px 0">✅ No quotes awaiting review</div>`
    :pending.map((q,i)=>`
    <div class="qc" style="border-left:3px solid var(--amber);margin-bottom:8px">
      <div class="qc-t">"${q.text}"</div>
      <div class="qc-a">
        <strong style="color:var(--gold)">${q.char}</strong> · ${q.work} · ${q.loc}
      </div>
      ${q.analysis?`<div style="font-size:.7rem;color:var(--text2);margin:4px 0;line-height:1.5">${q.analysis.slice(0,140)}${q.analysis.length>140?'…':''}</div>`:''}
      <div class="qc-m">
        ${(q.themes||[]).map(t=>`<span class="tag tp">${t}</span>`).join('')}
        ${(q.methods||[]).map(m=>`<span class="tag tb">${m}</span>`).join('')}
        <span class="tag tg">⭐ ${q.stars}</span>
        <span class="${q.acc==='exact'?'tacc-e':q.acc==='minor'?'tacc-m':'tacc-u'}">${q.acc}</span>
      </div>
      ${q.note?`<div class="qc-note">⚠ ${q.note}</div>`:''}
      <div style="font-size:.62rem;color:var(--text3);margin-top:5px">
        Submitted: ${q.submittedAt?new Date(q.submittedAt).toLocaleString('en-GB'):'unknown'}
      </div>
      <div style="display:flex;gap:7px;margin-top:8px;flex-wrap:wrap">
        <button class="btn bsm" style="background:rgba(44,182,125,.15);border-color:var(--teal);color:var(--teal2)"
          onclick="adminApprove(${i})">✅ Approve</button>
        <button class="btn bsm" style="background:rgba(74,158,255,.1);border-color:var(--blue);color:var(--blue)"
          onclick="adminEditPending(${i})">✏️ Edit & Approve</button>
        <button class="btn bsm br" onclick="adminReject(${i})">❌ Reject</button>
      </div>
    </div>`).join('');

  const approvedHTML=approved.length===0
    ?`<div style="font-size:.78rem;color:var(--text3);padding:10px 0">No approved custom quotes yet</div>`
    :approved.map((q,i)=>`
    <div class="qc" style="border-left:3px solid var(--teal);margin-bottom:7px">
      <div class="qc-t">"${q.text}"</div>
      <div class="qc-a"><strong style="color:var(--gold)">${q.char}</strong> · ${q.work} · ${q.loc}</div>
      <div class="qc-m">
        ${(q.themes||[]).map(t=>`<span class="tag tp">${t}</span>`).join('')}
        <span class="tag tt">✓ Approved</span>
      </div>
      <div style="display:flex;gap:7px;margin-top:8px;flex-wrap:wrap">
        <button class="btn bsm" style="background:rgba(74,158,255,.1);border-color:var(--blue);color:var(--blue)"
          onclick="adminEditApproved(${i})">✏️ Edit</button>
        <button class="btn bsm br" onclick="adminDelete(${i})">🗑 Remove from Vault</button>
      </div>
    </div>`).join('');

  return`<div>
  ${backBtn()}
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:8px">
    <div class="pt">Admin Panel</div>
    <div style="display:flex;gap:6px">
      <button class="btn bsm" onclick="adminLoadPending()" style="color:var(--blue);border-color:var(--blue)">🔄 Refresh</button>
      <button class="btn bsm" onclick="adminLogout()" style="color:var(--coral);border-color:var(--coral)">🔒 Logout</button>
    </div>
  </div>
  <div class="ps">Submissions from all devices · approve, edit, or reject · manage vault</div>
  <div class="g2" style="margin-bottom:12px">
    <div class="scard"><div class="snum" style="color:var(--amber)">${Array.isArray(pending)?pending.length:'…'}</div><div class="slbl">Pending Review</div></div>
    <div class="scard"><div class="snum" style="color:var(--teal)">${approved.length}</div><div class="slbl">Approved Custom</div></div>
  </div>
  <div class="sec" style="margin-top:0">📬 Pending Approval</div>
  ${pendingHTML}
  <div class="sec">✅ Approved Custom Quotes</div>
  ${approvedHTML}
  </div>`;
}

async function adminApprove(idx){
  const q={..._adminPending[idx]};
  if(!q)return;
  try{
    const resp=await fetch(WORKER_URL+'/approve',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:_adminToken,id:q.id})
    });
    if(!resp.ok)throw new Error('HTTP '+resp.status);
  }catch(e){toast('⚠ Worker error: '+e.message,3500);return;}
  delete q.submittedAt;
  S.custom.push(q);
  addXP(5);
  save();
  _adminPending.splice(idx,1);
  buildNav();
  toast('✅ Quote approved and added to vault! +5 XP');
  render();
}

async function adminReject(idx){
  const q=_adminPending[idx];
  if(!q)return;
  try{
    const resp=await fetch(WORKER_URL+'/reject',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:_adminToken,id:q.id})
    });
    if(!resp.ok)throw new Error('HTTP '+resp.status);
  }catch(e){toast('⚠ Worker error: '+e.message,3500);return;}
  _adminPending.splice(idx,1);
  buildNav();
  toast('❌ Quote rejected and removed');
  render();
}

async function adminDelete(idx){
  if(!confirm('Remove this quote from the vault?\nThis cannot be undone.'))return;
  const q=S.custom[idx];
  if(q?.id){
    try{await fetch(WORKER_URL+'/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:_adminToken,id:q.id})});}
    catch(e){/* non-fatal */}
  }
  S.custom.splice(idx,1);
  save();
  toast('🗑 Quote removed from vault');
  render();
}

// ─── Edit pending quote before approving ─────────
function adminEditPending(idx){
  const q=_adminPending[idx];
  if(!q)return;
  openModal(`<div>
    <div style="font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);margin-bottom:10px">✏️ Edit & Approve</div>
    ${_editFields(q,'ep')}
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn bp" onclick="adminSavePendingEdit(${idx})">✅ Save & Approve</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>`);
}

function adminSavePendingEdit(idx){
  const q={..._adminPending[idx],..._readEditFields('ep')};
  _adminPending.splice(idx,1);
  // Remove from Worker (fire and forget — already approved)
  fetch(WORKER_URL+'/approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:_adminToken,id:q.id})}).catch(()=>{});
  delete q.submittedAt;
  S.custom.push(q);
  addXP(5);save();buildNav();closeModal();
  toast('✅ Edited, approved & added to vault! +5 XP');
  render();
}

// ─── Edit already-approved custom quote ──────────
function adminEditApproved(idx){
  const q=S.custom[idx];
  if(!q)return;
  openModal(`<div>
    <div style="font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);margin-bottom:10px">✏️ Edit Approved Quote</div>
    ${_editFields(q,'ea')}
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn bp" onclick="adminSaveApprovedEdit(${idx})">💾 Save Changes</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>`);
}

async function adminSaveApprovedEdit(idx){
  const updated={...S.custom[idx],..._readEditFields('ea')};
  S.custom[idx]=updated;save();
  // Push edit to worker so it persists in the cloud
  try{
    await fetch(WORKER_URL+'/update-public',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:_adminToken,id:updated.id,data:updated})});
  }catch(e){/* non-fatal — local save succeeded */}
  closeModal();toast('💾 Quote updated');render();
}

// ─── Shared edit form helpers ─────────────────────
function _editFields(q,pfx){
  return`
  <div class="fg"><label>Quote Text</label><textarea id="${pfx}-t" rows="3">${q.text||''}</textarea></div>
  <div class="g2">
    <div class="fg"><label>Character</label><input type="text" id="${pfx}-c" value="${q.char||''}"></div>
    <div class="fg"><label>Work</label><input type="text" id="${pfx}-w" value="${q.work||''}"></div>
  </div>
  <div class="fg"><label>Location (e.g. Act 1, Scene 2)</label><input type="text" id="${pfx}-l" value="${q.loc||''}"></div>
  <div class="fg"><label>Themes (comma-separated)</label><input type="text" id="${pfx}-th" value="${(q.themes||[]).join(', ')}"></div>
  <div class="fg"><label>Methods (comma-separated)</label><input type="text" id="${pfx}-me" value="${(q.methods||[]).join(', ')}"></div>
  <div class="fg"><label>Analysis</label><textarea id="${pfx}-an" rows="3">${q.analysis||''}</textarea></div>
  <div class="g2">
    <div class="fg"><label>Stars (1-5)</label>
      <select id="${pfx}-st">${[1,2,3,4,5].map(n=>`<option${q.stars===n?' selected':''}>${n}</option>`).join('')}</select>
    </div>
    <div class="fg"><label>Accuracy</label>
      <select id="${pfx}-ac">
        <option${q.acc==='exact'?' selected':''}>exact</option>
        <option${q.acc==='minor'?' selected':''}>minor</option>
        <option${q.acc==='unknown'?' selected':''}>unknown</option>
      </select>
    </div>
  </div>
  <div class="fg"><label>Warning note (optional)</label><input type="text" id="${pfx}-no" value="${q.note||''}"></div>`;
}

function _readEditFields(pfx){
  const g=id=>document.getElementById(id)?.value||'';
  return{
    text:g(`${pfx}-t`).trim(),
    char:g(`${pfx}-c`).trim(),
    work:g(`${pfx}-w`).trim(),
    loc:g(`${pfx}-l`).trim(),
    themes:g(`${pfx}-th`).split(',').map(s=>s.trim()).filter(Boolean),
    methods:g(`${pfx}-me`).split(',').map(s=>s.trim()).filter(Boolean),
    analysis:g(`${pfx}-an`),
    stars:+g(`${pfx}-st`),
    acc:g(`${pfx}-ac`),
    note:g(`${pfx}-no`),
  };
}

buildNav();updateSB();render();
loadCloudQuotes();

</script>
