<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{

@media(max-width:620px){#hbg{display:block}#sidebar{position:fixed;left:0;top:0;transform:translateX(-100%)}#sidebar.open{transform:translateX(0)}#page{padding-bottom:120px;-webkit-overflow-scrolling:touch}#app{height:100dvh}}

.snum{font-size:1.5rem;font-weight:600;line-height:1.1}
.slbl{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}

.tp{background:rgba(124,92,191,.2);color:var(--purple3)}
.tt{background:rgba(44,182,125,.14);color:var(--teal2)}

.tg{background:rgba(232,197,71,.14);color:var(--gold)}
.tb{background:rgba(74,158,255,.14);color:var(--blue)}
.tk{background:rgba(212,84,154,.14);color:var(--pink)}
.bm{background:rgba(44,182,125,.14);color:var(--teal2);font-size:.62rem;padding:1px 7px;border-radius:20px}
.bl{background:rgba(232,197,71,.14);color:var(--gold);font-size:.62rem;padding:1px 7px;border-radius:20px}
.bn{background:rgba(74,158,255,.1);color:var(--blue);font-size:.62rem;padding:1px 7px;border-radius:20px}
.bd{background:rgba(245,166,35,.2);color:var(--amber);font-size:.62rem;padding:1px 7px;border-radius:20px}
.stars{color:var(--gold);font-size:.72rem}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font-size:.78rem;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text);transition:all .1s}
.btn:hover{background:var(--bg3)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.bp{background:var(--purple);border-color:var(--purple);color:#fff}.bp:hover{background:var(--purple2)}
.bg{background:var(--gold);border-color:var(--gold);color:#0b0a14;font-weight:600}.bg:hover{background:var(--gold2)}
.br{background:rgba(232,93,74,.15);border-color:var(--coral);color:var(--coral2)}.br:hover{background:rgba(232,93,74,.25)}
.bsm{padding:3px 9px;font-size:.72rem}
.bblk{width:100%;justify-content:center}
.pb{width:100%;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin:3px 0 7px}
.pbf{height:100%;border-radius:3px;background:var(--teal);transition:width .3s}
.pbf.pu{background:var(--purple2)}.pbf.pg{background:var(--gold)}.pbf.pr{background:var(--coral)}
.fg{margin-bottom:10px}
.fg label{font-size:.72rem;color:var(--text2);display:block;margin-bottom:3px}
input[type=text],input[type=number],select,textarea{font-family:'DM Sans',sans-serif;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:7px;padding:7px 10px;font-size:.8rem;width:100%;transition:border-color .1s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--purple)}
textarea{resize:vertical;line-height:1.5}
select option{background:var(--bg3)}
.fbar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px}
.fbtn{padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:.7rem;cursor:pointer;transition:all .1s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.fbtn:hover,.fbtn.active{background:var(--purple);border-color:var(--purple);color:#fff}
.dc{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 13px;margin-bottom:7px;transition:border-color .12s}
.dc:hover{border-color:var(--border2)}
.dc-date{font-family:'DM Mono',monospace;font-size:.95rem;color:var(--gold);margin-bottom:3px;font-weight:500}
.dc-event{font-size:.88rem;line-height:1.5;margin-bottom:4px;color:var(--text)}
.dc-sig{font-size:.72rem;color:var(--text2);line-height:1.5;margin-bottom:5px}
.dc-m{display:flex;align-items:center;gap:4px;flex-wrap:wrap;font-size:.65rem;color:var(--text3)}
.dc-note{margin-top:5px;font-size:.68rem;color:var(--amber);background:rgba(245,166,35,.07);padding:3px 8px;border-radius:5px;border-left:2px solid var(--amber)}
.fc-wrap{max-width:540px;margin:0 auto}
.fc{height:180px;position:relative;cursor:pointer;border-radius:14px}
.fc-s{border-radius:14px;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;display:flex;width:100%;position:absolute;top:0;left:0;right:0;bottom:0}
.fc-front{background:var(--bg3);border:1px solid var(--border2);visibility:visible;opacity:1;pointer-events:auto;z-index:2}
.fc-back{background:linear-gradient(135deg,rgba(124,92,191,.2),rgba(44,182,125,.1));border:1px solid var(--purple);visibility:hidden;opacity:0;pointer-events:none;z-index:1}
.fc.flip .fc-front{visibility:hidden;opacity:0;pointer-events:none;z-index:1}
.fc.flip .fc-back{visibility:visible;opacity:1;pointer-events:auto;z-index:2}
.fc-lbl{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
.fc-main{font-family:'DM Mono',monospace;font-size:1.05rem;line-height:1.65;color:var(--gold)}
.fc-sub{font-size:.72rem;color:var(--text2);margin-top:7px;line-height:1.5}
.fc-hint{font-size:.65rem;color:var(--text3);margin-top:8px}
.qq{font-family:'DM Sans',sans-serif;font-size:.98rem;line-height:1.65;background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:13px 15px;margin-bottom:10px}
.qfb{border-radius:8px;padding:10px 12px;margin-top:8px;font-size:.78rem;line-height:1.5}
.qok{background:rgba(44,182,125,.12);border:1px solid rgba(44,182,125,.28);color:var(--text)}
.qwr{background:rgba(232,93,74,.12);border:1px solid rgba(232,93,74,.28);color:var(--text)}
.hint{font-size:.7rem;color:var(--text3);margin-top:4px;font-style:italic}
.dr{border-radius:7px;padding:7px 10px;margin-bottom:5px;font-size:.8rem;line-height:1.5}
.dr-ok{background:rgba(44,182,125,.1);border:1px solid rgba(44,182,125,.22);color:var(--text)}
.dr-near{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.22);color:var(--text)}
.dr-miss{background:rgba(232,93,74,.1);border:1px solid rgba(232,93,74,.22);color:var(--text2)}
.bback{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text2);font-size:.75rem;cursor:pointer;margin-bottom:11px;transition:all .1s;font-family:'DM Sans',sans-serif}
.bback:hover{background:var(--bg4);color:var(--text)}
.pt{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--gold);margin-bottom:2px}
.ps{font-size:.72rem;color:var(--text3);margin-bottom:11px}
.sec{font-size:.68rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;margin-top:13px}
.div{height:1px;background:var(--border);margin:11px 0}
#toast{position:fixed;bottom:14px;right:14px;background:var(--bg3);border:1px solid var(--teal);color:var(--teal2);padding:7px 13px;border-radius:9px;font-size:.78rem;z-index:9999;transform:translateX(130px);opacity:0;transition:all .22s;pointer-events:none;max-width:260px}
#toast.show{transform:translateX(0);opacity:1}
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center}
#modal-bg.open{display:flex}
#modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:18px;max-width:480px;width:92%;max-height:80vh;overflow-y:auto}
#modal::-webkit-scrollbar{width:3px}
#modal::-webkit-scrollbar-thumb{background:var(--border2)}
.srow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.srow:last-child{border-bottom:none}
.ach{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.ach.locked{opacity:.3;filter:grayscale(1)}
.ach-i{font-size:1.5rem}
.ach-n{font-size:.78rem;font-weight:600;color:var(--gold)}
.ach-d{font-size:.68rem;color:var(--text3)}
.hm-grid{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px}
.hm-cell{width:12px;height:12px;border-radius:2px;background:var(--bg4);transition:background .2s;cursor:default;flex-shrink:0}
/* ‚ĒÄ‚ĒÄ TIMELINE ‚ĒÄ‚ĒÄ */
#tl-outer{position:relative;overflow:hidden;border:1px solid var(--border);border-radius:10px;background:var(--bg3);margin-bottom:10px;touch-action:none;user-select:none}
#tl-canvas-wrap{overflow:hidden;width:100%;cursor:grab;touch-action:none;user-select:none}
#tl-canvas-wrap:active{cursor:grabbing}
#tl-canvas-wrap canvas{display:block;width:100%}
.tl-zoom-bar{display:flex;gap:6px;align-items:center;padding:6px 10px;background:var(--bg2);border-bottom:1px solid var(--border)}
.tl-zoom-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:5px;padding:2px 9px;font-size:.75rem;cursor:pointer;font-family:'DM Sans',sans-serif}
.tl-zoom-btn:hover{background:var(--bg4)}
.tl-zoom-label{font-size:.65rem;color:var(--text3);flex:1}
.tl-detail-box{margin-top:0;padding:10px 14px;background:var(--card);border-top:1px solid var(--border);min-height:44px;font-size:.78rem}
/* drag-and-drop timeline */
.tl-bank{display:flex;flex-wrap:wrap;gap:7px;padding:10px;background:var(--bg2);border-radius:8px;min-height:60px;border:1px solid var(--border)}
.tl-bank.drag-over{border-color:var(--purple2);background:rgba(124,92,191,.06)}
/* SRS info box */
.srs-info{background:rgba(124,92,191,.08);border:1px solid rgba(124,92,191,.25);border-radius:9px;padding:10px 13px;margin-bottom:12px;font-size:.75rem;line-height:1.6;color:var(--text2)}
.srs-info strong{color:var(--purple3)}
/* Difficulty badge */
.diff-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:.65rem;font-weight:600}
.diff-easy{background:rgba(44,182,125,.15);color:var(--teal2);border:1px solid rgba(44,182,125,.3)}
.diff-med{background:rgba(232,197,71,.15);color:var(--gold);border:1px solid rgba(232,197,71,.3)}
.diff-hard{background:rgba(232,93,74,.15);color:var(--coral2);border:1px solid rgba(232,93,74,.3)}
/* Multi-select dropdown (filter panel) */
.flt-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.msd-wrap{position:relative;display:inline-block;min-width:150px;flex:1}
.msd-trigger{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:7px 30px 7px 10px;font-size:.78rem;color:var(--text);cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;position:relative;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:border-color .15s}
.msd-trigger:after{content:'‚Ėĺ';position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:.7rem;color:var(--text3);transition:transform .15s}
.msd-wrap.open .msd-trigger:after{transform:translateY(-50%) rotate(180deg)}
.msd-wrap.open .msd-trigger{border-color:var(--border3)}
.msd-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;min-width:100%;max-height:220px;overflow-y:auto;background:var(--bg3);border:1px solid var(--border2);border-radius:9px;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.45);padding:4px}
.msd-wrap.open .msd-dropdown{display:block}
.msd-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:.78rem;color:var(--text2);transition:background .1s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.msd-item:hover{background:var(--bg4);color:var(--text)}
.msd-item.sel{color:var(--text)}
.msd-check{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--border2);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;transition:all .1s}
.msd-item.sel .msd-check{background:var(--purple);border-color:var(--purple);color:#fff}
.msd-item.sel-cat .msd-check{background:var(--teal);border-color:var(--teal);color:#0b0a14}
.tog{width:34px;height:19px;background:var(--bg4);border-radius:19px;cursor:pointer;position:relative;transition:background .18s;border:1px solid var(--border2);flex-shrink:0}
.tog.on{background:var(--purple)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:13px;height:13px;background:#fff;border-radius:50%;transition:transform .18s}
.tog.on::after{transform:translateX(15px)}
.sm2-badge{font-family:'DM Mono',monospace;font-size:.6rem;padding:1px 6px;border-radius:4px;background:var(--bg4);color:var(--text3)}
</style>

const THEMES = {

// ‚ĒÄ‚ĒÄ custom themes: stored in localStorage ‚ĒÄ‚ĒÄ
function getCustomThemes(){
  try{return JSON.parse(localStorage.getItem('dv_custom_themes')||'{}');}catch{return {};}
}
function saveCustomThemes(obj){
  localStorage.setItem('dv_custom_themes',JSON.stringify(obj));
}
function getAllThemes(){
  return {...THEMES,...getCustomThemes()};
}

function applyTheme(key){
  const all=getAllThemes();
  const t=all[key]||THEMES['default'];
  const root=document.documentElement.style;
  Object.entries(t).forEach(([k,v])=>{if(k.startsWith('--'))root.setProperty(k,v);});
  // Save to shared cross-app key so both Vault apps stay in sync
  localStorage.setItem('vt_theme',key);
  if(S&&S.settings){S.settings.theme=key;save();}
}

function initTheme(){
  // Prefer shared key, fall back to per-app settings, then default
  const k=localStorage.getItem('vt_theme')||(S&&S.settings&&S.settings.theme)||'default';
  const all=getAllThemes();
  const t=all[k]||THEMES['default'];
  const root=document.documentElement.style;
  Object.entries(t).forEach(([k2,v])=>{if(k2.startsWith('--'))root.setProperty(k2,v);});
  if(S&&S.settings)S.settings.theme=k;
}

// ‚ĒÄ‚ĒÄ custom theme builder ‚ĒÄ‚ĒÄ
function openThemeBuilder(editKey){
  const all=getAllThemes();
  const base=editKey?all[editKey]:THEMES['default'];
  const isNew=!editKey||!getCustomThemes()[editKey];
  const title=isNew?'Create Custom Theme':'Edit Theme';
  // colour pickers for key vars
  const picks=[
    ['Background','--bg'],['Surface','--bg2'],['Card','--card'],
    ['Text','--text'],['Muted text','--text2'],
    ['Accent (gold)','--gold'],['Primary (purple)','--purple'],['Purple light','--purple2'],
    ['Teal','--teal'],['Coral','--coral'],['Blue','--blue'],
  ];
  const rows=picks.map(([lbl,v])=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:.78rem;color:var(--text2)">${lbl}</span>
      <input type="color" id="tc-${v.replace(/-/g,'_')}" value="${base[v]||'#000000'}"
        style="width:40px;height:26px;border:none;border-radius:5px;cursor:pointer;background:none;padding:0">
    </div>`).join('');
  openModal(`<div>
    <div style="font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);margin-bottom:10px">ūüé® ${title}</div>
    <div class="fg"><label>Theme name</label>
      <input type="text" id="tc-name" placeholder="My theme" value="${editKey&&isNew===false?all[editKey].label||editKey:''}">
    </div>
    <div class="fg"><label>Description (optional)</label>
      <input type="text" id="tc-desc" placeholder="A short description" value="${editKey?all[editKey].desc||'':''}">
    </div>
    <div style="margin:8px 0 4px;font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Colours</div>
    <div style="max-height:300px;overflow-y:auto;padding-right:4px">${rows}</div>
    <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
      <button class="btn bp" onclick="saveCustomTheme('${editKey||''}')">ūüíĺ Save & Apply</button>
      ${editKey&&!isNew?`<button class="btn br" onclick="deleteCustomTheme('${editKey}')">ūüóĎ Delete</button>`:''}
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>`);
}

function saveCustomTheme(editKey){
  const name=document.getElementById('tc-name')?.value.trim()||'My Theme';
  const desc=document.getElementById('tc-desc')?.value.trim()||'';
  const key=editKey||(name.toLowerCase().replace(/[^a-z0-9]/g,'_')+'_'+Date.now());
  const picks=[
    ['--bg'],['--bg2'],['--card'],['--text'],['--text2'],
    ['--gold'],['--purple'],['--purple2'],['--teal'],['--coral'],['--blue'],
  ];
  const base=getAllThemes()[editKey]||THEMES['default'];
  const t={...base,label:name,desc};
  picks.forEach(([v])=>{
    const el=document.getElementById('tc-'+v.replace(/-/g,'_'));
    if(el)t[v]=el.value;
  });
  // auto-derive the secondary/tertiary vars from the primaries
  t['--bg3']=lighten(t['--bg'],10);t['--bg4']=lighten(t['--bg'],18);t['--bg5']=lighten(t['--bg'],26);
  t['--text3']=lighten(t['--text2'],-30);
  t['--gold2']=lighten(t['--gold'],15);t['--gold3']=lighten(t['--gold'],-20);
  t['--teal2']=lighten(t['--teal'],18);
  t['--coral2']=lighten(t['--coral'],15);
  const ct=getCustomThemes();ct[key]=t;saveCustomThemes(ct);
  closeModal();applyTheme(key);render();toast('ūüé® Theme saved & applied!');
}

function deleteCustomTheme(key){
  if(!confirm('Delete this custom theme?'))return;
  const ct=getCustomThemes();delete ct[key];saveCustomThemes(ct);
  if(S.settings?.theme===key){applyTheme('default');}
  closeModal();render();toast('Theme deleted');
}

function lighten(hex,amt){
  try{
    let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.max(0,Math.min(255,r+amt));g=Math.max(0,Math.min(255,g+amt));b=Math.max(0,Math.min(255,b+amt));
    return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
  }catch{return hex;}
}

// S.flt holds the multi-select filter state for the library
// We initialise it lazily so it doesn't break the existing simple S.tf/pf/sf
function initFlt(){
  if(!S.flt)S.flt={topics:new Set(['All']),periods:new Set(['All']),categories:new Set(['All']),search:''};
}

function toggleFltTopic(v){
  initFlt();const s=S.flt.topics;
  if(v==='All'){s.clear();s.add('All');}
  else{s.delete('All');s.has(v)?s.delete(v):s.add(v);if(!s.size)s.add('All');}
  S.flt.periods=new Set(['All']);
  const wasOpen=document.getElementById('msd-topic')?.classList.contains('open');
  render();
  if(wasOpen){const el=document.getElementById('msd-topic');if(el)el.classList.add('open');}
}
function toggleFltPeriod(v){
  initFlt();const s=S.flt.periods;
  if(v==='All'){s.clear();s.add('All');}
  else{s.delete('All');s.has(v)?s.delete(v):s.add(v);if(!s.size)s.add('All');}
  const wasOpen=document.getElementById('msd-period')?.classList.contains('open');
  render();
  if(wasOpen){const el=document.getElementById('msd-period');if(el)el.classList.add('open');}
}
function toggleFltCat(v){
  initFlt();const s=S.flt.categories;
  if(v==='All'){s.clear();s.add('All');}
  else{s.delete('All');s.has(v)?s.delete(v):s.add(v);if(!s.size)s.add('All');}
  const wasOpen=document.getElementById('msd-cat')?.classList.contains('open');
  render();
  if(wasOpen){const el=document.getElementById('msd-cat');if(el)el.classList.add('open');}
}
function clearLibFlt(){S.flt={topics:new Set(['All']),periods:new Set(['All']),categories:new Set(['All']),search:''};render();}

function toggleMsd(id){
  const el=document.getElementById(id);if(!el)return;
  const isOpen=el.classList.contains('open');
  document.querySelectorAll('.msd-wrap.open').forEach(e=>e.classList.remove('open'));
  if(!isOpen)el.classList.add('open');
}
document.addEventListener('click',()=>{
  document.querySelectorAll('.msd-wrap.open').forEach(e=>e.classList.remove('open'));
});

function truncateLabels(items,max=2){
  if(!items.length)return'All';
  if(items.length<=max)return items.join(', ');
  return`${items.slice(0,max).join(', ')} <span style="color:var(--text3)">+${items.length-max} more</span>`;
}

function applyLibFilters(pool){
  initFlt();
  let out=pool;
  const ts=S.flt.topics;
  const ps=S.flt.periods;
  const cs=S.flt.categories;
  const sr=(S.flt.search||'').toLowerCase().trim();
  if(!ts.has('All'))out=out.filter(q=>ts.has(q.topic));
  if(!ps.has('All'))out=out.filter(q=>ps.has(q.period));
  if(!cs.has('All'))out=out.filter(q=>cs.has(q.category));
  if(sr)out=out.filter(q=>
    (q.event||'').toLowerCase().includes(sr)||
    (q.year||'').toLowerCase().includes(sr)||
    (q.significance||'').toLowerCase().includes(sr)||
    (q.section||'').toLowerCase().includes(sr)||
    (q.topic||'').toLowerCase().includes(sr)||
    (q.period||'').toLowerCase().includes(sr)
  );
  return out;
}

function renderLibFilters(){
  initFlt();
  const qs=allQincHidden();
  const allTopics=['All',...new Set(qs.map(q=>q.topic))];
  const topicPool=S.flt.topics.has('All')?qs:qs.filter(q=>S.flt.topics.has(q.topic));
  const allPeriods=['All',...new Set(topicPool.map(q=>q.period))].sort((a,b)=>a==='All'?-1:b==='All'?1:a.localeCompare(b));
  const allCats=['All',...new Set(qs.map(q=>q.category).filter(Boolean))].sort((a,b)=>a==='All'?-1:b==='All'?1:a.localeCompare(b));

  const activeTp=[...S.flt.topics].filter(v=>v!=='All');

  const tpLabel=activeTp.length?truncateLabels(activeTp):'All topics';

  }).join('');

  return`<div style="margin-bottom:10px">
  <input type="text" placeholder="Search dates, events, significance‚Ä¶" value="${(S.flt.search||'').replace(/"/g,'&quot;')}"

      <div class="msd-wrap" id="msd-topic">
        <button class="msd-trigger" style="${activeTp.length?'border-color:var(--purple);color:var(--text)':''}"
          onclick="toggleMsd('msd-topic');event.stopPropagation()">${tpLabel}${activeTp.length?` <span style="background:var(--purple);color:#fff;border-radius:10px;padding:0 5px;font-size:.65rem;margin-left:4px">${activeTp.length}</span>`:''}</button>
        <div class="msd-dropdown">${msdItems(allTopics,S.flt.topics,'toggleFltTopic','')}</div>
      </div>
    </div>
    <div style="flex-shrink:0">
      <div style="font-size:.6rem;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.08em">Period</div>
      <div class="msd-wrap" id="msd-period">
        <button class="msd-trigger" style="${activePe.length?'border-color:var(--teal);color:var(--text)':''}"
          onclick="toggleMsd('msd-period');event.stopPropagation()">${peLabel}${activePe.length?` <span style="background:var(--teal);color:#0b0a14;border-radius:10px;padding:0 5px;font-size:.65rem;margin-left:4px;font-weight:700">${activePe.length}</span>`:''}</button>
        <div class="msd-dropdown">${msdItems(allPeriods,S.flt.periods,'toggleFltPeriod','')}</div>
      </div>
    </div>
    <div style="flex-shrink:0">
      <div style="font-size:.6rem;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.08em">Category</div>
      <div class="msd-wrap" id="msd-cat">
        <button class="msd-trigger" style="${activeCa.length?'border-color:var(--gold);color:var(--text)':''}"
          onclick="toggleMsd('msd-cat');event.stopPropagation()">${caLabel}${activeCa.length?` <span style="background:var(--gold);color:#0b0a14;border-radius:10px;padding:0 5px;font-size:.65rem;margin-left:4px;font-weight:700">${activeCa.length}</span>`:''}</button>

function sm2(srs,grade){
  let{ef=2.5,interval=1,reps=0,due=null}=srs||{};
  if(grade<3){reps=0;interval=1;}
  else{
    reps++;
    if(reps===1)interval=1;
    else if(reps===2)interval=6;
    else interval=Math.round(interval*ef);
    ef=Math.max(1.3,ef+(0.1-(3-grade)*(0.08+(3-grade)*0.02)));
  }
  const d=new Date();d.setDate(d.getDate()+interval);
  return{ef,interval,reps,due:d.toISOString().slice(0,10)};
}
function isDue(srs){if(!srs||!srs.due)return true;return srs.due<=new Date().toISOString().slice(0,10);}
function dueCount(){return allQ().filter(q=>isDue(qSRS(q.id))).length;}

function allQ(){

  const all=[...DB,...S.custom,...S.pending];
  for(const q of all){

    if(S.hidden.has(q.id))continue;
    out.push(q);
  }
  return out;
}

// Stable userKey (random UUID) stored in localStorage ‚ÄĒ never changes.
// Username is just a display name inside the KV value, freely editable.
// ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź
function getUsername(){
  return localStorage.getItem('dv_username') || localStorage.getItem('qv_username') || null;
}
function setUsername(u){
  localStorage.setItem('dv_username',u);
  localStorage.setItem('qv_username',u); // keep in sync with QuoteVault
}
function getUserKey(){
  // Stable KV key shared across both vaults ‚ÄĒ never changes even if username changes
  let k=localStorage.getItem('lb_userKey');
  if(!k){
    k=localStorage.getItem('qv_userKey'); // try other vault's copy
  }
  return k||null;
}
function setUserKey(k){
  localStorage.setItem('lb_userKey',k);
  localStorage.setItem('qv_userKey',k); // keep in sync
}

async function lbUpdate(){
  const u=getUsername();
  if(!u)return;
  const payload={username:u,site:'dv',mastered:S.mastered.size,xp:S.xp,mastered_ids:[...S.mastered].map(String)};
  const k=getUserKey();
  if(k)payload.userKey=k;
  try{
    const r=await fetch(WORKER_URL+'/lb/register',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    const d=await r.json();
    // Cache the stable userKey returned by the worker
    if(d.userKey&&d.userKey!==k)setUserKey(d.userKey);
  }catch(e){/* non-fatal */}
}

// Called any time mastery is granted ‚ÄĒ prompts for username if not set, then posts
// ‚ĒÄ‚ĒÄ Sync FROM worker on load (multi-device support) ‚ĒÄ‚ĒÄ
async function syncFromWorker(){
  const k=getUserKey();
  if(!k)return;
  try{
    const r=await fetch(WORKER_URL+'/lb/get?userKey='+encodeURIComponent(k));
    if(!r.ok)return;
    const d=await r.json();
    if(!d.found||!d.user)return;
    const u=d.user;
    // Sync username if set remotely and not locally
    if(u.username&&!getUsername()){
      setUsername(u.username);
    }
    // Merge mastered IDs from worker into local state
    const remoteMastered=Array.isArray(u.dv_mastered_ids)?u.dv_mastered_ids:[];
    if(remoteMastered.length>S.mastered.size){
      let added=0;
      remoteMastered.forEach(id=>{
        const numId=+id;
        const key=Number.isFinite(numId)&&String(numId)===String(id)?numId:id;
        if(!S.mastered.has(key)&&!S.mastered.has(String(key))){
          S.mastered.add(key);
          S.masteryPts[key]=100;
          added++;
        }
      });
      if(added>0){
        save();
        toast(`‚ėĀÔłŹ Synced ${added} mastered date${added===1?'':'s'} from cloud`,3000);
        render();
      }
    }
  }catch(e){/* non-fatal */}
}

async function applyUserKey(){
  const inp=document.getElementById('uk-input');
  if(!inp)return;
  const v=inp.value.trim();
  if(!v){document.getElementById('uk-err').innerHTML=`<span style="color:var(--coral)">Please paste a key</span>`;return;}
  if(v.length<10){document.getElementById('uk-err').innerHTML=`<span style="color:var(--coral)">That doesn't look like a valid key</span>`;return;}
  const errEl=document.getElementById('uk-err');
  errEl.innerHTML=`<span style="color:var(--blue)">‚Ź≥ Looking up key‚Ä¶</span>`;

async function lbConfirmUsername(){
  const inp=document.getElementById('lb-uname');
  if(!inp)return;
  const v=inp.value.trim();
  if(v.length<3||v.length>20||!/^[a-zA-Z0-9_-]+$/.test(v)){toast('‚ö† Invalid username');return;}
  const oldName=getUsername();
  const isSameUser=oldName&&oldName.toLowerCase()===v.toLowerCase();
  const myKey=getUserKey();
  // Check if the new username is taken by a DIFFERENT user
  // (skip check if it's just a case change of our own name)
  if(!isSameUser){
    try{
      const r=await fetch(WORKER_URL+'/lb/get?username='+encodeURIComponent(v));
      const d=await r.json();
      if(d.found&&d.user&&d.user.userKey&&d.user.userKey!==myKey){
        // Taken by someone else
        const errEl=document.getElementById('lb-name-err');
        if(errEl)errEl.innerHTML=`<span style="color:var(--coral)">‚ö† Username already taken ‚ÄĒ choose another</span>`;
        return;
      }
    }catch(e){/* non-fatal, proceed */}
  }
  // Update local storage first for instant UI feedback
  setUsername(v);
  closeModal();
  toast('ūüĎ§ Username '+(oldName&&!isSameUser?'changed to: ':'set: ')+v);
  if(window._lbCb){window._lbCb();window._lbCb=null;}
  // Push to worker ‚ÄĒ sends our stable userKey so it updates the same KV entry, not create a new one
  lbUpdate();
}

// MASTERY POINTS ENGINE
// ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź
// Each item has a hidden score 0‚Äď100. Reaching 100 ‚Üí mastered. Dropping to 0 ‚Üí unlearned.
function getMPts(id){return S.masteryPts[id]||0;}
function addMPts(id, delta){
  const cur=getMPts(id);
  const next=Math.max(0,Math.min(100,cur+delta));
  S.masteryPts[id]=next;
  const wasMastered=S.mastered.has(id);
  const wasLearning=S.learning.has(id);
  if(next>=100&&!wasMastered){
    S.mastered.add(id);S.learning.delete(id);
    addXP(0);// save happens in onMastery/save chain
    onMastery();
    toast('‚≠ź Mastered! +10 XP');addXP(10);
  } else if(next>=30&&!wasLearning&&!wasMastered){
    S.learning.add(id);
  } else if(next<30&&wasLearning&&!wasMastered){
    S.learning.delete(id);
  } else if(next<50&&wasMastered){
    S.mastered.delete(id);S.learning.add(id);
    toast('ūüďČ Mastery lost ‚ÄĒ keep practising');
  }
  save();
}
// Mastery% for display ‚ÄĒ uses masteryPts if set, else falls back to SRS
function mastPct(id){
  if(S.mastered.has(id))return 100;
  const pts=getMPts(id);
  if(pts>0)return Math.min(99,pts);
  // fallback to SRS reps
  const srs=qSRS(id);
  return S.learning.has(id)?Math.min(29,Math.round(((srs.reps||0)/4)*25)):Math.min(10,(srs.reps||0)*3);
}
function mastColor(pct){
  return pct>=100?'var(--teal)':pct>=60?'var(--gold)':pct>=30?'var(--amber)':'var(--purple2)';
}
function topics(){return['All',...new Set(allQ().map(q=>q.topic))];}
function periods(topic){const qs=topic==='All'?allQ():allQ().filter(q=>q.topic===topic);return['All',...new Set(qs.map(q=>q.period))];}
function backBtn(){return S.hist.length?`<button class="bback" onclick="goBack()">‚Üź Back</button>`:''}
function normQ(s){return s.toLowerCase().replace(/[^a-z0-9 ',.-]/g,'').replace(/\s+/g,' ').trim();}
function sim(a,b){
  const na=normQ(a),nb=normQ(b);
  if(na===nb)return 1;
  const wa=na.split(' ').filter(w=>w.length>2);
  const wb=new Set(nb.split(' ').filter(w=>w.length>2));
  if(!wa.length||!wb.size)return 0;
  let c=0;wa.forEach(w=>{if(wb.has(w))c++;});
  return(2*c)/(wa.length+wb.size);
}
function bestMatch(inp,pool){
  let best=0,q=null;
  pool.forEach(p=>{const s=sim(inp,p.event+' '+p.year);if(s>best){best=s;q=p;}});
  return{score:best,quote:q};
}

function removeMastery(id){
  S.mastered.delete(id);S.learning.delete(id);S.masteryPts[id]=0;save();render();toast('ūüóĎ Mastery reset for this date');
}
function rateSRS(id,grade){
  // grade: 1=Blackout, 2=Hard, 3=Good, 4=Easy, 5=Perfect
  const srsGrade=grade<=1?0:grade<=2?1:grade<=3?2:grade<=4?3:3; // map to SM2 0-3
  const srs=sm2(qSRS(id),srsGrade);setQSRS(id,srs);
  // Mastery points: Blackout=-30, Hard=-10, Good=+15, Easy=+22, Perfect=+30
  const mDelta=[0,-30,-10,15,22,30][grade]||0;
  addMPts(id,mDelta);
  // XP
  const xpMap=[0,2,3,8,12,15][grade]||0;
  if(xpMap>0)addXP(xpMap);
  // Next card
  const srsTopic=S.srs.topic||'All';
  let remaining=allQ().filter(q=>q.id!==id&&isDue(qSRS(q.id)));
  if(srsTopic!=='All')remaining=remaining.filter(q=>q.topic===srsTopic);
  S.srs_q=remaining.length>0?shuf(remaining)[0]:null;
  S.srs_show=false;
  save();render();
}

function startQuiz(){
  const w=document.getElementById('qw').value;
  const t=document.getElementById('qt').value;
  const n=+document.getElementById('qn').value;
  let pool=w==='All'?allQ():allQ().filter(q=>q.topic===w);

// Difficulty ramp: for adaptive mode, determine question type by position
function getAdaptiveType(idx,total){
  const frac=idx/total;
  if(frac<0.25)return'period';          // Easy: which period?
  if(frac<0.45)return'section';         // Easy-medium: which theme?
  if(frac<0.65)return'date_to_event';   // Medium: date ‚Üí event
  if(frac<0.82)return'event_to_date';   // Hard: event ‚Üí year
  return'significance';                  // Hardest: explain significance
}

function getDiffLabel(type){
  if(type==='period'||type==='section')return`<span class="diff-badge diff-easy">ūüüĘ Easy</span>`;
  if(type==='date_to_event')return`<span class="diff-badge diff-med">ūüü° Medium</span>`;
  if(type==='event_to_date')return`<span class="diff-badge diff-hard">ūüĒī Hard</span>`;
  if(type==='significance')return`<span class="diff-badge diff-hard">ūüĒī Hardest</span>`;
  return'';
}

function rQuizQ(){
  const{qs,idx,score,checked,ans}=S.quiz;
  const q=qs[idx];
  let type=S.quiz.type==='adaptive'?getAdaptiveType(idx,qs.length):S.quiz.type;
  let prompt='',instr='',correct='',ph='',isLong=false;
  if(type==='date_to_event'){
    prompt=`<span style="font-family:'DM Mono',monospace;color:var(--gold);font-size:1.1rem">${q.year}</span><div style="font-size:.7rem;color:var(--text3);margin-top:5px">${q.topic} ¬∑ ${q.period}</div>`;
    instr='What happened on this date? Describe the event.';correct=q.event;ph='Describe the event‚Ä¶';isLong=true;
  }else if(type==='event_to_date'){
    prompt=`${q.event}<div style="font-size:.7rem;color:var(--text3);margin-top:5px">${q.topic} ¬∑ ${q.period}</div>`;
    instr='What year (or date) did this happen? Be as precise as possible.';correct=q.year;ph='e.g. 1929 or November 1938‚Ä¶';
  }else if(type==='significance'){
    prompt=`<span style="font-family:'DM Mono',monospace;color:var(--gold)">${q.year}</span> ‚ÄĒ ${q.event}<div style="font-size:.7rem;color:var(--text3);margin-top:5px">${q.topic}</div>`;
    instr='Explain WHY this event was significant. Include causes AND consequences.';correct=q.significance;ph='Explain significance in detail‚Ä¶';isLong=true;
  }else if(type==='period'){
    prompt=`${q.event}<div style="font-size:.7rem;color:var(--text3);margin-top:5px">${q.topic}</div>`;
    instr='Which period does this event belong to?';correct=q.period;ph='e.g. Weimar Republic, Anglo-Saxon, 19th Century‚Ä¶';
  }else if(type==='section'){
    prompt=`${q.event}<div style="font-size:.7rem;color:var(--text3);margin-top:5px">${q.topic} ¬∑ ${q.year}</div>`;
    instr='Which theme or section does this belong to?';correct=q.section||q.period;ph='e.g. Consolidation of Power, Punishment‚Ä¶';
  }

  let feedback='';
  if(checked){
    const userN=normQ(ans||'');const corrN=normQ(correct);
    let ok=false;
    if(type==='event_to_date'){
      const nums=ans.match(/\d{3,4}/g)||[];
      const corrNums=correct.match(/\d{3,4}/g)||[];
      ok=nums.some(n=>corrNums.includes(n));
    }else if(type==='period'||type==='section'){
      ok=userN.includes(corrN.slice(0,8))||corrN.includes(userN.slice(0,8));
    }else{ok=sim(ans||'',correct)>0.18;}
    if(ok){S.quiz.score++;addXP(15);addMPts(q.id,20);}else{addXP(2);addMPts(q.id,-10);}
    S.quizHistory.push({date:new Date().toISOString().slice(0,10),correct:ok?1:0,total:1,topic:q.topic});
    save();
    feedback=`<div class="qfb ${ok?'qok':'qwr'}">
      ${ok?'‚úÖ Correct! +15 XP':'‚ĚĆ Not quite ‚ÄĒ +2 XP for trying'}
      <div style="margin-top:6px;font-size:.78rem"><strong style="color:var(--gold)">Model answer:</strong><br>${correct}</div>
      ${type!=='significance'?`<div style="margin-top:5px;font-size:.73rem;color:var(--text2)">${q.significance.slice(0,180)}‚Ä¶</div>`:''}
    </div>
    <button class="btn bp" style="margin-top:9px" onclick="nextQQ()">Next ‚Üí</button>`;
  }

  const activeType=S.quiz.type==='adaptive'?getAdaptiveType(idx,qs.length):S.quiz.type;
  return`<div>
  ${backBtn()}
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
    <span style="font-size:.7rem;color:var(--text3)">Q${idx+1}/${S.quiz.qs.length}</span>
    <div style="display:flex;align-items:center;gap:8px">
      ${S.quiz.type==='adaptive'?getDiffLabel(activeType):''}
      <span style="font-size:.7rem;color:var(--gold)">Score: ${score}</span>
    </div>
  </div>
  <div class="pb"><div class="pbf" style="width:${pct(idx,S.quiz.qs.length)}%"></div></div>
  <div class="qq">${prompt}</div>
  <div style="font-size:.72rem;color:var(--text2);margin-bottom:8px">${instr}</div>
  ${!checked?`
  ${isLong?`<textarea id="qans" rows="3" placeholder="${ph}" onkeydown="if(event.ctrlKey&&event.key==='Enter')submitQ()">${ans}</textarea><div class="hint">Ctrl+Enter to submit</div>`:
  `<input type="text" id="qans" placeholder="${ph}" value="${ans||''}" onkeydown="if(event.key==='Enter')submitQ()">`}
  <div style="display:flex;gap:7px;margin-top:8px">
    <button class="btn bp" onclick="submitQ()">Submit</button>
    <button class="btn" onclick="nextQQ()">Skip ‚Üí</button>
  </div>`:''}
  ${feedback}
  </div>`;
}

function startTC(){
  if(S.tc.timer)clearInterval(S.tc.timer);
  const w=document.getElementById('tcw').value;
  const t=+document.getElementById('tct').value;
  const tp=document.getElementById('tctype').value;
  const pool=w==='All'?allQ():allQ().filter(q=>q.topic===w);
  S.tc={active:true,topic:w,qs:shuf(pool),idx:0,score:0,tLeft:t,total:t,timer:null,ans:'',result:null,type:tp};
  render();startTCTimer();
}
function startTCTimer(){
  if(S.tc.timer)clearInterval(S.tc.timer);
  S.tc.timer=setInterval(()=>{
    S.tc.tLeft=Math.max(0,S.tc.tLeft-1);S.tc.result=null;
    const numEl=document.getElementById('tc-num');
    const pbEl=document.getElementById('tc-pb');
    const arcEl=document.getElementById('tc-arc');
    if(numEl){numEl.textContent=S.tc.tLeft;numEl.style.color=S.tc.tLeft<15?'var(--coral)':'var(--gold)';}
    if(pbEl){pbEl.style.width=pct(S.tc.tLeft,S.tc.total)+'%';pbEl.className='pbf'+(S.tc.tLeft<15?' pr':'');}
    if(arcEl){arcEl.setAttribute('stroke',S.tc.tLeft<15?'var(--coral)':'var(--teal)');arcEl.setAttribute('stroke-dashoffset',2*Math.PI*28*(1-S.tc.tLeft/S.tc.total));}
    if(S.tc.tLeft<=0){clearInterval(S.tc.timer);S.tc.timer=null;render();}
  },1000);
}
function checkTC(){
  const el=document.getElementById('tc-ans');
  const ans=(el?el.value:'').trim();
  const q=S.tc.qs[S.tc.idx%S.tc.qs.length];
  const tp=S.tc.type||'event_to_date';
  let correct='',ok=false;
  if(tp==='event_to_date'){
    correct=q.year;const nums=ans.match(/\d{3,4}/g)||[];const corrNums=q.year.match(/\d{3,4}/g)||[];
    ok=nums.some(n=>corrNums.includes(n));
  }else if(tp==='date_to_event'){correct=q.event;ok=sim(ans,q.event)>0.3;}
  else{correct=q.period;ok=normQ(ans).includes(normQ(q.period).slice(0,6));}
  if(ok){S.tc.score++;addXP(5);addMPts(q.id,15);S.tc.result={ok:true};}
  else{addMPts(q.id,-8);S.tc.result={ok:false,correct};}
  S.tc.idx++;
  if(el){el.value='';el.focus();}
  const res=document.querySelector('.qfb');
  if(res){res.className='qfb '+(ok?'qok':'qwr');res.innerHTML=(ok?'‚úÖ Correct! +5 XP':'‚ĚĆ Answer: '+correct);}
  else{
    const qEl=document.querySelector('.qq');
    if(qEl){const r=document.createElement('div');r.className='qfb '+(ok?'qok':'qwr');r.style.marginTop='8px';r.textContent=(ok?'‚úÖ Correct! +5 XP':'‚ĚĆ Answer: '+correct);qEl.parentNode.insertBefore(r,qEl.nextSibling.nextSibling||null);}
  }
  setTimeout(()=>{
    const nextQ=S.tc.qs[S.tc.idx%S.tc.qs.length];
    const qqEl=document.querySelector('.qq');
    if(qqEl&&S.tc.tLeft>0){
      const tp2=S.tc.type||'event_to_date';
      if(tp2==='event_to_date')qqEl.innerHTML=nextQ.event.slice(0,80);
      else if(tp2==='date_to_event')qqEl.innerHTML=`<span style="font-family:'DM Mono',monospace;color:var(--gold)">${nextQ.year}</span>`;
      else qqEl.innerHTML=nextQ.event.slice(0,80);
      const rfb=document.querySelector('.qfb');if(rfb)rfb.remove();
    }
    save();
  },800);
}
function skipTC(){S.tc.idx++;const el=document.getElementById('tc-ans');if(el){el.value='';el.focus();}}
function endTC(){if(S.tc.timer){clearInterval(S.tc.timer);S.tc.timer=null;}S.tc.tLeft=0;render();}

function tlInitCanvas(){
  const canvas=document.getElementById('tl-canvas');if(!canvas)return;
  const wrap=document.getElementById('tl-canvas-wrap');if(!wrap)return;
  const W=wrap.clientWidth||300;
  canvas.width=W*window.devicePixelRatio;
  canvas.height=_tlState.HEIGHT*window.devicePixelRatio;
  canvas.style.height=_tlState.HEIGHT+'px';
  _tlState.canvas=canvas;_tlState.ctx=canvas.getContext('2d');
  _tlState.ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
  _tlState.WIDTH=W;
  const selTopic=S.tl.topic||topics().filter(t=>t!=='All')[0];
  let pool=allQ().filter(q=>q.topic===selTopic);
  if(S.tl.period&&S.tl.period!=='All')pool=pool.filter(q=>q.period===S.tl.period);
  pool=pool.slice().sort((a,b)=>a.yearNum-b.yearNum);
  _tlState.pool=pool;
  const minY=pool[0]?.yearNum??0;const maxY=pool[pool.length-1]?.yearNum??minY+1;
  _tlState.minY=minY;_tlState.maxY=maxY;
  const range=Math.max(maxY-minY,1);
  const baseZoom=(W*0.88)/range;
  _tlState.baseZoom=baseZoom;
  if(S.tl.tlZoom!=null){_tlState.zoom=S.tl.tlZoom;}else{_tlState.zoom=baseZoom;}
  if(S.tl.tlOffset!=null){_tlState.offset=S.tl.tlOffset;}else{_tlState.offset=(W*(1-0.88)/2);}
  tlBindEvents();tlDraw();
}

function tlDraw(){
  const{ctx,WIDTH,HEIGHT,zoom,offset,minY,maxY,pool,selectedId}=_tlState;
  if(!ctx)return;
  ctx.clearRect(0,0,WIDTH,HEIGHT);
  const CY=HEIGHT/2;
  const PERIOD_COL={'Anglo-Saxon':'#7F77DD','Norman':'#1D9E75','Later Middle Ages':'#D85A30','Early Modern':'#D4537E','18th Century':'#378ADD','19th Century':'#BA7517','Modern':'#639922','Weimar Republic':'#9b7ee0','Nazi Germany':'#e85d4a','Henry VIII':'#e8c547','American West':'#3de09a','Whitechapel':'#d4549a'};
  function pCol(p){return PERIOD_COL[p]||'#9b7ee0';}
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,CY);ctx.lineTo(WIDTH,CY);ctx.stroke();
  const periodBounds={};
  pool.forEach(q=>{
    if(!periodBounds[q.period])periodBounds[q.period]={min:q.yearNum,max:q.yearNum};
    periodBounds[q.period].min=Math.min(periodBounds[q.period].min,q.yearNum);
    periodBounds[q.period].max=Math.max(periodBounds[q.period].max,q.yearNum);
  });
  Object.entries(periodBounds).forEach(([p,{min,max}])=>{
    const x1=offset+(min-5-minY)*zoom;const x2=offset+(max+5-minY)*zoom;
    if(x2<0||x1>WIDTH)return;
    ctx.fillStyle=pCol(p)+'18';ctx.fillRect(Math.max(0,x1),CY-80,Math.min(WIDTH,x2)-Math.max(0,x1),160);
  });
  const yearsVisible=WIDTH/zoom;
  const niceIntervals=[1,2,5,10,25,50,100,200,500];
  let interval=niceIntervals.find(i=>yearsVisible/i<15)||500;
  const firstTick=Math.ceil(minY/interval)*interval;
  ctx.font='10px DM Mono, monospace';ctx.textAlign='center';
  for(let y=firstTick-interval;y<=maxY+interval;y+=interval){
    const x=offset+(y-minY)*zoom;if(x<-40||x>WIDTH+40)continue;
    ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,CY-10);ctx.lineTo(x,CY+10);ctx.stroke();
    ctx.fillStyle='rgba(90,88,122,0.9)';ctx.fillText(y,x,CY+22);
  }
  pool.forEach((q,i)=>{
    const x=offset+(q.yearNum-minY)*zoom;if(x<-20||x>WIDTH+20)return;
    const isMastered=S.mastered.has(q.id);const isLearning=S.learning.has(q.id);const isSel=selectedId===q.id;
    const col=isMastered?'#3de09a':isLearning?'#e8c547':pCol(q.period);
    const r=isSel?9:(q.stars===5?6:4);const above=i%2===0;const labelY=above?CY-18:CY+30;
    ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,CY+(above?-r:r));ctx.lineTo(x,above?CY-13:CY+22);ctx.stroke();
    if(isSel){ctx.beginPath();ctx.arc(x,CY,r+4,0,Math.PI*2);ctx.strokeStyle=col+'55';ctx.lineWidth=2;ctx.stroke();}
    ctx.beginPath();ctx.arc(x,CY,r,0,Math.PI*2);ctx.fillStyle=col+'33';ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=isSel?2.5:1.5;ctx.stroke();
    const maxLabelW=Math.max(50,zoom*20);let label=q.year;
    if(zoom>_tlState.baseZoom*1.5)label=q.year+' '+q.event;
    ctx.font=(isSel?'bold ':'')+`10px DM Mono, monospace`;ctx.fillStyle=isSel?col:'rgba(155,152,181,0.85)';ctx.textAlign='center';
    let txt=label;while(ctx.measureText(txt).width>maxLabelW&&txt.length>4)txt=txt.slice(0,-2)+'\u2026';
    ctx.fillText(txt,x,labelY);
  });
  const lbl=document.getElementById('tl-zoom-label');
  if(lbl)lbl.textContent=`${pool.length} events ¬∑ ${Math.round(yearsVisible)} yrs visible`;
}

function tlXtoYear(x){return _tlState.minY+(x-_tlState.offset)/_tlState.zoom;}
function tlClampOffset(){
  const{WIDTH,zoom,minY,maxY}=_tlState;const range=Math.max(maxY-minY,1);const dataW=range*zoom;
  const padding=WIDTH*0.15;_tlState.offset=Math.min(padding,Math.max(WIDTH-dataW-padding,_tlState.offset));
}
function tlBindEvents(){
  const canvas=_tlState.canvas;if(!canvas||canvas._tlBound)return;canvas._tlBound=true;
  canvas.addEventListener('mousedown',e=>{_tlState.isDragging=true;_tlState._didDrag=false;_tlState.dragStartX=e.clientX;_tlState.dragStartOffset=_tlState.offset;});
  window.addEventListener('mousemove',e=>{if(!_tlState.isDragging)return;_tlState._didDrag=true;_tlState.offset=_tlState.dragStartOffset+(e.clientX-_tlState.dragStartX);tlClampOffset();tlSaveState();tlDraw();});
  window.addEventListener('mouseup',()=>{_tlState.isDragging=false;});
  canvas.addEventListener('click',e=>{
    if(_tlState._didDrag)return;
    const rect=canvas.getBoundingClientRect();const x=(e.clientX-rect.left);const y=(e.clientY-rect.top);const CY=_tlState.HEIGHT/2;
    let hit=null;let bestDist=14;
    _tlState.pool.forEach(q=>{const qx=_tlState.offset+(q.yearNum-_tlState.minY)*_tlState.zoom;const dist=Math.sqrt((x-qx)**2+(y-CY)**2);if(dist<bestDist){bestDist=dist;hit=q;}});
    if(hit){_tlState.selectedId=hit.id;tlShowDetail(hit);tlDraw();}
  });
  canvas.addEventListener('wheel',e=>{
    e.preventDefault();const rect=canvas.getBoundingClientRect();const mouseX=e.clientX-rect.left;const yearAtMouse=tlXtoYear(mouseX);
    const factor=e.deltaY<0?1.15:0.87;_tlState.zoom=Math.max(_tlState.baseZoom*0.5,Math.min(_tlState.baseZoom*50,_tlState.zoom*factor));
    _tlState.offset=mouseX-(yearAtMouse-_tlState.minY)*_tlState.zoom;tlClampOffset();tlSaveState();tlDraw();
  },{passive:false});
  let _lastTouchX=0;
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(e.touches.length===1){_tlState.isDragging=true;_lastTouchX=e.touches[0].clientX;_tlState.dragStartOffset=_tlState.offset;_tlState._didDrag=false;}
    else if(e.touches.length===2){_tlState.isPinching=true;_tlState.isDragging=false;const dx=e.touches[0].clientX-e.touches[1].clientX;const dy=e.touches[0].clientY-e.touches[1].clientY;_tlState.pinchStartDist=Math.sqrt(dx*dx+dy*dy);_tlState.pinchStartZoom=_tlState.zoom;_tlState.pinchMidX=(e.touches[0].clientX+e.touches[1].clientX)/2;const rect=canvas.getBoundingClientRect();_tlState.pinchYearAtMid=tlXtoYear(_tlState.pinchMidX-rect.left);}
  },{passive:false});
  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(_tlState.isPinching&&e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX;const dy=e.touches[0].clientY-e.touches[1].clientY;const dist=Math.sqrt(dx*dx+dy*dy);const ratio=dist/_tlState.pinchStartDist;_tlState.zoom=Math.max(_tlState.baseZoom*0.5,Math.min(_tlState.baseZoom*50,_tlState.pinchStartZoom*ratio));const rect=canvas.getBoundingClientRect();const midX=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left;_tlState.offset=midX-(_tlState.pinchYearAtMid-_tlState.minY)*_tlState.zoom;tlClampOffset();tlSaveState();tlDraw();}
    else if(_tlState.isDragging&&e.touches.length===1){const dx=e.touches[0].clientX-_lastTouchX;_lastTouchX=e.touches[0].clientX;_tlState.offset+=dx;tlClampOffset();tlSaveState();tlDraw();_tlState._didDrag=true;}
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    _tlState.isPinching=false;
    if(e.touches.length===0){_tlState.isDragging=false;if(!_tlState._didDrag){const last=e.changedTouches[0];const rect=canvas.getBoundingClientRect();const x=last.clientX-rect.left;const y=last.clientY-rect.top;const CY=_tlState.HEIGHT/2;let hit=null;let bestDist=20;_tlState.pool.forEach(q=>{const qx=_tlState.offset+(q.yearNum-_tlState.minY)*_tlState.zoom;const dist=Math.sqrt((x-qx)**2+(y-CY)**2);if(dist<bestDist){bestDist=dist;hit=q;}});if(hit){_tlState.selectedId=hit.id;tlShowDetail(hit);tlDraw();}}}
  },{passive:false});
}

function tlZoomIn(){const W=_tlState.WIDTH;const yr=tlXtoYear(W/2);_tlState.zoom=Math.min(_tlState.baseZoom*50,_tlState.zoom*1.5);_tlState.offset=W/2-(yr-_tlState.minY)*_tlState.zoom;tlClampOffset();tlSaveState();tlDraw();}
function tlZoomOut(){const W=_tlState.WIDTH;const yr=tlXtoYear(W/2);_tlState.zoom=Math.max(_tlState.baseZoom*0.5,_tlState.zoom/1.5);_tlState.offset=W/2-(yr-_tlState.minY)*_tlState.zoom;tlClampOffset();tlSaveState();tlDraw();}

function ddInitCanvas(){
  const canvas=document.getElementById('dd-canvas');if(!canvas)return;
  const wrap=document.getElementById('dd-canvas-wrap');if(!wrap)return;
  const W=wrap.clientWidth||300;const H=130;
  canvas.width=W*window.devicePixelRatio;canvas.height=H*window.devicePixelRatio;canvas.style.height=H+'px';wrap.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
  const selTopic=S.tl.topic||'Crime & Punishment';
  let pool=allQ().filter(q=>q.topic===selTopic);
  if(S.tl.period&&S.tl.period!=='All')pool=pool.filter(q=>q.period===S.tl.period);
  pool=pool.slice().sort((a,b)=>a.yearNum-b.yearNum);
  const minY=pool[0]?.yearNum??0;const maxY=pool[pool.length-1]?.yearNum??minY+1;
  const range=Math.max(maxY-minY,1);
  const baseZoom=(W*0.88)/range;
  _ddState={
    ..._ddState,canvas,ctx,WIDTH:W,HEIGHT:H,minY,maxY,range,baseZoom,
    zoom:_ddState.baseZoom===baseZoom?_ddState.zoom:baseZoom,
    offset:_ddState.baseZoom===baseZoom?_ddState.offset:W*(1-0.88)/2,
    cards:pool,placed:S.tl.placed||{},checked:S.tl.checked||false
  };
  _ddState.baseZoom=baseZoom;
  ddBindEvents();ddDraw();
}

function ddXtoYear(x){return _ddState.minY+(x-_ddState.offset)/_ddState.zoom;}
function ddYearToX(y){return _ddState.offset+(y-_ddState.minY)*_ddState.zoom;}
function ddSnapToNearestYear(y){return Math.round(y);}
function ddClampOffset(){
  const{WIDTH,zoom,minY,maxY}=_ddState;const range=Math.max(maxY-minY,1);const dataW=range*zoom;
  const padding=WIDTH*0.15;_ddState.offset=Math.min(padding,Math.max(WIDTH-dataW-padding,_ddState.offset));
}

function ddDraw(){
  const{ctx,WIDTH,HEIGHT,zoom,offset,minY,maxY,cards,placed,checked,range}=_ddState;
  if(!ctx)return;
  ctx.clearRect(0,0,WIDTH,HEIGHT);
  const CY=HEIGHT/2;
  const tolerance=Math.max(3,range*0.025);
  const decadeTol=Math.max(10,range*0.08);

  // axis line
  ctx.strokeStyle='rgba(255,255,255,0.13)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,CY);ctx.lineTo(WIDTH,CY);ctx.stroke();

  // tick marks and year labels
  const yearsVisible=WIDTH/zoom;
  const niceIntervals=[1,2,5,10,25,50,100,200,500];
  let interval=niceIntervals.find(i=>yearsVisible/i<15)||500;
  const firstTick=Math.ceil(minY/interval)*interval;
  ctx.font='9px DM Mono, monospace';ctx.textAlign='center';
  for(let y=firstTick-interval;y<=maxY+interval;y+=interval){
    const x=offset+(y-minY)*zoom;if(x<-40||x>WIDTH+40)continue;
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,CY-12);ctx.lineTo(x,CY+12);ctx.stroke();
    ctx.fillStyle='rgba(90,88,122,0.9)';ctx.fillText(y,x,CY+25);
  }

  // hoverYear indicator line
  if(_ddState.hoverYear!=null){
    const hx=offset+(_ddState.hoverYear-minY)*zoom;
    if(hx>0&&hx<WIDTH){
      ctx.strokeStyle='rgba(124,92,191,0.8)';ctx.lineWidth=2;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(hx,10);ctx.lineTo(hx,HEIGHT-10);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(124,92,191,0.9)';ctx.font='bold 10px DM Mono, monospace';ctx.textAlign='center';
      ctx.fillText(''+_ddState.hoverYear,hx,18);
    }
  }

  // Draw placed dots on axis
  Object.entries(placed).forEach(([id,yearPlaced])=>{
    const x=offset+(yearPlaced-minY)*zoom;if(x<-20||x>WIDTH+20)return;
    const q=cards.find(c=>c.id===id);if(!q)return;
    const diff=Math.abs(yearPlaced-q.yearNum);
    let col;
    if(!checked)col='#9b7ee0';
    else if(diff<=tolerance)col='#3de09a';
    else if(diff<=decadeTol)col='#e8c547';
    else col='#e85d4a';

    // Draw a line from axis to label above/below
    const above=(id.charCodeAt(id.length-1)%2===0);
    const labelY=above?CY-32:CY+42;
    ctx.strokeStyle=col+'55';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,CY+(above?-7:7));ctx.lineTo(x,above?CY-28:CY+35);ctx.stroke();

    // Dot on axis
    ctx.beginPath();ctx.arc(x,CY,6,0,Math.PI*2);
    ctx.fillStyle=col+'44';ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();

    // Label: short event name above/below
    ctx.font='9px DM Sans, sans-serif';ctx.textAlign='center';ctx.fillStyle=col;
    const label=checked?(diff<=tolerance?'‚úď '+q.year:diff<=decadeTol?'~ '+q.year:'‚úó '+q.year):q.event.slice(0,20)+'‚Ä¶';
    let txt=label;
    const maxW=80;while(ctx.measureText(txt).width>maxW&&txt.length>4)txt=txt.slice(0,-2)+'\u2026';
    ctx.fillText(txt,x,labelY);

    // If checked and wrong, draw correct position ghost
    if(checked&&diff>tolerance){
      const cx=offset+(q.yearNum-minY)*zoom;
      if(cx>0&&cx<WIDTH){
        ctx.beginPath();ctx.arc(cx,CY,5,0,Math.PI*2);
        ctx.strokeStyle='rgba(61,224,154,0.4)';ctx.lineWidth=1;ctx.setLineDash([2,2]);ctx.stroke();ctx.setLineDash([]);
        ctx.strokeStyle='rgba(61,224,154,0.25)';ctx.lineWidth=1;ctx.setLineDash([2,4]);
        ctx.beginPath();ctx.moveTo(x,CY);ctx.lineTo(cx,CY);ctx.stroke();ctx.setLineDash([]);
        ctx.font='8px DM Mono, monospace';ctx.fillStyle='rgba(61,224,154,0.5)';ctx.textAlign='center';
        ctx.fillText(q.year,cx,above?CY+30:CY-22);
      }
    }
  });

  const lbl=document.getElementById('dd-zoom-label');
  if(lbl)lbl.textContent=`${cards.length} events ¬∑ ${Math.round(yearsVisible)}y visible ¬∑ zoom/pan to navigate`;
}

function ddBindEvents(){
  const canvas=document.getElementById('dd-canvas');
  const wrap=document.getElementById('dd-canvas-wrap');
  if(!canvas||!wrap||wrap._ddBound)return;wrap._ddBound=true;

  // Pan ‚ÄĒ only when not hovering a placed card and no active drag
  wrap.addEventListener('mousedown',e=>{
    if(e.target!==canvas)return;
    _ddState.isDragging=true;_ddState._didDrag=false;
    _ddState.dragStartX=e.clientX;_ddState.dragStartOffset=_ddState.offset;
    wrap.style.cursor='grabbing';
  });
  window.addEventListener('mousemove',e=>{
    if(!_ddState.isDragging)return;
    _ddState._didDrag=true;
    _ddState.offset=_ddState.dragStartOffset+(e.clientX-_ddState.dragStartX);
    ddClampOffset();ddDraw();
  });
  window.addEventListener('mouseup',()=>{_ddState.isDragging=false;wrap.style.cursor='grab';});

  // Wheel zoom
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    const rect=canvas.getBoundingClientRect();const mouseX=e.clientX-rect.left;const yearAtMouse=ddXtoYear(mouseX);
    const factor=e.deltaY<0?1.15:0.87;
    _ddState.zoom=Math.max(_ddState.baseZoom*0.5,Math.min(_ddState.baseZoom*50,_ddState.zoom*factor));
    _ddState.offset=mouseX-(yearAtMouse-_ddState.minY)*_ddState.zoom;
    ddClampOffset();ddDraw();
  },{passive:false});

  // Touch pan & pinch
  let _lastTX=0;
  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length===1){_ddState.isDragging=true;_ddState._didDrag=false;_lastTX=e.touches[0].clientX;}
    else if(e.touches.length===2){
      _ddState.isPinching=true;_ddState.isDragging=false;
      const dx=e.touches[0].clientX-e.touches[1].clientX;const dy=e.touches[0].clientY-e.touches[1].clientY;
      _ddState.pinchStartDist=Math.sqrt(dx*dx+dy*dy);_ddState.pinchStartZoom=_ddState.zoom;
      const rect=canvas.getBoundingClientRect();
      _ddState.pinchMidX=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left;
      _ddState.pinchYearAtMid=ddXtoYear(_ddState.pinchMidX);
    }
  },{passive:true});
  wrap.addEventListener('touchmove',e=>{
    if(e.cancelable)e.preventDefault();
    if(_ddState.isPinching&&e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;const dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.sqrt(dx*dx+dy*dy);const ratio=dist/_ddState.pinchStartDist;
      _ddState.zoom=Math.max(_ddState.baseZoom*0.5,Math.min(_ddState.baseZoom*50,_ddState.pinchStartZoom*ratio));
      const rect=canvas.getBoundingClientRect();
      const midX=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left;
      _ddState.offset=midX-(_ddState.pinchYearAtMid-_ddState.minY)*_ddState.zoom;
      ddClampOffset();ddDraw();
    }else if(_ddState.isDragging&&e.touches.length===1){
      _ddState._didDrag=true;const dx=e.touches[0].clientX-_lastTX;_lastTX=e.touches[0].clientX;
      _ddState.offset+=dx;ddClampOffset();ddDraw();
    }
  },{passive:false});
  wrap.addEventListener('touchend',()=>{_ddState.isPinching=false;_ddState.isDragging=false;});
}

function ddZoomIn(){const W=_ddState.WIDTH;const yr=ddXtoYear(W/2);_ddState.zoom=Math.min(_ddState.baseZoom*50,_ddState.zoom*1.5);_ddState.offset=W/2-(yr-_ddState.minY)*_ddState.zoom;ddClampOffset();ddDraw();}
function ddZoomOut(){const W=_ddState.WIDTH;const yr=ddXtoYear(W/2);_ddState.zoom=Math.max(_ddState.baseZoom*0.5,_ddState.zoom/1.5);_ddState.offset=W/2-(yr-_ddState.minY)*_ddState.zoom;ddClampOffset();ddDraw();}
function ddZoomReset(){_ddState.zoom=_ddState.baseZoom;_ddState.offset=_ddState.WIDTH*(1-0.88)/2;ddDraw();}

function ddDropToBank(e){
  e.preventDefault();

function checkDDTimeline(){
  const selTopic=S.tl.topic||'Crime & Punishment';
  let pool=allQ().filter(q=>q.topic===selTopic);
  if(S.tl.period&&S.tl.period!=='All')pool=pool.filter(q=>q.period===S.tl.period);
  const placed=S.tl.placed||{};
  const range=Math.max((_ddState.maxY||0)-(_ddState.minY||0),1);
  const tolerance=Math.max(3,range*0.025);
  const decadeTol=Math.max(10,range*0.08);
  let correct=0,close=0;
  pool.forEach(q=>{
    const yr=placed[q.id];if(yr===undefined)return;
    const diff=Math.abs(yr-q.yearNum);
    if(diff<=tolerance){correct++;addMPts(q.id,20);}
    else if(diff<=decadeTol){close++;addMPts(q.id,5);}
    else{addMPts(q.id,-8);}
  });
  S.tl.checked=true;_ddState.checked=true;_ddState.placed=placed;
  S.tl.score=correct;addXP(correct*15+close*5);save();render();
}

      if(!S.tl.placed)S.tl.placed={};

  if(bank){

    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
      if(S.tl.placed&&S.tl.placed[_ddTouchCardId])delete S.tl.placed[_ddTouchCardId];

    }

}

function runDump(){
  const w=document.getElementById('dw').value;
  const t=document.getElementById('dt').value;
  const lines=t.split('\n').map(l=>l.trim()).filter(l=>l.length>3);
  const pool=w==='All'?allQ():allQ().filter(q=>q.topic===w);
  S.dump.results=lines.map(line=>{
    const{score,quote}=bestMatch(line,pool);
    const s=score>.65?'ok':score>.35?'near':'miss';
    if(quote&&s==='ok')addMPts(quote.id,18);
    else if(quote&&s==='near')addMPts(quote.id,5);
    return{input:line,s,match:quote};
  });
  addXP(S.dump.results.filter(r=>r.s==='ok').length*8);
  S.dump.done=true;render();
}

function doReset(){if(confirm('Reset ALL progress?')){S.mastered=new Set();S.learning=new Set();S.hidden=new Set();S.xp=0;S.streak=0;S.srsData={};S.quizHistory=[];S.masteryPts={};save();toast('Reset done');render();}}

function exportJSON(){
  const d={canonical:DB,custom:S.custom,mastered:[...S.mastered],learning:[...S.learning],xp:S.xp,streak:S.streak,srsData:S.srsData,quizHistory:S.quizHistory};
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='DateVault-backup.json';a.click();
}
function importJSON(evt){
  const f=evt.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{
    const d=JSON.parse(e.target.result);
    if(d.custom)S.custom=[...S.custom,...d.custom];
    if(d.mastered)d.mastered.forEach(id=>S.mastered.add(id));
    if(d.learning)d.learning.forEach(id=>S.learning.add(id));
    if(d.xp)S.xp+=d.xp;
    if(d.srsData)Object.assign(S.srsData,d.srsData);
    if(d.quizHistory)S.quizHistory.push(...d.quizHistory);
    save();updateSB();toast('Import successful!');render();
  }catch(e){toast('Import failed ‚ÄĒ invalid JSON');}};
  r.readAsText(f);
}

function exportCSV(){
  const qs=allQ();
  const h='Year,Event,Significance,Topic,Period,Section,Category,Stars\n';
  const rows=qs.map(q=>[
    `"${(q.year||'').replace(/"/g,'""')}"`,
    `"${(q.event||'').replace(/"/g,'""')}"`,
    `"${(q.significance||'').replace(/"/g,'""')}"`,
    q.topic||'',q.period||'',q.section||'',q.category||'',q.stars||''
  ].join(',')).join('\n');
  const b=new Blob([h+rows],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='DateVault-dates.csv';a.click();
}

async function adminApprove(idx){
  const q={..._adminPending[idx]};if(!q)return;
  try{
    const resp=await fetch(WORKER_URL+'/dv/approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:_adminToken,id:q.id})});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
  }catch(e){toast('‚ö† Worker error: '+e.message,3500);return;}
  delete q.submittedAt;delete q._userSubmitted;
  S.pending=S.pending.filter(p=>p.id!==q.id);S.custom.push(q);addXP(5);save();
  _adminPending.splice(idx,1);buildNav();toast('‚úÖ Fact approved! +5 XP');render();
}
async function adminReject(idx){
  const q=_adminPending[idx];if(!q)return;
  try{
    const resp=await fetch(WORKER_URL+'/dv/reject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:_adminToken,id:q.id})});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
  }catch(e){toast('‚ö† Worker error: '+e.message,3500);return;}
  const rejId=_adminPending[idx]?.id;_adminPending.splice(idx,1);
  if(rejId){S.pending=S.pending.filter(p=>p.id!==rejId);save();}
  toast('‚ĚĆ Fact rejected');render();
}
async function adminDeleteApproved(idx){

}

    const data=await resp.json();
    if(Array.isArray(data.items)){
      const existingIds=new Set([...DB,...S.custom,...S.pending].map(q=>q.id));
      const newFacts=data.items.filter(f=>f.yearNum!==undefined&&!existingIds.has(f.id));
      if(newFacts.length>0){S.custom=[...S.custom,...newFacts];save();render();}
    }
  }catch(e){console.log(e);}
}

// ADMIN EDIT HELPERS ‚ÄĒ with worker update call
// ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź
function adminEditPending(idx){
  const q=_adminPending[idx];if(!q)return;
  openModal(`<div>
    <div style="font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);margin-bottom:10px">‚úŹÔłŹ Edit & Approve</div>
    ${_dvEditFields(q,'ep')}
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn bp" onclick="adminSavePendingEdit(${idx})">‚úÖ Save & Approve</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>`);
}
async function adminSavePendingEdit(idx){
  const q={..._adminPending[idx],..._dvReadFields('ep')};
  // First update the pending item in the worker with the edited data
  try{
    await fetch(WORKER_URL+'/dv/update-pending',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:_adminToken,id:q.id,data:q})});
  }catch(e){/* non-fatal */}
  // Then approve it (moves from pending ‚Üí public in the worker)
  try{
    await fetch(WORKER_URL+'/dv/approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:_adminToken,id:q.id})});
  }catch(e){toast('‚ö† Worker approve error: '+e.message,3500);}
  _adminPending.splice(idx,1);
  delete q.submittedAt;delete q._userSubmitted;
  S.pending=S.pending.filter(p=>p.id!==q.id);S.custom.push(q);addXP(5);save();buildNav();closeModal();
  toast('‚úÖ Edited, approved & added! +5 XP');render();
}
function adminEditApproved(idx){
  const q=S.custom[idx];if(!q)return;
  openModal(`<div>
    <div style="font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);margin-bottom:10px">‚úŹÔłŹ Edit Approved Fact</div>
    ${_dvEditFields(q,'ea')}
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn bp" onclick="adminSaveApprovedEdit(${idx})">ūüíĺ Save Changes</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>`);
}
async function adminSaveApprovedEdit(idx){
  const updated={...S.custom[idx],..._dvReadFields('ea')};
  S.custom[idx]=updated;save();
  // Push edit to worker so it persists in the cloud
  try{
    await fetch(WORKER_URL+'/dv/update-public',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:_adminToken,id:updated.id,data:updated})});
  }catch(e){/* non-fatal ‚ÄĒ local save succeeded */}
  closeModal();toast('ūüíĺ Fact updated');render();
}
function _dvEditFields(q,pfx){
  return`
  <div class="fg"><label>Year / Date</label><input type="text" id="${pfx}-yr" value="${q.year||''}"></div>
  <div class="fg"><label>Event</label><input type="text" id="${pfx}-ev" value="${q.event||''}"></div>
  <div class="fg"><label>Significance</label><textarea id="${pfx}-sig" rows="3">${q.significance||''}</textarea></div>
  <div class="g2">
    <div class="fg"><label>Topic</label><input type="text" id="${pfx}-to" value="${q.topic||''}"></div>
    <div class="fg"><label>Period</label><input type="text" id="${pfx}-pe" value="${q.period||''}"></div>
  </div>
  <div class="g2">
    <div class="fg"><label>Section</label><input type="text" id="${pfx}-sec" value="${q.section||''}"></div>
    <div class="fg"><label>Category</label><input type="text" id="${pfx}-cat" value="${q.category||''}"></div>
  </div>
  <div class="fg"><label>Stars (1-5)</label>
    <select id="${pfx}-st">${[1,2,3,4,5].map(n=>`<option${q.stars===n?' selected':''}>${n}</option>`).join('')}</select>
  </div>
  <div class="fg"><label>Note (optional)</label><input type="text" id="${pfx}-no" value="${q.note||''}"></div>`;
}
function _dvReadFields(pfx){
  const g=id=>document.getElementById(id)?.value||'';
  return{year:g(`${pfx}-yr`).trim(),event:g(`${pfx}-ev`).trim(),significance:g(`${pfx}-sig`).trim(),topic:g(`${pfx}-to`).trim(),period:g(`${pfx}-pe`).trim(),section:g(`${pfx}-sec`).trim(),category:g(`${pfx}-cat`).trim(),stars:+g(`${pfx}-st`),note:g(`${pfx}-no`).trim(),yearNum:parseInt((g(`${pfx}-yr`).match(/\d+/)||[])[0])||0};
}

// Sync theme instantly when changed in another tab/vault
window.addEventListener('storage',e=>{
  if(e.key==='vt_theme'&&e.newValue){
    applyTheme(e.newValue);
    if(S&&S.settings){S.settings.theme=e.newValue;save();}
  }
});
