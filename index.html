    {i:'💡',n:'Brain Dump',d:'Completed a Brain Dump',e:S.dump.done},
    {i:'⏱',n:'Speed Demon',d:'Scored 10+ in Timed Challenge',e:S.tc.score>=10},
    {i:'🔁',n:'SRS Master',d:'Reviewed 10 SRS cards',e:Object.keys(S.srsData).length>=10},
  ];
  const earned=achs.filter(a=>a.e).length;
  return`<div>
  ${backBtn()}
  <div class="pt">Achievements</div>
  <div class="ps">${earned}/${achs.length} unlocked · ${S.xp} XP</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
    ${achs.map(a=>`<div class="ach${a.e?'':' locked'}"><div class="ach-i">${a.i}</div><div><div class="ach-n">${a.n}${a.e?' ✓':''}</div><div class="ach-d">${a.d}</div></div></div>`).join('')}
  </div></div>`;
}

// ════════════════════════════════════════════════
// SETTINGS
// ════════════════════════════════════════════════
function rSett(){
  return`<div>
  ${backBtn()}
  <div class="pt">Settings</div>
  <div class="card" style="max-width:420px;margin-bottom:10px">
    <div class="srow">
      <div><div style="font-size:.8rem">Exam Board</div><div style="font-size:.68rem;color:var(--text3)">Currently: ${S.settings.board}</div></div>
      <select style="width:110px" onchange="S.settings.board=this.value;save()"><option${S.settings.board==='Edexcel'?' selected':''}>Edexcel</option><option${S.settings.board==='AQA'?' selected':''}>AQA</option><option${S.settings.board==='OCR'?' selected':''}>OCR</option></select>
    </div>
    <div class="srow">
      <div><div style="font-size:.8rem">Daily XP Goal</div><div style="font-size:.68rem;color:var(--text3)">${S.settings.daily} XP/day</div></div>
      <select style="width:100px" onchange="S.settings.daily=+this.value;save()">
        <option value="30"${S.settings.daily===30?' selected':''}>30 XP</option>
        <option value="50"${S.settings.daily===50?' selected':''}>50 XP</option>
        <option value="100"${S.settings.daily===100?' selected':''}>100 XP</option>
      </select>
    </div>
    <div class="srow">
      <div><div style="font-size:.8rem">Reset Progress</div><div style="font-size:.68rem;color:var(--coral)">Clears XP, mastery, SRS data</div></div>
      <button class="btn bsm" style="color:var(--coral);border-color:var(--coral)" onclick="doReset()">Reset</button>
    </div>
  </div>
  <div class="sec">Data Management</div>
  <div style="display:flex;gap:7px;flex-wrap:wrap">
    <button class="btn" onclick="exportJSON()">⬇ Export JSON</button>
    <label class="btn" style="cursor:pointer">⬆ Import JSON<input type="file" accept=".json" style="display:none" onchange="importJSON(event)"></label>
  </div>
  <div class="sec">About</div>
  <div class="card" style="max-width:420px;font-size:.73rem;color:var(--text2);line-height:1.7">
    <strong style="color:var(--gold)">DateVault v1.0</strong><br>
    Edexcel GCSE History · ${DB.length} canonical dates &amp; facts.<br>
    SM-2 spaced repetition · drag-and-drop timeline · duplicate detection.<br>
    All data stored locally in your browser.<br>
    <span style="color:var(--text3)">Topics: Crime &amp; Punishment · Whitechapel · Weimar &amp; Nazi Germany · Henry VIII · American West.</span>
  </div>
  </div>`;
}
function doReset(){if(confirm('Reset ALL progress?')){S.mastered=new Set();S.learning=new Set();S.xp=0;S.streak=0;S.srsData={};S.quizHistory=[];save();toast('Reset done');render();}}
function exportJSON(){
  const d={canonical:DB,custom:S.custom,mastered:[...S.mastered],learning:[...S.learning],xp:S.xp,streak:S.streak,srsData:S.srsData,quizHistory:S.quizHistory};
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='DateVault-backup.json';a.click();
}
function importJSON(evt){
  const f=evt.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{
    const d=JSON.parse(e.target.result);
    if(d.custom)S.custom=[...S.custom,...d.custom];
    if(d.mastered)d.mastered.forEach(id=>S.mastered.add(id));
    if(d.learning)d.learning.forEach(id=>S.learning.add(id));
    if(d.xp)S.xp+=d.xp;
    if(d.srsData)Object.assign(S.srsData,d.srsData);
    if(d.quizHistory)S.quizHistory.push(...d.quizHistory);
    save();updateSB();toast('Import successful!');render();
  }catch(e){toast('Import failed — invalid JSON');}};
  r.readAsText(f);
}

// ════════════════════════════════════════════════
// ADMIN PANEL
// ════════════════════════════════════════════════
let _adminToken=null,_adminAuth=false,_adminPending=[];

function rAdmin(){
  if(!_adminAuth){
    return`<div>
    ${backBtn()}
    <div class="pt">Admin Panel</div>
    <div class="ps">Password-protected · manage fact submissions</div>
    <div class="card" style="max-width:360px">
      <div class="fg"><label>Password</label>
        <input type="password" id="adm-pw" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')adminLogin()">
      </div>
      <button class="btn bg" onclick="adminLogin()" style="margin-top:2px">🔐 Login</button>
      <div id="adm-err" style="margin-top:8px"></div>
    </div>
    </div>`;
  }
  return rAdminPanel();
}
async function adminLogin(){
  const pw=(document.getElementById('adm-pw')?.value||'').trim();
  if(!pw)return;
  const errEl=document.getElementById('adm-err');
  errEl.innerHTML=`<div class="qfb" style="background:rgba(74,158,255,.08);border:1px solid rgba(74,158,255,.25);color:var(--blue)">⏳ Checking…</div>`;
  try{
    const resp=await fetch(WORKER_URL+'/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pw})});
    if(resp.status===401){errEl.innerHTML=`<div class="qfb qwr">❌ Incorrect password</div>`;return;}
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    _adminToken=data.token;_adminAuth=true;adminLoadPending();
  }catch(e){errEl.innerHTML=`<div class="qfb qwr">❌ Login failed: ${e.message}</div>`;}
}
function adminLogout(){_adminAuth=false;_adminToken=null;_adminPending=[];render();}
async function adminLoadPending(){
  render();
  try{
    const resp=await fetch(WORKER_URL+'/dv/pending?token='+encodeURIComponent(_adminToken));
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    _adminPending=data.items||[];
  }catch(e){_adminPending=[];toast('⚠ Could not load pending: '+e.message,3500);}
  render();
}
function rAdminPanel(){
  const pending=_adminPending;const approved=S.custom;
  const pendingHTML=pending===null?`<div style="font-size:.78rem;color:var(--blue)">⏳ Loading…</div>`
    :pending.length===0?`<div style="font-size:.78rem;color:var(--teal2)">✅ No facts awaiting review</div>`
    :pending.map((q,i)=>`<div class="dc" style="border-left:3px solid var(--amber)">
      <div class="dc-date">${q.year||'?'}</div>
      <div class="dc-event">${q.event}</div>
      <div style="font-size:.7rem;color:var(--text2);margin-bottom:5px">${(q.significance||'').slice(0,120)}…</div>
      <div class="dc-m"><span class="tag tp">${q.topic||''}</span><span class="tag tb">${q.period||''}</span></div>
      <div style="display:flex;gap:7px;margin-top:8px;flex-wrap:wrap">
        <button class="btn bsm" style="background:rgba(44,182,125,.15);border-color:var(--teal);color:var(--teal2)" onclick="adminApprove(${i})">✅ Approve</button>
        <button class="btn bsm" style="background:rgba(74,158,255,.1);border-color:var(--blue);color:var(--blue)" onclick="adminEditPending(${i})">✏️ Edit & Approve</button>
        <button class="btn bsm br" onclick="adminReject(${i})">❌ Reject</button>
      </div>
    </div>`).join('');
  return`<div>
  ${backBtn()}
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:8px">
    <div class="pt">Admin Panel</div>
    <div style="display:flex;gap:6px">
      <button class="btn bsm" onclick="adminLoadPending()" style="color:var(--blue);border-color:var(--blue)">🔄 Refresh</button>
      <button class="btn bsm" onclick="adminLogout()" style="color:var(--coral);border-color:var(--coral)">🔒 Logout</button>
    </div>
  </div>
  <div class="sec" style="margin-top:0">📬 Pending Approval</div>
  ${pendingHTML}
  </div>`;
}
async function adminApprove(idx){
  const q={..._adminPending[idx]};if(!q)return;
  try{
    const resp=await fetch(WORKER_URL+'/dv/approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:_adminToken,id:q.id})});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
  }catch(e){toast('⚠ Worker error: '+e.message,3500);return;}
  delete q.submittedAt;S.custom.push(q);addXP(5);save();
  _adminPending.splice(idx,1);buildNav();toast('✅ Fact approved! +5 XP');render();
}
async function adminReject(idx){
  const q=_adminPending[idx];if(!q)return;
  try{
    const resp=await fetch(WORKER_URL+'/dv/reject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:_adminToken,id:q.id})});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
  }catch(e){toast('⚠ Worker error: '+e.message,3500);return;}
  _adminPending.splice(idx,1);toast('❌ Fact rejected');render();
}

async function loadCloudFacts(){
  try{
    const resp=await fetch(WORKER_URL+'/dv/quotes');
    if(!resp.ok)return;
    const data=await resp.json();
    if(Array.isArray(data.items)){
      // Only add history facts (have yearNum field)
      const histFacts=data.items.filter(f=>f.yearNum!==undefined);
      S.custom=[...S.custom,...histFacts];render();
    }
  }catch(e){console.log(e);}
}
// ════════════════════════════════════════════════
// ADMIN EDIT HELPERS (DateVault)
// ════════════════════════════════════════════════
function adminEditPending(idx){
  const q=_adminPending[idx];
  if(!q)return;
  openModal(`<div>
    <div style="font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);margin-bottom:10px">✏️ Edit & Approve</div>
    ${_dvEditFields(q,'ep')}
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn bp" onclick="adminSavePendingEdit(${idx})">✅ Save & Approve</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>`);
}

function adminSavePendingEdit(idx){
  const q={..._adminPending[idx],..._dvReadFields('ep')};
  _adminPending.splice(idx,1);
  fetch(WORKER_URL+'/approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:_adminToken,id:q.id})}).catch(()=>{});
  delete q.submittedAt;
  S.custom.push(q);addXP(5);save();buildNav();closeModal();
  toast('✅ Edited, approved & added! +5 XP');render();
}

function _dvEditFields(q,pfx){
  return`
  <div class="fg"><label>Year / Date</label><input type="text" id="${pfx}-yr" value="${q.year||''}"></div>
  <div class="fg"><label>Event</label><input type="text" id="${pfx}-ev" value="${q.event||''}"></div>
  <div class="fg"><label>Significance</label><textarea id="${pfx}-sig" rows="3">${q.significance||''}</textarea></div>
  <div class="g2">
    <div class="fg"><label>Topic</label><input type="text" id="${pfx}-to" value="${q.topic||''}"></div>
    <div class="fg"><label>Period</label><input type="text" id="${pfx}-pe" value="${q.period||''}"></div>
  </div>
  <div class="g2">
    <div class="fg"><label>Section</label><input type="text" id="${pfx}-sec" value="${q.section||''}"></div>
    <div class="fg"><label>Category</label><input type="text" id="${pfx}-cat" value="${q.category||''}"></div>
  </div>
  <div class="fg"><label>Stars (1-5)</label>
    <select id="${pfx}-st">${[1,2,3,4,5].map(n=>`<option${q.stars===n?' selected':''}>${n}</option>`).join('')}</select>
  </div>
  <div class="fg"><label>Note (optional)</label><input type="text" id="${pfx}-no" value="${q.note||''}"></div>`;
}

function _dvReadFields(pfx){
  const g=id=>document.getElementById(id)?.value||'';
  return{
    year:g(`${pfx}-yr`).trim(),
    event:g(`${pfx}-ev`).trim(),
    significance:g(`${pfx}-sig`).trim(),
    topic:g(`${pfx}-to`).trim(),
    period:g(`${pfx}-pe`).trim(),
    section:g(`${pfx}-sec`).trim(),
    category:g(`${pfx}-cat`).trim(),
    stars:+g(`${pfx}-st`),
    note:g(`${pfx}-no`).trim(),
    yearNum:parseInt((g(`${pfx}-yr`).match(/\d+/)||[])[0])||0,
  };
}

buildNav();updateSB();render();

buildNav();updateSB();render();
loadCloudFacts();
