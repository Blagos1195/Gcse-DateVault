<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>DateVault – GCSE History</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;height:100%}
body{font-family:'DM Sans',sans-serif;background:#0b0a14;color:#dddaf0;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
:root{
  --bg:#0b0a14;--bg2:#12111f;--bg3:#1a192b;--bg4:#22203a;--bg5:#2a2840;
  --card:#161526;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.22);
  --text:#dddaf0;--text2:#9a98b5;--text3:#5a587a;
  --gold:#e8c547;--gold2:#f5d76e;--gold3:#a88a20;
  --purple:#7c5cbf;--purple2:#9b7ee0;--purple3:#c4aaff;
  --teal:#2cb67d;--teal2:#3de09a;
  --coral:#e85d4a;--coral2:#ff7b6b;
  --blue:#4a9eff;--pink:#d4549a;
  --amber:#f5a623;--green:#3ecf8e;--red:#ff4d4d;
  --sidebar:196px;
}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto;z-index:200;flex-shrink:0;transition:transform .2s}
#sidebar::-webkit-scrollbar{width:3px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border2)}
.sb-logo{padding:12px 12px 10px;border-bottom:1px solid var(--border)}
.sb-logo-main{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:6px}
.sb-logo-sub{font-size:.6rem;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.sb-sec{font-size:.58rem;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;padding:10px 12px 3px}
.ni{display:flex;align-items:center;gap:7px;padding:6px 8px;cursor:pointer;border-radius:6px;margin:1px 5px;font-size:.78rem;color:var(--text2);transition:all .1s;user-select:none;white-space:nowrap}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.active{background:rgba(124,92,191,.28);color:var(--purple3);font-weight:500}
.ni-icon{font-size:.85rem;width:16px;text-align:center;flex-shrink:0}
.sb-foot{margin-top:auto;padding:8px 10px;border-top:1px solid var(--border);font-size:.68rem;color:var(--text3)}
.sb-xp{color:var(--gold);margin-top:2px;font-size:.72rem}
.sb-due{color:var(--coral);margin-top:2px;font-size:.7rem}
.sb-link{display:flex;align-items:center;gap:6px;padding:8px 12px;font-size:.75rem;color:var(--blue);text-decoration:none;border-top:1px solid var(--border);transition:background .1s}
.sb-link:hover{background:var(--bg3);color:var(--blue)}
#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
#topbar{height:44px;min-height:44px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0}
.tb-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#page{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px;scroll-behavior:smooth}
#page::-webkit-scrollbar{width:4px}
#page::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
#hbg{display:none;background:none;border:none;color:var(--text);font-size:1.1rem;cursor:pointer;padding:4px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:150}
@media(max-width:620px){#hbg{display:block}#sidebar{position:fixed;left:0;top:0;transform:translateX(-100%)}#sidebar.open{transform:translateX(0)}}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:520px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}
.scard{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.snum{font-size:1.5rem;font-weight:600;line-height:1.1}
.slbl{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.tag{display:inline-block;font-size:.62rem;padding:1px 7px;border-radius:20px;font-weight:500;line-height:1.5}
.tp{background:rgba(124,92,191,.2);color:var(--purple3)}
.tt{background:rgba(44,182,125,.14);color:var(--teal2)}
.tc-tag{background:rgba(232,93,74,.14);color:var(--coral2)}
.tg{background:rgba(232,197,71,.14);color:var(--gold)}
.tb{background:rgba(74,158,255,.14);color:var(--blue)}
.tk{background:rgba(212,84,154,.14);color:var(--pink)}
.bm{background:rgba(44,182,125,.14);color:var(--teal2);font-size:.62rem;padding:1px 7px;border-radius:20px}
.bl{background:rgba(232,197,71,.14);color:var(--gold);font-size:.62rem;padding:1px 7px;border-radius:20px}
.bn{background:rgba(74,158,255,.1);color:var(--blue);font-size:.62rem;padding:1px 7px;border-radius:20px}
.bd{background:rgba(245,166,35,.2);color:var(--amber);font-size:.62rem;padding:1px 7px;border-radius:20px}
.stars{color:var(--gold);font-size:.72rem}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font-size:.78rem;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text);transition:all .1s}
.btn:hover{background:var(--bg3)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.bp{background:var(--purple);border-color:var(--purple);color:#fff}.bp:hover{background:var(--purple2)}
.bg{background:var(--gold);border-color:var(--gold);color:#0b0a14;font-weight:600}.bg:hover{background:var(--gold2)}
.br{background:rgba(232,93,74,.15);border-color:var(--coral);color:var(--coral2)}.br:hover{background:rgba(232,93,74,.25)}
.bsm{padding:3px 9px;font-size:.72rem}
.bblk{width:100%;justify-content:center}
.pb{width:100%;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin:3px 0 7px}
.pbf{height:100%;border-radius:3px;background:var(--teal);transition:width .3s}
.pbf.pu{background:var(--purple2)}.pbf.pg{background:var(--gold)}.pbf.pr{background:var(--coral)}
.fg{margin-bottom:10px}
.fg label{font-size:.72rem;color:var(--text2);display:block;margin-bottom:3px}
input[type=text],input[type=number],select,textarea{font-family:'DM Sans',sans-serif;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:7px;padding:7px 10px;font-size:.8rem;width:100%;transition:border-color .1s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--purple)}
textarea{resize:vertical;line-height:1.5}
select option{background:var(--bg3)}
.fbar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px}
.fbtn{padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:.7rem;cursor:pointer;transition:all .1s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.fbtn:hover,.fbtn.active{background:var(--purple);border-color:var(--purple);color:#fff}
.dc{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 13px;margin-bottom:7px;transition:border-color .12s}
.dc:hover{border-color:var(--border2)}
.dc-date{font-family:'DM Mono',monospace;font-size:.95rem;color:var(--gold);margin-bottom:3px;font-weight:500}
.dc-event{font-size:.88rem;line-height:1.5;margin-bottom:4px;color:var(--text)}
.dc-sig{font-size:.72rem;color:var(--text2);line-height:1.5;margin-bottom:5px}
.dc-m{display:flex;align-items:center;gap:4px;flex-wrap:wrap;font-size:.65rem;color:var(--text3)}
.dc-note{margin-top:5px;font-size:.68rem;color:var(--amber);background:rgba(245,166,35,.07);padding:3px 8px;border-radius:5px;border-left:2px solid var(--amber)}
.fc-wrap{perspective:1000px;max-width:540px;margin:0 auto}
.fc{height:210px;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer;border-radius:14px}
.fc.flip{transform:rotateY(180deg)}
.fc-s{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.fc-front{background:var(--bg3);border:1px solid var(--border2)}
.fc-back{background:linear-gradient(135deg,rgba(124,92,191,.2),rgba(44,182,125,.1));border:1px solid var(--purple);transform:rotateY(180deg)}
.fc-lbl{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
.fc-main{font-family:'DM Mono',monospace;font-size:1.05rem;line-height:1.65;color:var(--gold)}
.fc-sub{font-size:.72rem;color:var(--text2);margin-top:7px;line-height:1.5}
.fc-hint{font-size:.65rem;color:var(--text3);margin-top:8px}
.qq{font-family:'DM Sans',sans-serif;font-size:.98rem;line-height:1.65;background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:13px 15px;margin-bottom:10px}
.qfb{border-radius:8px;padding:10px 12px;margin-top:8px;font-size:.78rem;line-height:1.5}
.qok{background:rgba(44,182,125,.12);border:1px solid rgba(44,182,125,.28);color:var(--text)}
.qwr{background:rgba(232,93,74,.12);border:1px solid rgba(232,93,74,.28);color:var(--text)}
.hint{font-size:.7rem;color:var(--text3);margin-top:4px;font-style:italic}
.dr{border-radius:7px;padding:7px 10px;margin-bottom:5px;font-size:.8rem;line-height:1.5}
.dr-ok{background:rgba(44,182,125,.1);border:1px solid rgba(44,182,125,.22);color:var(--text)}
.dr-near{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.22);color:var(--text)}
.dr-miss{background:rgba(232,93,74,.1);border:1px solid rgba(232,93,74,.22);color:var(--text2)}
.bback{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text2);font-size:.75rem;cursor:pointer;margin-bottom:11px;transition:all .1s;font-family:'DM Sans',sans-serif}
.bback:hover{background:var(--bg4);color:var(--text)}
.pt{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--gold);margin-bottom:2px}
.ps{font-size:.72rem;color:var(--text3);margin-bottom:11px}
.sec{font-size:.68rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;margin-top:13px}
.div{height:1px;background:var(--border);margin:11px 0}
#toast{position:fixed;bottom:14px;right:14px;background:var(--bg3);border:1px solid var(--teal);color:var(--teal2);padding:7px 13px;border-radius:9px;font-size:.78rem;z-index:9999;transform:translateX(130px);opacity:0;transition:all .22s;pointer-events:none;max-width:260px}
#toast.show{transform:translateX(0);opacity:1}
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center}
#modal-bg.open{display:flex}
#modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:18px;max-width:480px;width:92%;max-height:80vh;overflow-y:auto}
#modal::-webkit-scrollbar{width:3px}
#modal::-webkit-scrollbar-thumb{background:var(--border2)}
.srow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.srow:last-child{border-bottom:none}
.ach{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.ach.locked{opacity:.3;filter:grayscale(1)}
.ach-i{font-size:1.5rem}
.ach-n{font-size:.78rem;font-weight:600;color:var(--gold)}
.ach-d{font-size:.68rem;color:var(--text3)}
.hm-grid{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px}
.hm-cell{width:12px;height:12px;border-radius:2px;background:var(--bg4);transition:background .2s;cursor:default;flex-shrink:0}

/* ── TIMELINE ── */
#tl-outer{overflow-x:auto;overflow-y:hidden;padding:0 14px 14px;-webkit-overflow-scrolling:touch}
.tl-track{position:relative;min-height:220px;padding:100px 0 40px;cursor:grab;user-select:none}
.tl-track:active{cursor:grabbing}
.tl-axis{position:absolute;top:50%;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--border2) 5%,var(--border2) 95%,transparent);transform:translateY(-50%);pointer-events:none}
.tl-tick{position:absolute;top:50%;width:1px;background:var(--border2);transform:translateX(-50%);pointer-events:none}
.tl-tick-lbl{position:absolute;top:50%;font-family:'DM Mono',monospace;font-size:.6rem;color:var(--text3);transform:translate(-50%,8px);white-space:nowrap;pointer-events:none}
.tl-event{position:absolute;top:50%;transform:translate(-50%,-50%);z-index:10}
.tl-dot{width:12px;height:12px;border-radius:50%;background:var(--purple);border:2px solid var(--purple3);cursor:pointer;transition:transform .15s}
.tl-dot:hover,.tl-dot.sel{transform:scale(1.5)}
.tl-event-lbl{position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:.6rem;color:var(--text2);pointer-events:none;background:var(--bg2);padding:1px 4px;border-radius:3px;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-event-lbl.above{bottom:calc(100% + 8px)}
.tl-event-lbl.below{top:calc(100% + 8px)}
/* drag-and-drop timeline */
.tl-drop-zone{min-height:340px;position:relative;background:var(--bg3);border:2px dashed var(--border2);border-radius:10px;margin:10px 0;overflow:hidden}
.tl-drop-axis{position:absolute;top:50%;left:20px;right:20px;height:3px;background:var(--border2)}
.tl-drop-tick{position:absolute;top:50%;background:var(--border2);width:1px;height:20px;transform:translate(-50%,-50%)}
.tl-drop-lbl{position:absolute;top:50%;font-family:'DM Mono',monospace;font-size:.58rem;color:var(--text3);transform:translate(-50%,12px)}
.tl-card{background:var(--card);border:1px solid var(--border2);border-radius:7px;padding:5px 9px;font-size:.72rem;cursor:grab;transition:all .15s;line-height:1.4;max-width:160px}
.tl-card:hover{border-color:var(--purple2);background:var(--bg3)}
.tl-card.dragging{opacity:.4;cursor:grabbing}
.tl-card.placed{position:absolute;top:50%;transform:translate(-50%,-50%);cursor:grab;z-index:5;max-width:130px}
.tl-card.correct-pos{border-color:var(--teal)!important;background:rgba(44,182,125,.08)!important}
.tl-card.wrong-pos{border-color:var(--coral)!important;background:rgba(232,93,74,.08)!important}
.tl-bank{display:flex;flex-wrap:wrap;gap:7px;padding:10px;background:var(--bg2);border-radius:8px;min-height:60px;border:1px solid var(--border)}
.tl-bank.drag-over{border-color:var(--purple2);background:rgba(124,92,191,.06)}
</style>
</head>

<div id="app">

  <div class="sb-logo">
    <div class="sb-logo-main">🏛 DateVault</div>
    <div class="sb-logo-sub">GCSE History · Edexcel</div>
  </div>
  <nav id="nav"></nav>
  <a class="sb-link" href="https://blagos1195.github.io/Gcse-QuoteVault/" target="_blank">📚 Switch to QuoteVault</a>
  <div class="sb-foot">
    <div>⚡ <span id="sb-xp">0</span> XP · Lv <span id="sb-lv">1</span></div>

  <div id="topbar">
    <button id="hbg" onclick="toggleSB()">☰</button>
    <span class="tb-title" id="tb-title">Dashboard</span>
    <button class="btn bsm" onclick="exportJSON()" title="Export">⬇</button>
    <label class="btn bsm" title="Import" style="cursor:pointer">⬆<input type="file" accept=".json" style="display:none" onchange="importJSON(event)"></label>
  </div>
  <div id="page"></div>
</div>
</div>

<script>
const WORKER_URL = "https://quotevault-api.noah-l-barker.workers.dev";

// ════════════════════════════════════════════════
// DATE / EVENT DATABASE
// Format: {id, topic, period, year, yearNum (for sorting/timeline),
//          event, significance, category, stars, note}
// Categories: Political | Military | Social | Economic | Legal | Religious | Cultural
// ════════════════════════════════════════════════
const DB = [

// ══════════════════════════════════════════════
// CRIME & PUNISHMENT — ANCIENT & MEDIEVAL (c.450–1500)
// ══════════════════════════════════════════════
{id:"cp001",topic:"Crime & Punishment",period:"Anglo-Saxon",era:"c.450–1066",yearNum:600,year:"c.600s",event:"Trial by ordeal introduced by the Church",significance:"God was believed to decide guilt — suspects plunged hands in boiling water or carried hot iron. If wounds healed cleanly in 3 days, innocent. Reflects how Church dominated law and justice in this period.",category:"Legal",stars:5,section:"Methods of Policing & Trial"},
{id:"cp002",topic:"Crime & Punishment",period:"Anglo-Saxon",era:"c.450–1066",yearNum:700,year:"c.700s",event:"Wergild (blood money) system formalised",significance:"Crimes were settled by paying compensation to victims' families — the amount set by social rank. Murder of a thane cost more than murder of a churl. Kept the peace without a prison system; victims' kin enforced justice.",category:"Legal",stars:5,section:"Punishment"},
{id:"cp003",topic:"Crime & Punishment",period:"Anglo-Saxon",era:"c.450–1066",yearNum:890,year:"c.890",event:"Alfred the Great codifies law — the 'Doom Book'",significance:"Alfred combined laws from Offa of Mercia, Ine of Wessex, and the Ten Commandments. First major attempt to standardise justice across England. Emphasised proportional punishment — eye for an eye — and protected the weak.",category:"Legal",stars:4,section:"Law & Order"},
{id:"cp004",topic:"Crime & Punishment",period:"Norman",era:"1066–1200",yearNum:1066,year:"1066",event:"Norman Conquest — introduction of Forest Law and murdrum fine",significance:"William I declared huge areas royal forest; hunting in them was a capital offence. The murdrum fine punished whole communities if a Norman was found dead and the killer not identified — collective punishment to protect rulers.",category:"Political",stars:5,section:"Norman Changes"},
{id:"cp005",topic:"Crime & Punishment",period:"Norman",era:"1066–1200",yearNum:1116,year:"1116",event:"Introduction of the jury system (jury of presentment)",significance:"Henry I began using local men to present crimes to royal judges. Forerunner of the modern jury — community involvement in establishing facts, though judges still decided punishment.",category:"Legal",stars:4,section:"Methods of Policing & Trial"},
{id:"cp006",topic:"Crime & Punishment",period:"Medieval",era:"1200–1500",yearNum:1215,year:"1215",event:"Fourth Lateran Council abolishes trial by ordeal",significance:"The Pope banned priests from participating in trial by ordeal, effectively ending the practice. Courts had to find new methods — trial by jury became standard. Major turning point in the history of criminal justice.",category:"Religious",stars:5,section:"Methods of Policing & Trial"},
{id:"cp007",topic:"Crime & Punishment",period:"Medieval",era:"1200–1500",yearNum:1285,year:"1285",event:"Statute of Winchester — local communities responsible for law enforcement",significance:"Edward I made each community responsible for catching criminals: the hue and cry, watch and ward, and keeping roads clear of hiding places. No professional police — law and order depended entirely on ordinary people.",category:"Legal",stars:5,section:"Methods of Policing & Trial"},
{id:"cp008",topic:"Crime & Punishment",period:"Medieval",era:"1200–1500",yearNum:1300,year:"c.1300",event:"Growth of church courts (benefit of clergy)",significance:"Clergy could claim to be tried in Church courts where punishments were far lighter — no capital punishment. Literacy test ('reading the neck verse' — Psalm 51) let educated men claim clergy status. Shows Church vs state power over justice.",category:"Religious",stars:4,section:"Law & Order"},
{id:"cp009",topic:"Crime & Punishment",period:"Medieval",era:"1200–1500",yearNum:1351,year:"1351",event:"Statute of Labourers — wage controls after the Black Death",significance:"After the Black Death killed one-third of England's population, surviving workers demanded higher wages. The Statute fixed wages at pre-plague levels. Enforcing it was impossible; shows how economic crime becomes criminalised when power is threatened.",category:"Economic",stars:4,section:"Nature of Crime"},

// ══════════════════════════════════════════════
// CRIME & PUNISHMENT — EARLY MODERN (1500–1700)
// ══════════════════════════════════════════════
{id:"cp010",topic:"Crime & Punishment",period:"Early Modern",era:"1500–1700",yearNum:1530,year:"c.1530s",event:"Vagabondage laws — the 'wandering poor' criminalised",significance:"Tudor governments feared social disorder from the unemployed poor moving between towns. Vagrancy Acts made begging without a licence a whipping offence. Shows how poverty itself was treated as crime when the social order felt threatened.",category:"Social",stars:5,section:"Nature of Crime"},
{id:"cp011",topic:"Crime & Punishment",period:"Early Modern",era:"1500–1700",yearNum:1540,year:"1540",event:"Dissolution of the Monasteries ends Church charity networks",significance:"Henry VIII's destruction of monasteries removed the main welfare system for the poor. Poverty, homelessness and crime increased. Shows the link between government policy, social change, and rising crime rates.",category:"Social",stars:4,section:"Nature of Crime"},
{id:"cp012",topic:"Crime & Punishment",period:"Early Modern",era:"1500–1700",yearNum:1570,year:"c.1570s",event:"Witchcraft trials peak under Elizabeth I and James I",significance:"The Witchcraft Acts (1563, 1604) made witchcraft a capital offence. Around 500 people (mostly women) were executed in England. Fear of the supernatural, misogyny, and community tensions drove accusations. James I was obsessed with witch-hunting.",category:"Social",stars:5,section:"Nature of Crime"},
{id:"cp013",topic:"Crime & Punishment",period:"Early Modern",era:"1500–1700",yearNum:1601,year:"1601",event:"Elizabethan Poor Law — distinction between 'deserving' and 'undeserving' poor",significance:"Formalised the divide: the sick/elderly deserved help; the able-bodied unemployed were criminal vagabonds. Each parish responsible for its own poor. Shaped attitudes to poverty and crime for the next 300 years.",category:"Social",stars:5,section:"Nature of Crime"},
{id:"cp014",topic:"Crime & Punishment",period:"Early Modern",era:"1500–1700",yearNum:1649,year:"1649",event:"Execution of Charles I — treason redefined",significance:"The most dramatic application of treason law in English history. Shows how 'crime against the state' is defined by those in power — Parliamentarians called it justice; Royalists called it murder. Power determines what counts as crime.",category:"Political",stars:4,section:"Nature of Crime"},

// ══════════════════════════════════════════════
// CRIME & PUNISHMENT — 18th & 19th CENTURY
// ══════════════════════════════════════════════
{id:"cp015",topic:"Crime & Punishment",period:"18th Century",era:"1700–1800",yearNum:1723,year:"1723",event:"The Bloody Code — over 200 capital offences by mid-18th century",significance:"Petty theft (e.g. stealing goods worth more than 12 pence) was punishable by hanging. The harsh code was meant to deter crime in the absence of a police force, but juries often refused to convict, making it counterproductive.",category:"Legal",stars:5,section:"Punishment"},
{id:"cp016",topic:"Crime & Punishment",period:"18th Century",era:"1700–1800",yearNum:1718,year:"1718",event:"Transportation Act — criminals sent to America (later Australia)",significance:"Alternative to hanging — criminals transported to colonies to provide labour. Around 50,000 to America before 1776, then 160,000 to Australia after 1788. Aimed to deter, punish, and reform; distance prevented return.",category:"Legal",stars:5,section:"Punishment"},
{id:"cp017",topic:"Crime & Punishment",period:"18th Century",era:"1700–1800",yearNum:1750,year:"c.1750",event:"Highwaymen at their peak — 'gentlemen of the road'",significance:"Romanticised but genuinely dangerous criminals. Dick Turpin (executed 1739) became a myth. Growth of trade, banking, and coaching routes created new opportunities for robbery. Shows link between economic change and crime.",category:"Social",stars:3,section:"Nature of Crime"},
{id:"cp018",topic:"Crime & Punishment",period:"19th Century",era:"1800–1900",yearNum:1823,year:"1823",event:"Robert Peel's Gaols Act — reform of prison conditions",significance:"Required prisons to be properly inspected, prisoners clothed and fed, and female prisoners supervised by female staff. First step toward prison as reform rather than pure punishment. Laid ground for later Penitentiary Act.",category:"Social",stars:4,section:"Punishment"},
{id:"cp019",topic:"Crime & Punishment",period:"19th Century",era:"1800–1900",yearNum:1829,year:"1829",event:"Metropolitan Police Act — Robert Peel founds the first modern police force",significance:"Approximately 3,000 officers in London — the 'Peelers' or 'Bobbies'. Paid, uniformed, full-time law enforcement. Controversial at first (feared as a government spy force), but gradually accepted. Model copied across the country.",category:"Political",stars:5,section:"Methods of Policing & Trial"},
{id:"cp020",topic:"Crime & Punishment",period:"19th Century",era:"1800–1900",yearNum:1832,year:"1832",event:"Anatomy Act — ended body-snatching by giving surgeons legal access to unclaimed corpses",significance:"The Burke and Hare murders (1828) exposed the trade in stolen corpses for medical schools. The Act removed the incentive — and with it a major criminal industry. Shows how legislation responds to specific crimes.",category:"Legal",stars:3,section:"Nature of Crime"},
{id:"cp021",topic:"Crime & Punishment",period:"19th Century",era:"1800–1900",yearNum:1842,year:"1842",event:"Detective branch created within Metropolitan Police",significance:"First plain-clothes detectives — could investigate crime covertly. Initially controversial (seemed dishonest to spy without uniform). Became Criminal Investigation Department (CID) in 1878. Major shift in policing method.",category:"Political",stars:5,section:"Methods of Policing & Trial"},
{id:"cp022",topic:"Crime & Punishment",period:"19th Century",era:"1800–1900",yearNum:1868,year:"1868",event:"Last public execution in Britain — Michael Barrett hanged outside Newgate",significance:"Public executions moved behind prison walls after 1868. Earlier, public hangings drew huge crowds — entertainment and deterrence combined. The change reflected new ideas about dignity, reform, and what punishment was for.",category:"Social",stars:5,section:"Punishment"},
{id:"cp023",topic:"Crime & Punishment",period:"19th Century",era:"1800–1900",yearNum:1878,year:"1878",event:"CID (Criminal Investigation Department) established",significance:"Reorganised detective work under a dedicated department. Better training, records, and coordination. Beginning of professional detective work in British policing — would eventually lead to fingerprinting, forensics.",category:"Political",stars:4,section:"Methods of Policing & Trial"},

// ══════════════════════════════════════════════
// WHITECHAPEL — JACK THE RIPPER CASE STUDY
// ══════════════════════════════════════════════
{id:"cp030",topic:"Crime & Punishment",period:"Whitechapel",era:"1888",yearNum:1888,year:"1888",event:"Jack the Ripper murders — 5 canonical victims (August–November)",significance:"Mary Ann Nichols, Annie Chapman, Elizabeth Stride, Catherine Eddowes, Mary Jane Kelly. All sex workers in Whitechapel. Murders never solved — exposed failings of the Metropolitan Police and the desperate poverty of the East End.",category:"Social",stars:5,section:"Whitechapel"},
{id:"cp031",topic:"Crime & Punishment",period:"Whitechapel",era:"1888",yearNum:1888,year:"1888",event:"Formation of the Whitechapel Vigilance Committee",significance:"Local residents, led by George Lusk, organised their own patrols when police seemed unable to catch the Ripper. Shows public distrust of the police and community self-help. Lusk later received the 'From Hell' letter with a piece of kidney.",category:"Social",stars:4,section:"Whitechapel"},
{id:"cp032",topic:"Crime & Punishment",period:"Whitechapel",era:"1888",yearNum:1888,year:"1888",event:"Commissioner Charles Warren resigns after Ripper murders",significance:"Public and press pressure over police failure led to the head of the Metropolitan Police resigning. Shows political accountability for policing failures and the power of the press to shape public opinion on law and order.",category:"Political",stars:4,section:"Whitechapel"},
{id:"cp033",topic:"Crime & Punishment",period:"Whitechapel",era:"1888",yearNum:1888,year:"1888",event:"'Dear Boss' and 'From Hell' letters received by police",significance:"Media coverage turned the case into a sensation. Letters (possibly hoaxes, possibly genuine) gave the killer the name 'Jack the Ripper'. The press created a new kind of public criminal — the celebrity murderer. Changed relationship between crime and media.",category:"Cultural",stars:4,section:"Whitechapel"},
{id:"cp034",topic:"Crime & Punishment",period:"Whitechapel",era:"1888",yearNum:1888,year:"1888",event:"Whitechapel — overcrowding, poverty, and lack of sanitation",significance:"Population density of 175 people per acre; no gas lighting in many streets; prostitution driven by extreme poverty (average rent 4 shillings per week vs wages of 8-10 shillings). Crime was the product of desperate circumstances, not individual evil.",category:"Social",stars:5,section:"Whitechapel"},

// ══════════════════════════════════════════════
// CRIME & PUNISHMENT — 20th CENTURY
// ══════════════════════════════════════════════
{id:"cp040",topic:"Crime & Punishment",period:"20th Century",era:"1900–2000",yearNum:1907,year:"1907",event:"Probation Service established",significance:"Alternative to prison — offenders supervised in the community. Reflected new thinking: rehabilitation rather than punishment alone. Especially used for young and first-time offenders. First formal system of non-custodial punishment.",category:"Legal",stars:4,section:"Punishment"},
{id:"cp041",topic:"Crime & Punishment",period:"20th Century",era:"1900–2000",yearNum:1922,year:"1922",event:"Fingerprint evidence first used to secure a conviction in England",significance:"Actually first used 1902 (Harry Jackson) but became standard after the Stratton brothers case 1905. Science transformed the ability to identify criminals. Began the era of forensic evidence — changed policing permanently.",category:"Legal",stars:4,section:"Methods of Policing & Trial"},
{id:"cp042",topic:"Crime & Punishment",period:"20th Century",era:"1900–2000",yearNum:1965,year:"1965",event:"Abolition of the death penalty for murder (Murder Act)",significance:"Ruth Ellis (1955) — last woman hanged — and Timothy Evans (hanged 1950, innocent) cases drove public opinion against capital punishment. House of Commons voted to abolish hanging for murder. Last executions 1964. Shows how public attitudes change law.",category:"Legal",stars:5,section:"Punishment"},
{id:"cp043",topic:"Crime & Punishment",period:"20th Century",era:"1900–2000",yearNum:1984,year:"1984",event:"Police and Criminal Evidence Act (PACE) — rights of suspects formalised",significance:"Police must caution suspects, allow access to a solicitor, and record interviews. Response to miscarriages of justice (Birmingham Six, Guildford Four). Balanced police power with civil rights. Major reform of criminal procedure.",category:"Legal",stars:5,section:"Methods of Policing & Trial"},

// ══════════════════════════════════════════════
// WEIMAR REPUBLIC (1919–1933)
// ══════════════════════════════════════════════
{id:"wr001",topic:"Weimar & Nazi Germany",period:"Weimar Republic",era:"1919–1923",yearNum:1918,year:"November 1918",event:"Kaiser Wilhelm II abdicates — Germany surrenders to end World War One",significance:"Germany's defeat shocked many who believed the army was winning — the 'stab in the back' myth emerged. The new republic was born in defeat and immediately associated with humiliation. Created lasting hostility to democracy among nationalists.",category:"Political",stars:5,section:"Birth of the Weimar Republic"},
{id:"wr002",topic:"Weimar & Nazi Germany",period:"Weimar Republic",era:"1919–1923",yearNum:1919,year:"January 1919",event:"Spartacist Uprising — communist revolution attempt crushed",significance:"Karl Liebknecht and Rosa Luxemburg led a communist uprising in Berlin. President Ebert used the Freikorps (right-wing paramilitaries) to crush it — Luxemburg was murdered. Showed the fragility of the new republic and its reliance on anti-democratic forces.",category:"Political",stars:5,section:"Challenges to Weimar"},
{id:"wr003",topic:"Weimar & Nazi Germany",period:"Weimar Republic",era:"1919–1923",yearNum:1919,year:"June 1919",event:"Treaty of Versailles signed — Germany loses territory, army, and colonies",significance:"Germany lost 13% of land, 10% of population, all colonies; army limited to 100,000; Article 231 'war guilt clause' forced Germany to accept full blame and pay reparations. Republic blamed for signing the 'Diktat' — the 'November Criminals' accusation.",category:"Political",stars:5,section:"Birth of the Weimar Republic"},
{id:"wr004",topic:"Weimar & Nazi Germany",period:"Weimar Republic",era:"1919–1923",yearNum:1920,year:"March 1920",event:"Kapp Putsch — right-wing coup attempt in Berlin",significance:"Wolfgang Kapp and Freikorps units seized Berlin for 4 days. The army refused to fire on the rebels. Only defeated when German workers called a general strike. Showed the army's lack of loyalty to the republic and the power of the working class.",category:"Political",stars:5,section:"Challenges to Weimar"},
{id:"wr005",topic:"Weimar & Nazi Germany",period:"Weimar Republic",era:"1919–1923",yearNum:1921,year:"1921",event:"Reparations set at 132 billion gold marks",significance:"Germany declared unable to pay in 1922. France and Belgium occupied the Ruhr in 1923 to seize resources directly. German government ordered passive resistance; printed money to pay workers. Led directly to hyperinflation.",category:"Economic",stars:5,section:"Weimar's Economic Problems"},
{id:"wr006",topic:"Weimar & Nazi Germany",period:"Weimar Republic",era:"1919–1923",yearNum:1923,year:"1923",event:"Hyperinflation — German mark becomes worthless",significance:"By November 1923 one US dollar = 4.2 trillion marks. Savings wiped out; workers paid twice daily. Middle classes devastated — this group later turned to Hitler. Barter economy emerged. Though stabilised by end of 1923, the memory lasted.",category:"Economic",stars:5,section:"Weimar's Economic Problems"},
{id:"wr007",topic:"Weimar & Nazi Germany",period:"Weimar Republic",era:"1919–1923",yearNum:1923,year:"November 1923",event:"Munich Beer Hall Putsch — Hitler's attempted coup fails",significance:"Hitler and Ludendorff attempted to seize power in Bavaria, planning to march on Berlin (copying Mussolini). 16 Nazis killed by police. Hitler arrested and sentenced to 5 years (served 9 months). Used trial as propaganda platform; wrote Mein Kampf in prison.",category:"Political",stars:5,section:"Challenges to Weimar"},
{id:"wr008",topic:"Weimar & Nazi Germany",period:"Weimar Republic",era:"1924–1929",yearNum:1924,year:"1924",event:"Dawes Plan — US loans stabilise the German economy",significance:"American banker Charles Dawes restructured reparations payments and arranged US loans of 800 million marks. German economy recovered; industrial output exceeded pre-war levels by 1928. But recovery was built on American loans — fragile foundation.",category:"Economic",stars:5,section:"The Golden Twenties"},
{id:"wr009",topic:"Weimar & Nazi Germany",period:"Weimar Republic",era:"1924–1929",yearNum:1925,year:"1925",event:"Hindenburg elected President of Germany",significance:"The hero of WWI chose to stand, defeating the republican candidate. His election showed continued nostalgia for imperial Germany. Though he defended the republic initially, he later appointed Hitler as Chancellor — one of the most consequential decisions in history.",category:"Political",stars:4,section:"The Golden Twenties"},
{id:"wr010",topic:"Weimar & Nazi Germany",period:"Weimar Republic",era:"1924–1929",yearNum:1928,year:"1928",event:"Nazis win only 12 seats in Reichstag election — at their lowest ebb",significance:"With prosperity restored, extremist parties had little appeal. The NSDAP had only 2.6% of the vote. Hitler was a minor figure in German politics. This makes the Depression's role in his rise absolutely crucial — without economic catastrophe, he might never have come to power.",category:"Political",stars:5,section:"The Golden Twenties"},
{id:"wr011",topic:"Weimar & Nazi Germany",period:"Weimar Republic",era:"1929–1933",yearNum:1929,year:"October 1929",event:"Wall Street Crash triggers Great Depression in Germany",significance:"US banks recalled their loans to Germany immediately. Six million unemployed by 1932. Savings lost again. The middle class — already scarred by 1923 — turned to the Nazis. Shows the direct causal link between economic collapse and Nazi electoral success.",category:"Economic",stars:5,section:"Rise of the Nazis"},
{id:"wr012",topic:"Weimar & Nazi Germany",period:"Weimar Republic",era:"1929–1933",yearNum:1930,year:"September 1930",event:"Nazis win 107 seats — become second largest party in Reichstag",significance:"From 12 seats to 107 in two years. Hitler's mass rallies, the SA's intimidation, and simple explanations for complex problems resonated with desperate voters. Propaganda chief Goebbels proved masterful at exploiting the media.",category:"Political",stars:5,section:"Rise of the Nazis"},
{id:"wr013",topic:"Weimar & Nazi Germany",period:"Weimar Republic",era:"1929–1933",yearNum:1932,year:"July 1932",event:"Nazis win 230 seats — largest party but no majority",significance:"Hitler demanded the Chancellorship; Hindenburg refused, calling him a 'Bohemian corporal'. Nazi vote then fell to 196 seats in November 1932 — suggesting the Nazi tide might be turning without Hindenburg's fatal decision.",category:"Political",stars:4,section:"Rise of the Nazis"},
{id:"wr014",topic:"Weimar & Nazi Germany",period:"Weimar Republic",era:"1929–1933",yearNum:1933,year:"30 January 1933",event:"Hitler appointed Chancellor of Germany",significance:"Hindenburg was persuaded by advisers (Franz von Papen) that Hitler could be 'controlled'. Von Papen famously said 'we've hired him'. This colossal misjudgement ended the Weimar Republic. Hitler came to power legally — then used power to destroy democracy.",category:"Political",stars:5,section:"Rise of the Nazis"},

// ══════════════════════════════════════════════
// NAZI GERMANY (1933–1945)
// ══════════════════════════════════════════════
{id:"ng001",topic:"Weimar & Nazi Germany",period:"Nazi Germany",era:"1933–1945",yearNum:1933.1,year:"February 1933",event:"Reichstag Fire — used to justify Decree suspending civil liberties",significance:"The Reichstag (parliament building) burned down; Dutch communist Marinus van der Lubbe arrested. Hitler used it to get the Reichstag Fire Decree passed — suspended freedom of speech, press, and assembly. Mass arrests of communists followed.",category:"Political",stars:5,section:"Consolidation of Power"},
{id:"ng002",topic:"Weimar & Nazi Germany",period:"Nazi Germany",era:"1933–1945",yearNum:1933.2,year:"March 1933",event:"Enabling Act — Hitler given power to rule by decree for 4 years",significance:"Passed with two-thirds majority (centre parties voted yes; communists arrested; SPD voted no bravely). Meant Hitler could pass laws without the Reichstag. The legal end of Weimar democracy. Germany became a one-party state within months.",category:"Political",stars:5,section:"Consolidation of Power"},
{id:"ng003",topic:"Weimar & Nazi Germany",period:"Nazi Germany",era:"1933–1945",yearNum:1933.3,year:"April 1933",event:"Boycott of Jewish businesses begins",significance:"SA men stood outside Jewish shops, painting Stars of David on windows. First organised state action against Jews. Most Germans ignored the boycott — it was largely unsuccessful economically but set the tone for escalating persecution.",category:"Social",stars:5,section:"Persecution of Jews"},
{id:"ng004",topic:"Weimar & Nazi Germany",period:"Nazi Germany",era:"1933–1945",yearNum:1934,year:"June 1934",event:"Night of the Long Knives — SA leadership murdered",significance:"Hitler ordered the murder of SA leader Ernst Röhm and up to 200 others. The army had demanded the SA be destroyed; Röhm wanted a 'second revolution'. SS carried out the killings. Hitler then passed a law declaring the murders legal. Army swore personal oath to Hitler.",category:"Political",stars:5,section:"Consolidation of Power"},
{id:"ng005",topic:"Weimar & Nazi Germany",period:"Nazi Germany",era:"1933–1945",yearNum:1934.5,year:"August 1934",event:"Death of President Hindenburg — Hitler becomes Führer",significance:"Hitler merged the offices of Chancellor and President, making himself head of state and Supreme Commander of the armed forces. The army took a personal oath of loyalty to Hitler (not to Germany). Complete personal dictatorship established.",category:"Political",stars:5,section:"Consolidation of Power"},
{id:"ng006",topic:"Weimar & Nazi Germany",period:"Nazi Germany",era:"1933–1945",yearNum:1935,year:"September 1935",event:"Nuremberg Laws — Jews stripped of citizenship and marriage rights",significance:"Jews could no longer be German citizens; marriage or sexual relations between Jews and non-Jews (Rassenschande — 'race defilement') made illegal. Further laws defined who counted as Jewish. Made antisemitism the law of the land.",category:"Legal",stars:5,section:"Persecution of Jews"},
{id:"ng007",topic:"Weimar & Nazi Germany",period:"Nazi Germany",era:"1933–1945",yearNum:1938,year:"November 1938",event:"Kristallnacht — the Night of Broken Glass",significance:"After a German diplomat was shot by a Jewish teenager, the SS and SA organised nationwide pogrom: 7,500 Jewish businesses smashed, 1,400 synagogues burned, 91 Jews killed, 30,000 sent to concentration camps. Presented as spontaneous public anger. Major escalation.",category:"Social",stars:5,section:"Persecution of Jews"},
{id:"ng008",topic:"Weimar & Nazi Germany",period:"Nazi Germany",era:"1933–1945",yearNum:1942,year:"January 1942",event:"Wannsee Conference — Final Solution to the Jewish Question planned",significance:"15 senior Nazi officials met in a villa to coordinate the systematic murder of all European Jews. The 'Final Solution' (Endlösung) was bureaucratically organised. Eventually 6 million Jews murdered in the Holocaust — the most systematic genocide in history.",category:"Political",stars:5,section:"Persecution of Jews"},

// ══════════════════════════════════════════════
// HENRY VIII & HIS MINISTERS
// ══════════════════════════════════════════════
{id:"h8001",topic:"Henry VIII & His Ministers",period:"Henry VIII",era:"1509–1547",yearNum:1509,year:"1509",event:"Henry VIII becomes King — marries Catherine of Aragon",significance:"Henry succeeded his father Henry VII at 17, educated, athletic, and popular. Immediately married his late brother's widow, needing a papal dispensation. The marriage lasted 24 years before Henry sought an annulment — setting off the English Reformation.",category:"Political",stars:5,section:"Henry's Reign Begins"},
{id:"h8002",topic:"Henry VIII & His Ministers",period:"Henry VIII",era:"1509–1547",yearNum:1513,year:"1513",event:"Battle of Flodden — England defeats Scotland; James IV killed",significance:"Thomas Howard (future Duke of Norfolk) commanded the English army. One of England's greatest military victories. Henry was in France at the time — Catherine of Aragon acted as regent and coordinated the response, showing her political competence.",category:"Military",stars:3,section:"Henry's Foreign Policy"},
{id:"h8003",topic:"Henry VIII & His Ministers",period:"Henry VIII",era:"1509–1547",yearNum:1515,year:"1515",event:"Thomas Wolsey becomes Lord Chancellor and Cardinal",significance:"Wolsey was the son of an Ipswich butcher who rose to become the most powerful man in England after the king. He dominated foreign policy, legal reform, and church administration for 14 years. His fall in 1529 over the divorce was the greatest political scandal of the reign.",category:"Political",stars:5,section:"Wolsey as Minister"},
{id:"h8004",topic:"Henry VIII & His Ministers",period:"Henry VIII",era:"1509–1547",yearNum:1521,year:"1521",event:"Henry VIII receives title 'Defender of the Faith' from Pope Leo X",significance:"Henry wrote 'Assertio Septem Sacramentorum' attacking Martin Luther. The Pope rewarded him with this title. Deeply ironic — within 12 years Henry had broken with Rome. The title 'Fidei Defensor' still appears on British coins today.",category:"Religious",stars:4,section:"Henry and the Church"},
{id:"h8005",topic:"Henry VIII & His Ministers",period:"Henry VIII",era:"1509–1547",yearNum:1527,year:"1527",event:"Henry VIII begins seeking annulment from Catherine of Aragon",significance:"Catherine had failed to produce a male heir (only Mary survived). Henry claimed the marriage was invalid because she had been his brother's wife (Leviticus 20:21). The Pope (controlled by Catherine's nephew, Emperor Charles V) refused to grant the annulment — triggering the Break with Rome.",category:"Religious",stars:5,section:"The Break with Rome"},
{id:"h8006",topic:"Henry VIII & His Ministers",period:"Henry VIII",era:"1509–1547",yearNum:1529,year:"1529",event:"Wolsey falls from power — charged with praemunire",significance:"Wolsey had failed to get Henry's divorce from Rome. Henry stripped him of the Chancellorship; he was charged with praemunire (exercising papal authority in England). Died before trial. Thomas More replaced him as Chancellor. Shows how Henry disposed of ministers who failed him.",category:"Political",stars:5,section:"Wolsey as Minister"},
{id:"h8007",topic:"Henry VIII & His Ministers",period:"Henry VIII",era:"1509–1547",yearNum:1532,year:"1532",event:"Thomas Cromwell becomes Henry's chief minister",significance:"Cromwell, a blacksmith's son and lawyer, engineered the legal and parliamentary framework for the Break with Rome. He drafted the Acts of Supremacy and Supremacy, organised the Dissolution of the Monasteries, and reformed government administration (the 'Tudor Revolution in Government').",category:"Political",stars:5,section:"Cromwell as Minister"},
{id:"h8008",topic:"Henry VIII & His Ministers",period:"Henry VIII",era:"1509–1547",yearNum:1533,year:"1533",event:"Henry marries Anne Boleyn — Thomas Cranmer grants annulment",significance:"Henry secretly married the pregnant Anne Boleyn. The new Archbishop Cranmer granted the annulment Rome had refused. Anne gave birth to Elizabeth (later Elizabeth I). The Pope excommunicated Henry. The English Reformation was now irreversible.",category:"Religious",stars:5,section:"The Break with Rome"},
{id:"h8009",topic:"Henry VIII & His Ministers",period:"Henry VIII",era:"1509–1547",yearNum:1534,year:"1534",event:"Act of Supremacy — Henry declared Supreme Head of the Church of England",significance:"Parliament formally made Henry head of the English Church. Those who refused to swear the Oath of Supremacy faced execution for treason. Sir Thomas More and Bishop John Fisher refused and were beheaded. Defined church-state relations in England for centuries.",category:"Religious",stars:5,section:"The Break with Rome"},
{id:"h8010",topic:"Henry VIII & His Ministers",period:"Henry VIII",era:"1509–1547",yearNum:1535,year:"1535",event:"Execution of Thomas More and Bishop John Fisher",significance:"Both refused to accept Henry's supremacy over the Church. Their deaths showed Henry would brook no opposition even from former allies and loyal Catholics. More's execution shocked Europe. He was later canonised as a martyr by the Catholic Church.",category:"Political",stars:5,section:"Opposition to Henry"},
{id:"h8011",topic:"Henry VIII & His Ministers",period:"Henry VIII",era:"1509–1547",yearNum:1536,year:"1536",event:"Dissolution of the Lesser Monasteries begins",significance:"Cromwell's commissioners reported corruption and immorality in monasteries (though reports were exaggerated). 376 smaller monasteries closed; wealth seized by the Crown. By 1540 all 900 monasteries dissolved — land redistributed to nobility and gentry, creating a new class with interest in keeping the Reformation.",category:"Religious",stars:5,section:"Cromwell as Minister"},
{id:"h8012",topic:"Henry VIII & His Ministers",period:"Henry VIII",era:"1509–1547",yearNum:1536.5,year:"1536",event:"Execution of Anne Boleyn — charged with adultery and treason",significance:"Anne had failed to produce a male heir (only Elizabeth). Cromwell orchestrated her downfall — she was charged with adultery with five men including her brother (almost certainly false). Beheaded on Tower Green. Henry married Jane Seymour 11 days later.",category:"Political",stars:5,section:"Henry's Wives"},
{id:"h8013",topic:"Henry VIII & His Ministers",period:"Henry VIII",era:"1509–1547",yearNum:1536.7,year:"October 1536",event:"Pilgrimage of Grace — largest rebellion of Henry's reign",significance:"Over 30,000 rose in Yorkshire and Lincolnshire against the Dissolution and religious changes. Led by lawyer Robert Aske. Henry negotiated, promised a parliament, then crushed the renewed rising in 1537 — Aske and 200 leaders executed. Showed depth of popular opposition to the Reformation.",category:"Social",stars:5,section:"Opposition to Henry"},
{id:"h8014",topic:"Henry VIII & His Ministers",period:"Henry VIII",era:"1509–1547",yearNum:1540,year:"1540",event:"Fall and execution of Thomas Cromwell",significance:"Cromwell had arranged Henry's disastrous marriage to Anne of Cleves (chosen for political reasons; Henry found her physically repulsive — called her the 'Flanders Mare'). Enemies used this failure to destroy Cromwell. He was executed on Tower Hill — the second chief minister Henry had destroyed.",category:"Political",stars:5,section:"Cromwell as Minister"},
{id:"h8015",topic:"Henry VIII & His Ministers",period:"Henry VIII",era:"1509–1547",yearNum:1547,year:"January 1547",event:"Death of Henry VIII — succeeded by Edward VI (aged 9)",significance:"Henry died after years of ill health, obese and ulcerated. He had transformed England: broken with Rome, dissolved the monasteries, established royal supremacy over the church. But the religious settlement was unstable — his successors took England through Catholic restoration and Protestant reform before Elizabeth established a compromise.",category:"Political",stars:4,section:"Legacy"},

// ══════════════════════════════════════════════
// THE AMERICAN WEST (c.1835–1895)
// ══════════════════════════════════════════════
{id:"aw001",topic:"American West",period:"Early Settlement",era:"1830s–1850s",yearNum:1830,year:"1830",event:"Indian Removal Act — Native Americans forced west of Mississippi",significance:"President Andrew Jackson signed the Act forcing eastern tribes to relocate to the 'Permanent Indian Territory' (Oklahoma). The Cherokee called their forced march the Trail of Tears (1838) — approximately 4,000 died. Established the US government's policy of removal.",category:"Political",stars:5,section:"Native Americans & Government Policy"},
{id:"aw002",topic:"American West",period:"Early Settlement",era:"1830s–1850s",yearNum:1836,year:"1836",event:"Mountain Men — peak of the fur trade; Rocky Mountain Rendezvous",significance:"Trappers like Jim Bridger and Jedediah Smith explored and mapped the West. The annual Rendezvous (1825–1840) was a meeting of trappers and traders. When beaver hats went out of fashion, the trade collapsed — but the trappers' knowledge later guided settlers along the Oregon Trail.",category:"Economic",stars:3,section:"Early Settlers"},

{id:"aw005",topic:"American West",period:"Gold Rush",era:"1848–1860",yearNum:1848,year:"January 1848",event:"Gold discovered at Sutter's Mill, California",significance:"James Marshall found gold at Sutter's Mill. By 1849, 80,000 'Forty-Niners' had reached California. The Gold Rush transformed the West: San Francisco went from 800 to 25,000 people in two years. California became a state in 1850. Showed the West's potential wealth and accelerated settlement.",category:"Economic",stars:5,section:"Gold Rush"},
{id:"aw006",topic:"American West",period:"Settlement",era:"1860s–1880s",yearNum:1860,year:"1860",event:"Pony Express begins — mail delivered from Missouri to California in 10 days",significance:"150 riders, 400 horses, 190 relay stations. Lasted only 18 months — killed by the telegraph in 1861. But showed the desire to connect the continent and the heroism of frontier life. Symbol of the speed and danger of western communication.",category:"Cultural",stars:3,section:"Communication & Transport"},
{id:"aw007",topic:"American West",period:"Settlement",era:"1860s–1880s",yearNum:1862,year:"1862",event:"Homestead Act — 160 acres of free land to settlers willing to farm for 5 years",significance:"Lincoln signed the Act to encourage settlement of the Great Plains. Over 270 million acres eventually claimed. But Plains farming was brutally hard — drought, locusts, harsh winters. Many homesteaders failed; large cattle ranchers often fenced off water supplies. The Act changed the West permanently.",category:"Political",stars:5,section:"Farming the Plains"},
{id:"aw008",topic:"American West",period:"Settlement",era:"1860s–1880s",yearNum:1864,year:"November 1864",event:"Sand Creek Massacre — 200 Cheyenne killed by US Army",significance:"Colonel Chivington ordered the attack on a peaceful Cheyenne village in Colorado. 200 killed, mostly women and children. Chivington called it a great victory; Congress investigated and called it a massacre. Inflamed the Plains Wars — showed the US Army's willingness to use extreme violence against Native Americans.",category:"Military",stars:5,section:"Native Americans & Government Policy"},
{id:"aw009",topic:"American West",period:"Settlement",era:"1860s–1880s",yearNum:1866,year:"1866",event:"Long Drive begins — cattle driven from Texas to railheads in Kansas",significance:"Charles Goodnight and Oliver Loving blazed the Goodnight-Loving Trail. Cowboys drove thousands of longhorns northward to rail depots like Abilene. By 1880s, 5 million cattle had been driven north. Created the cattle kingdom — and the cowboy as a cultural icon.",category:"Economic",stars:4,section:"Cattle & Cowboys"},

// SM-2 SPACED REPETITION
// ════════════════════════════════════════════════
function sm2(srs,grade){
  let{ef=2.5,interval=1,reps=0,due=null}=srs||{};
  if(grade<3){reps=0;interval=1;}
  else{
    reps++;
    if(reps===1)interval=1;
    else if(reps===2)interval=6;
    else interval=Math.round(interval*ef);
    ef=Math.max(1.3,ef+(0.1-(3-grade)*(0.08+(3-grade)*0.02)));
  }
  const d=new Date();d.setDate(d.getDate()+interval);
  return{ef,interval,reps,due:d.toISOString().slice(0,10)};
}
function isDue(srs){if(!srs||!srs.due)return true;return srs.due<=new Date().toISOString().slice(0,10);}
function dueCount(){return allQ().filter(q=>isDue(qSRS(q.id))).length;}

function toast(msg,dur=2400){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),dur);}
function shuf(a){return[...a].sort(()=>Math.random()-.5);}
function pct(n,d){return d?Math.round(n/d*100):0;}
function addXP(n){S.xp+=n;save();}
function topics(){return['All',...new Set(allQ().map(q=>q.topic))];}
function periods(topic){const qs=topic==='All'?allQ():allQ().filter(q=>q.topic===topic);return['All',...new Set(qs.map(q=>q.period))];}
function backBtn(){return S.hist.length?`<button class="bback" onclick="goBack()">← Back</button>`:''}
function normQ(s){return s.toLowerCase().replace(/[^a-z0-9 ',.-]/g,'').replace(/\s+/g,' ').trim();}
function sim(a,b){
  const na=normQ(a),nb=normQ(b);
  if(na===nb)return 1;
  const wa=na.split(' ').filter(w=>w.length>2);
  const wb=new Set(nb.split(' ').filter(w=>w.length>2));
  if(!wa.length||!wb.size)return 0;
  let c=0;wa.forEach(w=>{if(wb.has(w))c++;});
  return(2*c)/(wa.length+wb.size);
}
function bestMatch(inp,pool){
  let best=0,q=null;
  pool.forEach(p=>{const s=sim(inp,p.event+' '+p.year);if(s>best){best=s;q=p;}});
  return{score:best,quote:q};
}

function rQuiz(){

function rQuizSetup(){
  return`<div>
  ${backBtn()}

  <div class="ps">Test your knowledge of dates and events</div>
  <div class="card" style="max-width:400px">

      <option value="date_to_event">Date given → what happened?</option>
      <option value="event_to_date">Event given → what year/date?</option>
      <option value="significance">Event given → explain significance</option>

      <option value="section">Event given → which section/theme?</option>
    </select></div>

}
function startQuiz(){
  const w=document.getElementById('qw').value;
  const t=document.getElementById('qt').value;
  const n=+document.getElementById('qn').value;
  let pool=w==='All'?allQ():allQ().filter(q=>q.topic===w);
  if(pool.length<4)pool=allQ();
  S.quiz={active:true,topic:w,type:t,num:n,qs:shuf(pool).slice(0,n),idx:0,score:0,ans:'',checked:false};
  render();
}
function rQuizQ(){
  const{qs,idx,score,type,checked,ans}=S.quiz;
  const q=qs[idx];
  let prompt='',instr='',correct='',ph='',isLong=false;
  if(type==='date_to_event'){
    prompt=`<span style="font-family:'DM Mono',monospace;color:var(--gold);font-size:1.1rem">${q.year}</span><div style="font-size:.7rem;color:var(--text3);margin-top:5px">${q.topic} · ${q.period}</div>`;
    instr='What happened on this date? Describe the event.';
    correct=q.event;ph='Describe the event…';isLong=true;
  } else if(type==='event_to_date'){
    prompt=`${q.event}<div style="font-size:.7rem;color:var(--text3);margin-top:5px">${q.topic} · ${q.period}</div>`;
    instr='What year (or date) did this happen?';
    correct=q.year;ph='e.g. 1929 or November 1938…';
  } else if(type==='significance'){
    prompt=`<span style="font-family:'DM Mono',monospace;color:var(--gold)">${q.year}</span> — ${q.event}<div style="font-size:.7rem;color:var(--text3);margin-top:5px">${q.topic}</div>`;
    instr='Explain WHY this event was significant. Write a key point.';
    correct=q.significance;ph='Explain significance…';isLong=true;
  } else if(type==='period'){
    prompt=`${q.event}<div style="font-size:.7rem;color:var(--text3);margin-top:5px">${q.topic}</div>`;
    instr='Which period does this belong to?';
    correct=q.period;ph='e.g. Weimar Republic, Anglo-Saxon…';
  } else if(type==='section'){
    prompt=`${q.event}<div style="font-size:.7rem;color:var(--text3);margin-top:5px">${q.topic} · ${q.year}</div>`;
    instr='Which theme/section does this belong to?';
    correct=q.section||q.period;ph='e.g. Consolidation of Power…';
  }

  let feedback='';
  if(checked){
    const userN=normQ(ans||'');const corrN=normQ(correct);
    let ok=false;
    if(type==='event_to_date'){
      // Accept if they get the year number right
      const nums=ans.match(/\d{3,4}/g)||[];
      const corrNums=correct.match(/\d{3,4}/g)||[];
      ok=nums.some(n=>corrNums.includes(n));
    } else if(type==='period'||type==='section'){
      ok=userN.includes(corrN.slice(0,8))||corrN.includes(userN.slice(0,8));
    } else{ok=sim(ans||'',correct)>0.18;}
    if(ok){S.quiz.score++;addXP(15);}else{addXP(2);}
    S.quizHistory.push({date:new Date().toISOString().slice(0,10),correct:ok?1:0,total:1,topic:q.topic});
    save();
    feedback=`<div class="qfb ${ok?'qok':'qwr'}">
      ${ok?'✅ Correct! +15 XP':'❌ Not quite — +2 XP for trying'}
      <div style="margin-top:6px;font-size:.78rem"><strong style="color:var(--gold)">Model answer:</strong><br>${correct}</div>
      ${type!=='significance'?`<div style="margin-top:5px;font-size:.73rem;color:var(--text2)">${q.significance.slice(0,180)}…</div>`:''}
    </div>
    <button class="btn bp" style="margin-top:9px" onclick="nextQQ()">Next →</button>`;
  }
  return`<div>
  ${backBtn()}
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
    <span style="font-size:.7rem;color:var(--text3)">Q${idx+1}/${S.quiz.qs.length}</span>
    <span style="font-size:.7rem;color:var(--gold)">Score: ${score}</span>
  </div>
  <div class="pb"><div class="pbf" style="width:${pct(idx,S.quiz.qs.length)}%"></div></div>
  <div class="qq">${prompt}</div>
  <div style="font-size:.72rem;color:var(--text2);margin-bottom:8px">${instr}</div>
  ${!checked?`
  ${isLong?`<textarea id="qans" rows="3" placeholder="${ph}" onkeydown="if(event.ctrlKey&&event.key==='Enter')submitQ()">${ans}</textarea><div class="hint">Ctrl+Enter to submit</div>`:
  `<input type="text" id="qans" placeholder="${ph}" value="${ans||''}" onkeydown="if(event.key==='Enter')submitQ()">`}
  <div style="display:flex;gap:7px;margin-top:8px">
    <button class="btn bp" onclick="submitQ()">Submit</button>
    <button class="btn" onclick="nextQQ()">Skip →</button>
  </div>`:''}
  ${feedback}
  </div>`;
}
function submitQ(){const el=document.getElementById('qans');S.quiz.ans=el?el.value:'';S.quiz.checked=true;render();}
function nextQQ(){S.quiz.idx++;S.quiz.ans='';S.quiz.checked=false;render();}
function rQuizEnd(){
  const{score,qs}=S.quiz;const p=pct(score,qs.length);
  return`<div>
  ${backBtn()}
  <div class="pt">Quiz Complete!</div>
  <div class="card" style="text-align:center;max-width:340px;margin:12px auto">
    <div style="font-size:2rem;margin-bottom:6px">${p>=80?'🏆':p>=60?'⭐':'📚'}</div>

}

function startTCTimer(){
  if(S.tc.timer)clearInterval(S.tc.timer);
  S.tc.timer=setInterval(()=>{
    S.tc.tLeft=Math.max(0,S.tc.tLeft-1);S.tc.result=null;

function checkTC(){
  const el=document.getElementById('tc-ans');
  const ans=(el?el.value:'').trim();
  const q=S.tc.qs[S.tc.idx%S.tc.qs.length];
  const tp=S.tc.type||'event_to_date';
  let correct='',ok=false;
  if(tp==='event_to_date'){
    correct=q.year;
    const nums=ans.match(/\d{3,4}/g)||[];

    correct=q.event;ok=sim(ans,q.event)>0.3;
  } else {
    correct=q.period;ok=normQ(ans).includes(normQ(q.period).slice(0,6));
  }
  if(ok){S.tc.score++;addXP(5);S.tc.result={ok:true};}
  else{S.tc.result={ok:false,correct};}
  S.tc.idx++;
  if(el){el.value='';el.focus();}
  const res=document.querySelector('.qfb');
  if(res){res.className='qfb '+(ok?'qok':'qwr');res.innerHTML=(ok?'✅ Correct! +5 XP':'❌ Answer: '+correct);}
  else{
    const qEl=document.querySelector('.qq');
    if(qEl){const r=document.createElement('div');r.className='qfb '+(ok?'qok':'qwr');r.style.marginTop='8px';r.textContent=(ok?'✅ Correct! +5 XP':'❌ Answer: '+correct);qEl.parentNode.insertBefore(r,qEl.nextSibling.nextSibling||null);}
  }
  setTimeout(()=>{
    const nextQ=S.tc.qs[S.tc.idx%S.tc.qs.length];
    const qqEl=document.querySelector('.qq');
    if(qqEl&&S.tc.tLeft>0){

    }
    save();
  },800);
}

// TIMELINE — DRAG AND DROP
// ════════════════════════════════════════════════
function rTimeline(){
  const topicList=topics().filter(t=>t!=='All');
  const selTopic=S.tl.topic||topicList[0];
  const periodList=periods(selTopic);

  // Sub-mode: browse | drag
  if(S.tl.mode==='drag')return rTimelineDrag();

  // Browse mode: visual read-only scrollable timeline
  let pool=allQ().filter(q=>q.topic===selTopic);
  if(S.tl.period&&S.tl.period!=='All')pool=pool.filter(q=>q.period===S.tl.period);
  pool=pool.slice().sort((a,b)=>a.yearNum-b.yearNum);

  // Build timeline
  const minY=pool[0]?.yearNum||0;
  const maxY=pool[pool.length-1]?.yearNum||1;
  const range=Math.max(maxY-minY,1);
  const TW=Math.max(900,pool.length*80); // px width

  const dotHTML=pool.map((q,i)=>{
    const x=Math.round(40+((q.yearNum-minY)/range)*(TW-80));
    const above=i%2===0;
    const col=S.mastered.has(q.id)?'var(--teal)':S.learning.has(q.id)?'var(--gold)':'var(--purple)';
    return`<div class="tl-event" style="left:${x}px">
      <div class="tl-dot" style="background:${col};border-color:${col}" title="${q.year}: ${q.event}" onclick="showDateDetail('${q.id}')"></div>
      <div class="tl-event-lbl ${above?'above':'below'}">${q.year}</div>
    </div>`;
  }).join('');

  // Ticks every ~100 years or sensible interval
  const tickInterval=range>500?100:range>100?25:range>50?10:5;
  const firstTick=Math.ceil(minY/tickInterval)*tickInterval;
  let tickHTML='';
  for(let y=firstTick;y<=maxY;y+=tickInterval){
    const x=Math.round(40+((y-minY)/range)*(TW-80));
    tickHTML+=`<div class="tl-tick" style="left:${x}px;height:16px;top:calc(50% - 8px)"></div>
    <div class="tl-tick-lbl" style="left:${x}px">${y}</div>`;
  }

  return`<div>
  ${backBtn()}
  <div class="pt">Timeline</div>
  <div class="ps">Browse and interact with historical events on a timeline</div>
  <div class="fbar">
    ${topicList.map(t=>`<button class="fbtn${selTopic===t?' active':''}" onclick="S.tl.topic='${t}';S.tl.period='All';render()">${t}</button>`).join('')}
  </div>
  <div class="fbar">
    ${periodList.map(p=>`<button class="fbtn${(S.tl.period||'All')===p?' active':''}" onclick="S.tl.period='${p}';render()">${p}</button>`).join('')}

// ─── DRAG & DROP TIMELINE CHALLENGE ─────────────
let _dragId=null;
function rTimelineDrag(){
  const selTopic=S.tl.topic||'Crime & Punishment';
  let pool=allQ().filter(q=>q.topic===selTopic);
  if(S.tl.period&&S.tl.period!=='All')pool=pool.filter(q=>q.period===S.tl.period);
  pool=pool.filter(q=>q.stars>=4).slice().sort((a,b)=>a.yearNum-b.yearNum);
  // Pick 6-10 cards for the challenge
  const CARDS=shuf(pool).slice(0,Math.min(8,pool.length));
  const sorted=CARDS.slice().sort((a,b)=>a.yearNum-b.yearNum);
  const minY=sorted[0]?.yearNum||0;
  const maxY=sorted[sorted.length-1]?.yearNum||1;
  const range=Math.max(maxY-minY,1);
  const TW=700;

  const placed=S.tl.placed||{};
  const checked=S.tl.checked||false;

  // Cards not yet placed stay in bank
  const bankCards=CARDS.filter(q=>!placed[q.id]);
  const placedCards=Object.entries(placed);

  const bankHTML=bankCards.map(q=>`
    <div class="tl-card" id="card-${q.id}" draggable="true"
      ondragstart="dragStart('${q.id}',event)"
      ontouchstart="touchStart('${q.id}',event)"
      ontouchmove="touchMove(event)"
      ontouchend="touchEnd(event)">
      <div style="font-size:.65rem;color:var(--text3);margin-bottom:2px">${q.topic}</div>
      <div style="font-weight:500">${q.event.slice(0,50)}${q.event.length>50?'…':''}</div>
    </div>`).join('');

  // Drop zone with placed cards
  let dropZoneInner=`<div class="tl-drop-axis"></div>`;
  // Tick marks
  const tickInterval=range>200?50:range>50?10:5;
  const firstTick=Math.ceil(minY/tickInterval)*tickInterval;
  for(let y=firstTick;y<=maxY;y+=tickInterval){
    const xPct=((y-minY)/range)*92+4;
    dropZoneInner+=`<div class="tl-drop-tick" style="left:${xPct}%"></div><div class="tl-drop-lbl" style="left:${xPct}%">${y}</div>`;
  }
  // Placed cards
  placedCards.forEach(([id,xPct])=>{
    const q=CARDS.find(c=>c.id===id);if(!q)return;
    const correctX=((q.yearNum-minY)/range)*92+4;
    const diff=Math.abs(xPct-correctX);
    const isCorrect=diff<6; // within 6% = correct
    const colorClass=checked?(isCorrect?'correct-pos':'wrong-pos'):'';
    dropZoneInner+=`
      <div class="tl-card placed ${colorClass}" style="left:${xPct}%" draggable="true"
        id="card-${id}" ondragstart="dragStart('${id}',event)">
        <div style="font-size:.6rem;color:var(--text3)">${q.event.slice(0,30)}…</div>
        ${checked?`<div style="font-size:.6rem;color:${isCorrect?'var(--teal2)':'var(--coral2)'};">${isCorrect?'✓ '+q.year:'✗ '+q.year}</div>`:''}
      </div>`;
  });

  const allPlaced=bankCards.length===0;
  const correctCount=checked?placedCards.filter(([id,xPct])=>{
    const q=CARDS.find(c=>c.id===id);
    if(!q)return false;
    const correctX=((q.yearNum-minY)/range)*92+4;
    return Math.abs(xPct-correctX)<6;
  }).length:0;

  return`<div>
  ${backBtn()}
  <div class="pt">Timeline Challenge</div>
  <div class="ps">Drag each event card to the correct point on the timeline · ${selTopic}</div>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
    <button class="btn" onclick="S.tl.mode='browse';render()">← Browse Timeline</button>
    <button class="btn" onclick="S.tl.placed={};S.tl.checked=false;render()">🔄 Reset</button>
    ${allPlaced&&!checked?`<button class="btn bg" onclick="checkTimeline(${JSON.stringify(CARDS.map(q=>q.id))},${minY},${range})">✅ Check Answers</button>`:''}
    ${checked?`<div style="font-size:.8rem;color:var(--gold);font-weight:600">Score: ${correctCount}/${CARDS.length} correct! +${correctCount*15} XP</div>`:''}
  </div>

  <div style="font-size:.68rem;color:var(--text3);margin-bottom:8px">
    Drag cards from the bank below onto the timeline at the correct point in time.
    ${checked?'<span style="color:var(--teal2)"> Green = correct position</span>, <span style="color:var(--coral2)">red = wrong.</span>':''}
  </div>

  <div class="tl-drop-zone" id="tl-dropzone" style="position:relative;height:180px"
    ondragover="event.preventDefault()"
    ondrop="dropOnTimeline(event)"
    ontouchmove="event.preventDefault()"
    style="touch-action:none">
    ${dropZoneInner}
  </div>

  <div style="margin-top:10px">
    <div class="sec" style="margin-top:0">Event Bank — drag these onto the timeline above</div>
    <div class="tl-bank" id="tl-bank"
      ondragover="event.preventDefault()"
      ondrop="dropToBank(event)">
      ${bankHTML||'<div style="font-size:.75rem;color:var(--teal2)">✅ All cards placed on the timeline!</div>'}
    </div>
  </div>
  </div>`;
}

function dragStart(id,e){
  _dragId=id;
  if(e.dataTransfer){e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',id);}
}
function dropOnTimeline(e){
  e.preventDefault();
  if(!_dragId)return;
  const zone=document.getElementById('tl-dropzone');
  const rect=zone.getBoundingClientRect();
  const xPct=Math.max(4,Math.min(96,((e.clientX-rect.left)/rect.width)*100));
  if(!S.tl.placed)S.tl.placed={};
  S.tl.placed[_dragId]=xPct;
  _dragId=null;S.tl.checked=false;render();
}
function dropToBank(e){
  e.preventDefault();
  if(!_dragId)return;
  if(S.tl.placed&&S.tl.placed[_dragId]){delete S.tl.placed[_dragId];}
  _dragId=null;render();
}

// Touch support
let _touchCardId=null,_touchEl=null,_touchClone=null;
function touchStart(id,e){
  _touchCardId=id;
  _touchEl=document.getElementById('card-'+id);
  if(!_touchEl)return;
  _touchClone=_touchEl.cloneNode(true);
  _touchClone.style.cssText='position:fixed;z-index:9999;pointer-events:none;opacity:0.85;border:1px solid var(--purple2);border-radius:7px;padding:5px 9px;background:var(--card);font-size:.72rem;max-width:130px;';
  document.body.appendChild(_touchClone);
}
function touchMove(e){
  if(!_touchClone)return;
  const t=e.touches[0];
  _touchClone.style.left=(t.clientX-60)+'px';
  _touchClone.style.top=(t.clientY-30)+'px';
}
function touchEnd(e){
  if(!_touchClone){_touchCardId=null;return;}
  const t=e.changedTouches[0];
  const zone=document.getElementById('tl-dropzone');
  const bank=document.getElementById('tl-bank');
  document.body.removeChild(_touchClone);_touchClone=null;
  if(zone){
    const r=zone.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
      const xPct=Math.max(4,Math.min(96,((t.clientX-r.left)/r.width)*100));
      if(!S.tl.placed)S.tl.placed={};
      S.tl.placed[_touchCardId]=xPct;
      _touchCardId=null;S.tl.checked=false;render();return;
    }
  }
  if(bank){
    const r=bank.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
      if(S.tl.placed&&S.tl.placed[_touchCardId])delete S.tl.placed[_touchCardId];
      _touchCardId=null;render();return;
    }
  }
  _touchCardId=null;
}

function checkTimeline(cardIds,minY,range){
  S.tl.checked=true;
  const placed=S.tl.placed||{};
  let correct=0;
  cardIds.forEach(id=>{
    const q=getQ(id);if(!q)return;
    const xPct=placed[id];if(xPct===undefined)return;
    const correctX=((q.yearNum-minY)/range)*92+4;
    if(Math.abs(xPct-correctX)<6)correct++;
  });
  S.tl.score=correct;
  addXP(correct*15);
  save();render();
}

function runDump(){
  const w=document.getElementById('dw').value;
  const t=document.getElementById('dt').value;
  const lines=t.split('\n').map(l=>l.trim()).filter(l=>l.length>3);
  const pool=w==='All'?allQ():allQ().filter(q=>q.topic===w);
  S.dump.results=lines.map(line=>{
    const{score,quote}=bestMatch(line,pool);
    return{input:line,s:score>.65?'ok':score>.35?'near':'miss',match:quote};
  });
  addXP(S.dump.results.filter(r=>r.s==='ok').length*8);
  S.dump.done=true;render();
}

function liveDupCheck(){
  const ev=(document.getElementById('a-ev')?.value||'').trim();
  if(ev.length<5){document.getElementById('live-dup').innerHTML='';return;}
  const{score,quote}=bestMatch(ev,allQ());
  const el=document.getElementById('live-dup');
  if(score>.85)el.innerHTML=`<div class="qfb qwr" style="font-size:.72rem">⚠ Possible duplicate: <em>${quote.year} — ${quote.event}</em></div>`;
  else if(score>.5)el.innerHTML=`<div class="qfb" style="background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);font-size:.72rem">Similar exists (${Math.round(score*100)}%): ${quote.year} — ${quote.event}</div>`;
  else el.innerHTML=`<div style="font-size:.68rem;color:var(--teal2)">✓ No close duplicate found</div>`;
}
function checkDupFact(){
  const ev=(document.getElementById('a-ev')?.value||'').trim();
  if(!ev){document.getElementById('add-fb').innerHTML=`<div class="qfb qwr">Enter an event first.</div>`;return;}
  const{score,quote}=bestMatch(ev,allQ());
  const el=document.getElementById('add-fb');
  if(score>.85)el.innerHTML=`<div class="qfb qwr">⚠ Likely duplicate:<br>${quote.year} — ${quote.event}</div>`;
  else if(score>.5)el.innerHTML=`<div class="qfb" style="background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2)">Most similar (${Math.round(score*100)}%):<br>${quote.year} — ${quote.event}</div>`;
  else el.innerHTML=`<div class="qfb qok">✓ No duplicate — looks new!</div>`;
}
async function saveFact(){
  const yr=(document.getElementById('a-yr')?.value||'').trim();
  const ev=(document.getElementById('a-ev')?.value||'').trim();
  const sig=(document.getElementById('a-sig')?.value||'').trim();
  if(!yr||!ev||!sig){toast('Fill in year, event, and significance');return;}
  const id=Date.now().toString()+'-dv'+Math.random().toString(36).slice(2,6);
  const q={id,year:yr,event:ev,significance:sig,
    topic:document.getElementById('a-to').value,
    period:document.getElementById('a-pe').value,
    section:document.getElementById('a-sec').value,
    category:document.getElementById('a-cat').value,
    stars:+document.getElementById('a-st').value,
    note:document.getElementById('a-no').value,
    yearNum:parseInt(yr.match(/\d+/)?.[0])||0,
    submittedAt:new Date().toISOString()
  };
  const fbEl=document.getElementById('add-fb');
  fbEl.innerHTML=`<div class="qfb" style="background:rgba(74,158,255,.08);border:1px solid rgba(74,158,255,.25);color:var(--blue)">⏳ Submitting…</div>`;
  try{
    const resp=await fetch(WORKER_URL+'/dv/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(q)});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    toast('📬 Fact submitted for review');
    fbEl.innerHTML=`<div class="qfb" style="background:rgba(124,92,191,.1);border:1px solid rgba(124,92,191,.3);color:var(--purple3)">📬 Submitted for admin review!</div>`;
    ['a-yr','a-ev','a-sig','a-pe','a-sec','a-no'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
    document.getElementById('live-dup').innerHTML='';
  }catch(e){
    fbEl.innerHTML=`<div class="qfb qwr">❌ Submission failed — ${e.message}</div>`;
  }
}
